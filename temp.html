    Calst.CreateWordBox = function(data) {

        var html = "<div class=\"calst-word-button animated animated-long\" data-pos-container=\"0\">";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"0\">" + data[0].text + "</button>";
        html += "</div><div class=\"word-seperator\" style=\"text-align:center\"><h2>" + "or";
        html += "</h2></div><div class=\"calst-word-button animated animated-long\" data-pos-container=\"1\" >";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"1\">" + data[1].text + "</button></div>";

        $('#axbContainer').html(html);
        $('#word-extra-container').html('');

        getWordExtras([data[0].wordID, data[1].wordID], '/Words/GetWordDetails', {
            template: "AXB"
        }, );

    }
    ;
    Calst.NextSection = function() {
        var result = {
            Type: "AXB",
            Total: Calst.NumberOfMPTrials,
            Correct: Calst.NumberOfCorrect
        };
        CalstResult.AddResult(result);
        currentResultManager.setFinished();
        currentResultManager.sendResults();
        $('#extras-container').hide();
        if ('Default' === 'Result') {
            showResultPage();
        } else {
            if ('AXB' === 'AXB') {
                showTransactionSection('MP', 'Listen &amp; Click 2');
            } else {
                showTransactionSection('LAS', 'Listen &amp; Speak')
            }
        }
        if (Calst.Speaker) {
            Calst.Speaker = Calst.Speaker == "Male" ? "Female" : "Male";
        }
    }
    Calst.ShowNext = function(data) {
        Calst.CreateWordBox(data);

        if (Calst.IsRunning) {
            Calst.PlayNext();
            moveProgressbar((Calst.CurrentTrial + 1) * 100 / Calst.NumberOfMPTrials);
        }
    }
    Calst.OnSelectMinimalPair = function(mpNumber) {
        if (Calst.IsPalaying === false) {
            if (Calst.IsRunning && Calst.IsPalayed) {
                unbindAll();
                $('[data-pos-container="' + mpNumber + '"]').removeClass("pulse");
                currentResultManager.addResult(trialDetail(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos].wordID, Calst.MPExerciseData[Calst.CurrentTrial].wordList[mpNumber].wordID, ''));
                if (mpNumber === Calst.CurrentPos) {
                    var otherPos = mpNumber === 0 ? 1 : 0;
                    var word2Id = Calst.MPExerciseData[Calst.CurrentTrial].wordList[otherPos].wordID;
                    if (word2Id === -1 && 'AXB' === 'MP') {
                        // fade non word
                        //animObj($('[data-pos-container="' + otherPos + '"]'), "fadeOut");
                        $('[data-pos-container="' + otherPos + '"] > button').html("&zwnj;");
                    }

                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-success");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "tada");
                    Calst.NumberOfCorrect++;
                } else {
                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-danger");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "shake");
                }

                setTimeout(function() {
                    if (Calst.CurrentTrial + 1 < Calst.NumberOfMPTrials) {
                        Calst.CurrentTrial++;
                        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                    } else {
                        Calst.NextSection();
                    }
                }, 2200);
            }
        }
    }
    Calst.InitExercise = function() {
        $('#play-calst-exercise').click(function(e) {
            e.preventDefault();

            if (!Calst.AudioIsInitialized) {
                // Ask for sound permision
                AudioController.init(false);
                Calst.AudioIsInitialized = true;

            }

            if (!Calst.IsRunning) {
                Calst.IsRunning = true;
                $('#play-calst-exercise').html("<i class='fa fa-pause  fa-2x'></i>");
                Calst.CurrentTrial = 0;
                Calst.NumberOfCorrect = 0;
                Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                $('.only-on-run').removeClass("input-disabled");

            } else {
                Calst.IsRunning = false;
                $('.only-on-run').addClass("input-disabled");
                $('#play-calst-exercise').html("<i class='fa fa-volume-up fa-2x'></i>");
            }
        });

        $('#next-exercise-section').hide();

        $('#lesson-container-id').show();
        Calst.CurrentTrial = 0;
        Calst.progressbar = $('[data-exercice-type="' + 'AXB' + '"]');
        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
        $('.only-on-run').addClass("input-disabled");
        moveProgressbar(0);

        // update "how to" section
        $('#exerciseHowTo').html(howTo.replace('\"', '').replace('\"', ''));

    }
    Calst.PlayNext = function() {
        Calst.IsPalayed = false;
        // chose random from visibles
        Calst.IsPalaying = true;

        if ('AXB' === "AXB") {
            animObj($('[data-pos-container="0"]'), "pulse");
            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[0], Calst.Speaker);
            AudioController.playAudioUrl(url, function() {
                setTimeout(function() {
                    animObj($('[data-pos-container="1"]'), "pulse");
                    var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[1], Calst.Speaker);
                    AudioController.playAudioUrl(url, function() {
                        if (9 == 10 || 9 == 12 || 9 == 11) {
                            Calst.RandomWordPlay(Calst.Speaker == "Male" ? "Female" : "Male");
                        } else {
                            Calst.RandomWordPlay(Calst.Speaker);
                        }
                    });
                }, 500);
            });
        } else {
            Calst.RandomWordPlay(Calst.Speaker);
        }
        Calst.IsRunning = true;
    }

    Calst.getRandomSound = function(word, speaker) {
        var urls = [];
        for (var i = 0; i < word.sounds.length; i++) {
            if (speaker !== "" && word.sounds[i].sex !== speaker) {
                continue;
            }
            urls.push(word.sounds[i].url);
        }
        var numberOfSounds = urls.length;

        if (numberOfSounds > 1) {
            var soundRand = Math.floor(numberOfSounds * Math.random());
            return urls[soundRand];
        } else {
            return urls[0];
        }
    }

    Calst.RandomWordPlay = function(speaker) {

        //Calst.CurrentPos = Math.floor(2 * Math.random());
        for (var i = 0; i < Calst.MPExerciseData[Calst.CurrentTrial].wordList.length; i++) {
            if (Calst.MPExerciseData[Calst.CurrentTrial].wordList[i].wordID === Calst.MPExerciseData[Calst.CurrentTrial].focusWord) {
                Calst.CurrentPos = i;
            }
        }
        setTimeout(function() {
            animObj($('[data-pos-container="0"]'), "pulse");
            animObj($('[data-pos-container="1"]'), "pulse");

            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos], speaker);

            AudioController.playAudioUrl(url, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            }, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            });
        }, 1000);
    }

    function bindAll() {
        $('[data-pos="0"]').click(function() {
            Calst.OnSelectMinimalPair(0);
        });
        $('[data-pos="1"]').click(function() {
            Calst.OnSelectMinimalPair(1);
        });
    }
    function unbindAll() {
        $('[data-pos="0"]').unbind("click");
        $('[data-pos="1"]').unbind("click");
    }
</script>

    Calst.CreateWordBox = function(data) {

        var html = "<div class=\"calst-word-button animated animated-long\" data-pos-container=\"0\">";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"0\">" + data[0].text + "</button>";
        html += "</div><div class=\"word-seperator\" style=\"text-align:center\"><h2>" + "or";
        html += "</h2></div><div class=\"calst-word-button animated animated-long\" data-pos-container=\"1\" >";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"1\">" + data[1].text + "</button></div>";

        $('#axbContainer').html(html);
        $('#word-extra-container').html('');

        getWordExtras([data[0].wordID, data[1].wordID], '/Words/GetWordDetails', {
            template: "AXB"
        }, );

    }
    ;
    Calst.NextSection = function() {
        var result = {
            Type: "AXB",
            Total: Calst.NumberOfMPTrials,
            Correct: Calst.NumberOfCorrect
        };
        CalstResult.AddResult(result);
        currentResultManager.setFinished();
        currentResultManager.sendResults();
        $('#extras-container').hide();
        if ('Default' === 'Result') {
            showResultPage();
        } else {
            if ('AXB' === 'AXB') {
                showTransactionSection('MP', 'Listen &amp; Click 2');
            } else {
                showTransactionSection('LAS', 'Listen &amp; Speak')
            }
        }
        if (Calst.Speaker) {
            Calst.Speaker = Calst.Speaker == "Male" ? "Female" : "Male";
        }
    }
    Calst.ShowNext = function(data) {
        Calst.CreateWordBox(data);

        if (Calst.IsRunning) {
            Calst.PlayNext();
            moveProgressbar((Calst.CurrentTrial + 1) * 100 / Calst.NumberOfMPTrials);
        }
    }
    Calst.OnSelectMinimalPair = function(mpNumber) {
        if (Calst.IsPalaying === false) {
            if (Calst.IsRunning && Calst.IsPalayed) {
                unbindAll();
                $('[data-pos-container="' + mpNumber + '"]').removeClass("pulse");
                currentResultManager.addResult(trialDetail(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos].wordID, Calst.MPExerciseData[Calst.CurrentTrial].wordList[mpNumber].wordID, ''));
                if (mpNumber === Calst.CurrentPos) {
                    var otherPos = mpNumber === 0 ? 1 : 0;
                    var word2Id = Calst.MPExerciseData[Calst.CurrentTrial].wordList[otherPos].wordID;
                    if (word2Id === -1 && 'AXB' === 'MP') {
                        // fade non word
                        //animObj($('[data-pos-container="' + otherPos + '"]'), "fadeOut");
                        $('[data-pos-container="' + otherPos + '"] > button').html("&zwnj;");
                    }

                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-success");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "tada");
                    Calst.NumberOfCorrect++;
                } else {
                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-danger");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "shake");
                }

                setTimeout(function() {
                    if (Calst.CurrentTrial + 1 < Calst.NumberOfMPTrials) {
                        Calst.CurrentTrial++;
                        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                    } else {
                        Calst.NextSection();
                    }
                }, 2200);
            }
        }
    }
    Calst.InitExercise = function() {
        $('#play-calst-exercise').click(function(e) {
            e.preventDefault();

            if (!Calst.AudioIsInitialized) {
                // Ask for sound permision
                AudioController.init(false);
                Calst.AudioIsInitialized = true;

            }

            if (!Calst.IsRunning) {
                Calst.IsRunning = true;
                $('#play-calst-exercise').html("<i class='fa fa-pause  fa-2x'></i>");
                Calst.CurrentTrial = 0;
                Calst.NumberOfCorrect = 0;
                Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                $('.only-on-run').removeClass("input-disabled");

            } else {
                Calst.IsRunning = false;
                $('.only-on-run').addClass("input-disabled");
                $('#play-calst-exercise').html("<i class='fa fa-volume-up fa-2x'></i>");
            }
        });

        $('#next-exercise-section').hide();

        $('#lesson-container-id').show();
        Calst.CurrentTrial = 0;
        Calst.progressbar = $('[data-exercice-type="' + 'AXB' + '"]');
        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
        $('.only-on-run').addClass("input-disabled");
        moveProgressbar(0);

        // update "how to" section
        $('#exerciseHowTo').html(howTo.replace('\"', '').replace('\"', ''));

    }
    Calst.PlayNext = function() {
        Calst.IsPalayed = false;
        // chose random from visibles
        Calst.IsPalaying = true;

        if ('AXB' === "AXB") {
            animObj($('[data-pos-container="0"]'), "pulse");
            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[0], Calst.Speaker);
            AudioController.playAudioUrl(url, function() {
                setTimeout(function() {
                    animObj($('[data-pos-container="1"]'), "pulse");
                    var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[1], Calst.Speaker);
                    AudioController.playAudioUrl(url, function() {
                        if (9 == 10 || 9 == 12 || 9 == 11) {
                            Calst.RandomWordPlay(Calst.Speaker == "Male" ? "Female" : "Male");
                        } else {
                            Calst.RandomWordPlay(Calst.Speaker);
                        }
                    });
                }, 500);
            });
        } else {
            Calst.RandomWordPlay(Calst.Speaker);
        }
        Calst.IsRunning = true;
    }

    Calst.getRandomSound = function(word, speaker) {
        var urls = [];
        for (var i = 0; i < word.sounds.length; i++) {
            if (speaker !== "" && word.sounds[i].sex !== speaker) {
                continue;
            }
            urls.push(word.sounds[i].url);
        }
        var numberOfSounds = urls.length;

        if (numberOfSounds > 1) {
            var soundRand = Math.floor(numberOfSounds * Math.random());
            return urls[soundRand];
        } else {
            return urls[0];
        }
    }

    Calst.RandomWordPlay = function(speaker) {

        //Calst.CurrentPos = Math.floor(2 * Math.random());
        for (var i = 0; i < Calst.MPExerciseData[Calst.CurrentTrial].wordList.length; i++) {
            if (Calst.MPExerciseData[Calst.CurrentTrial].wordList[i].wordID === Calst.MPExerciseData[Calst.CurrentTrial].focusWord) {
                Calst.CurrentPos = i;
            }
        }
        setTimeout(function() {
            animObj($('[data-pos-container="0"]'), "pulse");
            animObj($('[data-pos-container="1"]'), "pulse");

            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos], speaker);

            AudioController.playAudioUrl(url, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            }, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            });
        }, 1000);
    }

    function bindAll() {
        $('[data-pos="0"]').click(function() {
            Calst.OnSelectMinimalPair(0);
        });
        $('[data-pos="1"]').click(function() {
            Calst.OnSelectMinimalPair(1);
        });
    }
    function unbindAll() {
        $('[data-pos="0"]').unbind("click");
        $('[data-pos="1"]').unbind("click");
    }
</script>

    Calst.CreateWordBox = function(data) {

        var html = "<div class=\"calst-word-button animated animated-long\" data-pos-container=\"0\">";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"0\">" + data[0].text + "</button>";
        html += "</div><div class=\"word-seperator\" style=\"text-align:center\"><h2>" + "or";
        html += "</h2></div><div class=\"calst-word-button animated animated-long\" data-pos-container=\"1\" >";
        html += "<button class=\"btn-lesson axbWord only-on-run\" data-pos=\"1\">" + data[1].text + "</button></div>";

        $('#axbContainer').html(html);
        $('#word-extra-container').html('');

        getWordExtras([data[0].wordID, data[1].wordID], '/Words/GetWordDetails', {
            template: "AXB"
        }, );

    }
    ;
    Calst.NextSection = function() {
        var result = {
            Type: "AXB",
            Total: Calst.NumberOfMPTrials,
            Correct: Calst.NumberOfCorrect
        };
        CalstResult.AddResult(result);
        currentResultManager.setFinished();
        currentResultManager.sendResults();
        $('#extras-container').hide();
        if ('Default' === 'Result') {
            showResultPage();
        } else {
            if ('AXB' === 'AXB') {
                showTransactionSection('MP', 'Listen &amp; Click 2');
            } else {
                showTransactionSection('LAS', 'Listen &amp; Speak')
            }
        }
        if (Calst.Speaker) {
            Calst.Speaker = Calst.Speaker == "Male" ? "Female" : "Male";
        }
    }
    Calst.ShowNext = function(data) {
        Calst.CreateWordBox(data);

        if (Calst.IsRunning) {
            Calst.PlayNext();
            moveProgressbar((Calst.CurrentTrial + 1) * 100 / Calst.NumberOfMPTrials);
        }
    }
    Calst.OnSelectMinimalPair = function(mpNumber) {
        if (Calst.IsPalaying === false) {
            if (Calst.IsRunning && Calst.IsPalayed) {
                unbindAll();
                $('[data-pos-container="' + mpNumber + '"]').removeClass("pulse");
                currentResultManager.addResult(trialDetail(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos].wordID, Calst.MPExerciseData[Calst.CurrentTrial].wordList[mpNumber].wordID, ''));
                if (mpNumber === Calst.CurrentPos) {
                    var otherPos = mpNumber === 0 ? 1 : 0;
                    var word2Id = Calst.MPExerciseData[Calst.CurrentTrial].wordList[otherPos].wordID;
                    if (word2Id === -1 && 'AXB' === 'MP') {
                        // fade non word
                        //animObj($('[data-pos-container="' + otherPos + '"]'), "fadeOut");
                        $('[data-pos-container="' + otherPos + '"] > button').html("&zwnj;");
                    }

                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-success");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "tada");
                    Calst.NumberOfCorrect++;
                } else {
                    $('[data-pos-container="' + mpNumber + '"] >button').removeClass("btn-lesson").addClass("bg-danger");
                    animObj($('[data-pos-container="' + mpNumber + '"]'), "shake");
                }

                setTimeout(function() {
                    if (Calst.CurrentTrial + 1 < Calst.NumberOfMPTrials) {
                        Calst.CurrentTrial++;
                        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                    } else {
                        Calst.NextSection();
                    }
                }, 2200);
            }
        }
    }
    Calst.InitExercise = function() {
        $('#play-calst-exercise').click(function(e) {
            e.preventDefault();

            if (!Calst.AudioIsInitialized) {
                // Ask for sound permision
                AudioController.init(false);
                Calst.AudioIsInitialized = true;

            }

            if (!Calst.IsRunning) {
                Calst.IsRunning = true;
                $('#play-calst-exercise').html("<i class='fa fa-pause  fa-2x'></i>");
                Calst.CurrentTrial = 0;
                Calst.NumberOfCorrect = 0;
                Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
                $('.only-on-run').removeClass("input-disabled");

            } else {
                Calst.IsRunning = false;
                $('.only-on-run').addClass("input-disabled");
                $('#play-calst-exercise').html("<i class='fa fa-volume-up fa-2x'></i>");
            }
        });

        $('#next-exercise-section').hide();

        $('#lesson-container-id').show();
        Calst.CurrentTrial = 0;
        Calst.progressbar = $('[data-exercice-type="' + 'AXB' + '"]');
        Calst.ShowNext(Calst.MPExerciseData[Calst.CurrentTrial].wordList);
        $('.only-on-run').addClass("input-disabled");
        moveProgressbar(0);

        // update "how to" section
        $('#exerciseHowTo').html(howTo.replace('\"', '').replace('\"', ''));

    }
    Calst.PlayNext = function() {
        Calst.IsPalayed = false;
        // chose random from visibles
        Calst.IsPalaying = true;

        if ('AXB' === "AXB") {
            animObj($('[data-pos-container="0"]'), "pulse");
            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[0], Calst.Speaker);
            AudioController.playAudioUrl(url, function() {
                setTimeout(function() {
                    animObj($('[data-pos-container="1"]'), "pulse");
                    var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[1], Calst.Speaker);
                    AudioController.playAudioUrl(url, function() {
                        if (9 == 10 || 9 == 12 || 9 == 11) {
                            Calst.RandomWordPlay(Calst.Speaker == "Male" ? "Female" : "Male");
                        } else {
                            Calst.RandomWordPlay(Calst.Speaker);
                        }
                    });
                }, 500);
            });
        } else {
            Calst.RandomWordPlay(Calst.Speaker);
        }
        Calst.IsRunning = true;
    }

    Calst.getRandomSound = function(word, speaker) {
        var urls = [];
        for (var i = 0; i < word.sounds.length; i++) {
            if (speaker !== "" && word.sounds[i].sex !== speaker) {
                continue;
            }
            urls.push(word.sounds[i].url);
        }
        var numberOfSounds = urls.length;

        if (numberOfSounds > 1) {
            var soundRand = Math.floor(numberOfSounds * Math.random());
            return urls[soundRand];
        } else {
            return urls[0];
        }
    }

    Calst.RandomWordPlay = function(speaker) {

        //Calst.CurrentPos = Math.floor(2 * Math.random());
        for (var i = 0; i < Calst.MPExerciseData[Calst.CurrentTrial].wordList.length; i++) {
            if (Calst.MPExerciseData[Calst.CurrentTrial].wordList[i].wordID === Calst.MPExerciseData[Calst.CurrentTrial].focusWord) {
                Calst.CurrentPos = i;
            }
        }
        setTimeout(function() {
            animObj($('[data-pos-container="0"]'), "pulse");
            animObj($('[data-pos-container="1"]'), "pulse");

            var url = Calst.getRandomSound(Calst.MPExerciseData[Calst.CurrentTrial].wordList[Calst.CurrentPos], speaker);

            AudioController.playAudioUrl(url, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            }, function() {
                Calst.IsPalayed = true;
                Calst.IsPalaying = false;
                bindAll();
            });
        }, 1000);
    }

    function bindAll() {
        $('[data-pos="0"]').click(function() {
            Calst.OnSelectMinimalPair(0);
        });
        $('[data-pos="1"]').click(function() {
            Calst.OnSelectMinimalPair(1);
        });
    }
    function unbindAll() {
        $('[data-pos="0"]').unbind("click");
        $('[data-pos="1"]').unbind("click");
    }
</script>
