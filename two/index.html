<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Vowel Chart</title>
<style>
  :root { --bg:#141c28; --surface:#1b2436; --border:#26334a; --muted:#5a6e85; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    background:var(--bg); color:#e0e8f4;
    min-height:100vh; padding:24px 16px;
    display:flex; flex-direction:column; align-items:center;
  }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.15rem; color:#7eb8f7; letter-spacing:.04em; margin-bottom:3px; }
  header p  { font-size:.78rem; color:var(--muted); }

  .controls { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
  .lang-btn {
    padding:5px 15px; border-radius:20px; border:2px solid;
    background:transparent; cursor:pointer; font-size:.8rem;
    font-weight:700; transition:background .15s,color .15s; line-height:1.4;
  }
  .lang-btn.on { color:#0d1117 !important; }

  .chart-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:10px; width:100%; max-width:760px;
  }
  svg { display:block; width:100%; height:auto; overflow:visible; }

  .tip {
    position:fixed; pointer-events:none; z-index:999; display:none;
    background:#0d1524; border:1px solid #2d3a55; border-radius:12px;
    padding:12px 15px; min-width:200px; max-width:265px;
    box-shadow:0 8px 40px rgba(0,0,0,.7);
  }
  .tip-ipa  { font-size:2.2rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .tip-lang { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:3px 0 7px; }
  .tip-desc { font-size:.78rem; color:#8fa0b8; line-height:1.45; }
  .tip-word { font-size:.82rem; margin-top:7px; color:#c8d6e8; }
  .tip-word b { text-decoration:underline; font-weight:normal; }
  .tip-f    { font-size:.7rem; color:#5a7090; margin-top:5px; font-family:monospace; }
  .tip-f span { color:#7a90a8; }

  /* Tongue diagram in tooltip */
  .tip-diagram {
    margin-top:9px; border-top:1px solid #1e2d42; padding-top:8px;
    display:flex; align-items:center; gap:8px;
  }
  .tip-diagram img {
    width:72px; height:72px; object-fit:contain;
    border-radius:6px; background:#111a28; flex-shrink:0;
    border:1px solid #1e2d42;
  }
  .tip-diagram-right { display:flex; flex-direction:column; gap:4px; }
  .tip-diagram-label { font-size:.68rem; color:#5a7090; }
  .tip-diagram-link  {
    font-size:.7rem; color:#4a8fc0; text-decoration:none;
    pointer-events:auto; display:inline-flex; align-items:center; gap:3px;
  }
  .tip-diagram-link:hover { color:#7eb8f7; }
  .tip-diagram-noimg { font-size:.7rem; color:#3d5068; font-style:italic; }

  /* Audio status indicator */
  .tip-audio {
    font-size:.7rem; margin-top:6px; display:flex; align-items:center; gap:5px;
    color:#5a7090;
  }
  .tip-audio.playing { color:#4ade80; }
  .tip-audio.no-file { color:#3d5068; font-style:italic; }

  .info-bar {
    display:flex; gap:14px; flex-wrap:wrap;
    justify-content:center; margin-top:12px; font-size:.75rem; color:var(--muted);
  }
  .info-item { display:flex; align-items:center; gap:6px; }
  .info-swatch { width:11px; height:11px; border-radius:50%; border:2px solid; flex-shrink:0; }

  .legend-strip {
    display:flex; gap:18px; justify-content:center; flex-wrap:wrap;
    margin-top:10px; font-size:.72rem; color:var(--muted);
  }
  .legend-strip span { display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>

<header>
  <h1>IPA Vowel Chart</h1>
  <p>Hover for details · Click to play · Toggle languages to compare</p>
</header>

<div class="controls" id="controls"></div>

<div class="chart-wrap">
  <svg id="chart" viewBox="0 0 740 510"></svg>
</div>

<div class="legend-strip">
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#1e2d42" stroke="#3d5068" stroke-width="1.5"/></svg>
    Cardinal reference
  </span>
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#60a5fa22" stroke="#60a5fa" stroke-width="1.5"/></svg>
    Language vowel
  </span>
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="none" stroke="#888" stroke-width="1.5"/><text x="7" y="11" text-anchor="middle" font-size="8" fill="#888">▶</text></svg>
    Click to hear
  </span>
</div>

<div class="info-bar" id="infoBar"></div>
<div id="tip" class="tip"></div>

<script>
// =============================================================================
// AUDIO FILES
// =============================================================================
// By default, audio is loaded from Wikimedia Commons (CC-licensed IPA recordings).
//
// To use your own files instead, create this folder structure next to the HTML:
//
//   audio/
//     cardinal/
//       i.ogg          ← filename = IPA symbol (url-encoded if needed)
//       y.ogg
//       u.ogg
//       ... etc
//     english/
//       iː.ogg
//       ɪ.ogg
//       ... etc
//     german/
//       iː.ogg
//       ... etc
//     russian/  norwegian/  ...
//
// Then set USE_LOCAL_AUDIO = true below.
// The file name must match the `ipa` field exactly (e.g. "eɪ.ogg", "ɜː.ogg").
// Supported formats: .ogg, .mp3, .wav  (OGG recommended for browser compat).
// =============================================================================
const USE_LOCAL_AUDIO = false;
const LOCAL_AUDIO_BASE = './audio/';   // path relative to this HTML file

// Wikimedia Commons base URL — stable redirect, no hash needed
const WM = 'https://commons.wikimedia.org/wiki/Special:Redirect/file/';

// Map IPA base symbol → Wikimedia Commons filename (OGG recordings by the IPA)
// Keys are stripped of length marks (ː) and diacritics for matching.
// We also cover near-close variants needed by the language data below.
const WM_AUDIO = {
  'i':  'Close_front_unrounded_vowel.ogg',
  'y':  'Close_front_rounded_vowel.ogg',
  'ɨ':  'Close_central_unrounded_vowel.ogg',
  'ʉ':  'Close_central_rounded_vowel.ogg',

  'e':  'Close-mid_front_unrounded_vowel.ogg',
  'ø':  'Close-mid_front_rounded_vowel.ogg',

  'ə':  'Mid-central_vowel.ogg',

  'æ':  'Near-open_front_unrounded_vowel.ogg',
  'ɐ':  'Near-open_central_vowel.ogg',
  'a':  'Open_front_unrounded_vowel.ogg',
  'ɶ':  'Open_front_rounded_vowel.ogg',
  'ɑ':  'Open_back_unrounded_vowel.ogg',
  'ɒ':  'Open_back_rounded_vowel.ogg',
};

// Diphthongs and affricates → map to their primary (first) vowel component
const DIPHTHONG_MAP = {
  'eɪ': 'e',
  'oʊ': 'o',
  'aɪ': 'a',
};

function resolveAudioUrl(langKey, ipaSymbol) {
  if (USE_LOCAL_AUDIO) {
    return `${LOCAL_AUDIO_BASE}${langKey}/${encodeURIComponent(ipaSymbol)}.ogg`;
  }
  // Strip length mark and look up the base phoneme
  const base = DIPHTHONG_MAP[ipaSymbol]
    ?? ipaSymbol.replace('ː', '');
  const filename = WM_AUDIO[base];
  return filename ? WM + filename : null;
}

//   1. Visit each wikiUrl below
//   2. The article's main image is the tongue position diagram
//   3. Click the image → "Download original file" on Commons
//   4. Save to: diagrams/[ipa_symbol].svg  (or .gif/.png)
//   5. Set USE_LOCAL_DIAGRAMS = true and update LOCAL_DIAGRAM_BASE below

// Wikipedia article URLs for each IPA vowel (tongue diagram + full description)

function resolveBase(ipaSymbol) {
  return DIPHTHONG_MAP[ipaSymbol] ?? ipaSymbol.replace('ː', '');
}

function resolveDiagramUrl(ipaSymbol) {
  const base = resolveBase(ipaSymbol);
  if (USE_LOCAL_DIAGRAMS)
    return `${LOCAL_DIAGRAM_BASE}${encodeURIComponent(base)}.svg`;
  return WM_DIAGRAM[base] ?? null;
}

function resolveWikiUrl(ipaSymbol) {
  return WIKI_ARTICLE[resolveBase(ipaSymbol)] ?? null;
}

// ─── Trapezoid geometry ───────────────────────────────────────────────────────
const TRAP = {
  TL:{x:108, y:95 },
  TR:{x:638, y:95 },
  BL:{x:300, y:450},
  BR:{x:638, y:450},
};
function trapPos(h, b) {
  const fX = TRAP.TL.x + h * (TRAP.BL.x - TRAP.TL.x);
  return { x: fX + b*(TRAP.TR.x - fX), y: TRAP.TL.y + h*(TRAP.BL.y - TRAP.TL.y) };
}
const ROWS = [
  {h:0,   label:'Close'},

  {h:3/6, label:'Mid'},

];

// ─── Audio playback ───────────────────────────────────────────────────────────
let currentAudio = null;

function playVowel(langKey, ipaSymbol) {
  const url = resolveAudioUrl(langKey, ipaSymbol);
  if (!url) return false;
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  currentAudio = new Audio(url);
  currentAudio.play().catch(err => {
    console.warn(`Audio failed for ${ipaSymbol}:`, err.message);
  });
  return true;
}

// ─── Active state ─────────────────────────────────────────────────────────────
const active = {cardinal:true, english:true, german:false, russian:false, norwegian:false};

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function $s(tag, attrs={}) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}
function $t(text, attrs={}) { const el=$s('text',attrs); el.textContent=text; return el; }

// ─── Controls ─────────────────────────────────────────────────────────────────
const ctrlEl = document.getElementById('controls');
for (const [key, lang] of Object.entries(LANGS)) {
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (active[key] ? ' on' : '');
  btn.textContent = lang.label;
  btn.style.borderColor = lang.color;
  btn.style.color = active[key] ? '#0d1117' : lang.color;
  btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
  btn.addEventListener('click', () => {
    active[key] = !active[key];
    btn.classList.toggle('on', active[key]);
    btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
    btn.style.color = active[key] ? '#0d1117' : lang.color;
    render();
  });
  ctrlEl.appendChild(btn);
}

// ─── Render ────────────────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  for (const row of ROWS) {
    const L=trapPos(row.h,0), R=trapPos(row.h,1);
    svg.appendChild($s('line', {x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#222d40','stroke-width':1.5}));
  }
  const cT=trapPos(0,.5), cB=trapPos(1,.5);
  svg.appendChild($s('line', {x1:cT.x,y1:cT.y,x2:cB.x,y2:cB.y,stroke:'#222d40','stroke-width':1,'stroke-dasharray':'5 4'}));

  const {TL,TR,BL,BR}=TRAP;
  svg.appendChild($s('path', {
    d:`M${TL.x},${TL.y} L${TR.x},${TR.y} L${BR.x},${BR.y} L${BL.x},${BL.y}Z`,
    fill:'none', stroke:'#2f3d52', 'stroke-width':2,
  }));
  for (const row of ROWS) {
    const p=trapPos(row.h,0);
    svg.appendChild($t(row.label, {x:p.x-10,y:p.y+4,'text-anchor':'end','font-size':10.5,fill:'#5a6e85','font-family':'system-ui,sans-serif'}));
  }
  for (const [label, b] of [['Front',0],['Central',.5],['Back',1]]) {
    const p=trapPos(0,b);
    svg.appendChild($t(label, {x:p.x,y:p.y-18,'text-anchor':'middle','font-size':10.5,fill:'#5a6e85','font-family':'system-ui,sans-serif'}));
  }

  const layers = Object.entries(LANGS)
    .sort(([a],[b]) => (a==='cardinal'?-1:1)-(b==='cardinal'?-1:1))
    .filter(([k]) => active[k]);

  for (const [key, lang] of layers) {
    const isCard = key === 'cardinal';
    for (const v of lang.vowels) {
      const {x, y} = trapPos(v.h, v.b);
      const g = $s('g', {style:'cursor:pointer'});

      if (isCard) {
        g.appendChild($s('circle', {cx:x,cy:y,r:5,fill:'#1e2d42',stroke:'#3d5068','stroke-width':1.5}));
        const lbl=$s('text',{x,y:y-8,'text-anchor':'middle','font-size':10.5,fill:'#5a7090','font-family':'Georgia,serif'});
        lbl.textContent=v.ipa; g.appendChild(lbl);
      } else {
        const c=lang.color;
        g.appendChild($s('circle',{cx:x,cy:y,r:16,fill:`${c}0d`,stroke:'none'}));
        g.appendChild($s('circle',{cx:x,cy:y,r:12,fill:`${c}20`,stroke:c,'stroke-width':2}));
        const lbl=$s('text',{x,y:y+5,'text-anchor':'middle','font-size':12,fill:c,'font-family':'Georgia,serif','font-weight':'bold'});
        lbl.textContent=v.ipa; g.appendChild(lbl);
      }

      g.addEventListener('mouseenter', e => showTip(e, v, lang, key));
      g.addEventListener('mousemove',  moveTip);
      g.addEventListener('mouseleave', hideTip);

      g.addEventListener('click', () => {
        playVowel(key, v.ipa);
        spawnPulse(svg, x, y, isCard ? '#4a6080' : lang.color, isCard ? 7 : 14);
      });

      let touchMoved = false;
      g.addEventListener('touchstart', e => { touchMoved=false; e.preventDefault(); showTip(e.touches[0], v, lang, key); }, {passive:false});
      g.addEventListener('touchmove',  e => { touchMoved=true;  e.preventDefault(); moveTip(e.touches[0]); },              {passive:false});
      g.addEventListener('touchend',   () => { hideTip(); if (!touchMoved) { playVowel(key, v.ipa); spawnPulse(svg, x, y, isCard?'#4a6080':lang.color, isCard?7:14); } });
      svg.appendChild(g);
    }
  }
  updateInfoBar();
}

// ─── Pulse ring ───────────────────────────────────────────────────────────────
function spawnPulse(svg, x, y, color, startR) {
  const ring=$s('circle',{cx:x,cy:y,r:startR,fill:'none',stroke:color,'stroke-width':2.5,opacity:0.85,style:'pointer-events:none'});
  svg.appendChild(ring);
  let r=startR, op=0.85;
  const step=()=>{ if(!ring.parentNode)return; r+=1.5; op-=0.038; ring.setAttribute('r',r); ring.setAttribute('opacity',Math.max(0,op).toFixed(3)); if(op>0)requestAnimationFrame(step); else ring.parentNode?.removeChild(ring); };
  requestAnimationFrame(step);
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tip = document.getElementById('tip');

function showTip(e, v, lang, langKey) {
  const diagramUrl = resolveDiagramUrl(v.ipa);
  const wikiUrl    = resolveWikiUrl(v.ipa);
  const audioUrl   = resolveAudioUrl(langKey, v.ipa);

  let diagramHtml = '';
  if (diagramUrl || wikiUrl) {
    diagramHtml = `<div class="tip-diagram">`;
    if (diagramUrl) {
      // img with onerror fallback — if Wikimedia URL doesn't resolve, hide it
      diagramHtml += `<img src="${diagramUrl}" alt="tongue position for ${v.ipa}" onerror="this.style.display='none'">`;
    }
    diagramHtml += `<div class="tip-diagram-right">
      <div class="tip-diagram-label">Tongue position</div>
      ${wikiUrl ? `<a class="tip-diagram-link" href="${wikiUrl}" target="_blank" rel="noopener">Wikipedia article ↗</a>` : '<span class="tip-diagram-noimg">No diagram available</span>'}
    </div></div>`;
  }

  tip.innerHTML = `
    <div class="tip-ipa" style="color:${lang.color}">${v.ipa}</div>
    <div class="tip-lang" style="color:${lang.color}">${lang.label}</div>
    <div class="tip-desc">${v.desc}</div>
    ${v.word ? `<div class="tip-word">e.g. ${v.word}</div>` : ''}
    ${v.f1   ? `<div class="tip-f">F1 <span>${v.f1} Hz</span> &nbsp;·&nbsp; F2 <span>${v.f2} Hz</span></div>` : ''}
    <div class="tip-audio">${audioUrl ? '▶ Click to play' : 'No audio file'}</div>
    ${diagramHtml}
  `;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x=e.clientX+18, y=e.clientY-12, r=tip.getBoundingClientRect();
  tip.style.left=Math.min(x,window.innerWidth -r.width -8)+'px';
  tip.style.top =Math.max(4,Math.min(y,window.innerHeight-r.height-8))+'px';
}
function hideTip() { tip.style.display='none'; }

// ─── Info bar ─────────────────────────────────────────────────────────────────
function updateInfoBar() {
  const bar=document.getElementById('infoBar');
  bar.innerHTML='';
  for (const [key, lang] of Object.entries(LANGS)) {
    if (!active[key]) continue;
    const item=document.createElement('div'); item.className='info-item';
    const sw=document.createElement('div'); sw.className='info-swatch';
    sw.style.borderColor=lang.color; sw.style.backgroundColor=lang.color+'30';
    const lbl=document.createElement('span'); lbl.textContent=`${lang.label}: ${lang.vowels.length} vowels`;
    item.appendChild(sw); item.appendChild(lbl); bar.appendChild(item);
  }
}

render();
</script>
