<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Vowel Chart</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #21262d;
    --text: #e6edf3; --muted: #48556a; --muted2: #30363d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 24px 16px;
    display: flex; flex-direction: column; align-items: center;
  }
  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: 1.15rem; color: #7eb8f7; letter-spacing: .04em; margin-bottom: 3px; }
  header p  { font-size: .78rem; color: var(--muted); }

  .controls {
    display: flex; gap: 7px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 18px;
  }
  .lang-btn {
    padding: 5px 15px; border-radius: 20px;
    border: 2px solid; background: transparent;
    cursor: pointer; font-size: .8rem; font-weight: 700;
    transition: background .15s, color .15s;
    line-height: 1.4;
  }
  .lang-btn.on { color: #0d1117 !important; }

  .chart-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px;
    width: 100%; max-width: 760px;
  }
  svg { display: block; width: 100%; height: auto; overflow: visible; }

  .tip {
    position: fixed; pointer-events: none; z-index: 999;
    display: none; background: #0d1320;
    border: 1px solid #2d3a55; border-radius: 12px;
    padding: 12px 15px; min-width: 190px; max-width: 250px;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
  }
  .tip-ipa  { font-size: 2.1rem; font-family: Georgia,'Noto Serif',serif; line-height:1; }
  .tip-lang { font-size:.68rem; font-weight:700; text-transform:uppercase;
               letter-spacing:.05em; margin:3px 0 7px; }
  .tip-desc { font-size:.78rem; color:#8fa0b8; line-height:1.45; }
  .tip-word { font-size:.82rem; margin-top:7px; color:#c8d6e8; }
  .tip-word b { text-decoration: underline; font-weight: normal; }
  .tip-f     { font-size:.7rem; color:#5a7090; margin-top:5px; font-family:monospace; }
  .tip-f span { color:#7a90a8; }

  .info-bar {
    display:flex; gap:14px; flex-wrap:wrap;
    justify-content:center; margin-top:12px;
    font-size:.75rem; color:var(--muted);
  }
  .info-item { display:flex; align-items:center; gap:6px; }
  .info-swatch {
    width:11px; height:11px; border-radius:50%;
    border:2px solid; flex-shrink:0;
  }

  .legend-strip {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 10px; font-size: .72rem; color: var(--muted);
  }
  .legend-strip span { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>

<header>
  <h1>IPA Vowel Chart</h1>
  <p>Hover a vowel for details · Toggle languages to compare</p>
</header>

<div class="controls" id="controls"></div>

<div class="chart-wrap">
  <svg id="chart" viewBox="0 0 740 490"></svg>
</div>

<div class="legend-strip">
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#12172a" stroke="#2d3a55" stroke-width="1.5"/></svg>
    Cardinal reference
  </span>
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#7eb8f730" stroke="#7eb8f7" stroke-width="1.5"/></svg>
    Language vowel
  </span>
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#34d39920" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3 2"/></svg>
    Nasal vowel
  </span>
</div>

<div class="info-bar" id="infoBar"></div>
<div id="tip" class="tip"></div>

<script>
// ─── Geometry ────────────────────────────────────────────────────────────────
const TRAP = {
  TL:{x:98,  y:92},   // Close-Front
  TR:{x:628, y:92},   // Close-Back
  BL:{x:248, y:432},  // Open-Front
  BR:{x:478, y:432},  // Open-Back
};

function trapPos(h, b) {
  const fX = TRAP.TL.x + h*(TRAP.BL.x - TRAP.TL.x);
  const bX = TRAP.TR.x + h*(TRAP.BR.x - TRAP.TR.x);
  return { x: fX + b*(bX - fX), y: TRAP.TL.y + h*(TRAP.BL.y - TRAP.TL.y) };
}

const ROWS = [
  {h:0,     label:'Close'},
  {h:1/6,   label:'Near-close'},
  {h:2/6,   label:'Close-mid'},
  {h:3/6,   label:'Mid'},
  {h:4/6,   label:'Open-mid'},
  {h:5/6,   label:'Near-open'},
  {h:1,     label:'Open'},
];

      {ipa:'oː', h:0.28, b:0.92, desc:'Close-mid back rounded (long)',   word:'gr<b>o</b>ß, S<b>oh</b>n',      f1:400, f2:840},
      {ipa:'ɔ',  h:0.66, b:0.88, desc:'Open-mid back rounded',           word:'K<b>o</b>pf, P<b>o</b>st',      f1:555, f2:870},
      {ipa:'uː', h:0.02, b:0.97, desc:'Close back rounded (long)',       word:'B<b>u</b>ch, R<b>uh</b>e',      f1:250, f2:600},
      {ipa:'ʊ',  h:0.21, b:0.80, desc:'Near-close near-back rounded',   word:'M<b>u</b>tter, H<b>u</b>nd',    f1:360, f2:780},
      {ipa:'ə',  h:0.48, b:0.50, desc:'Mid central (Schwa)',              word:'hab<b>e</b>, Kett<b>e</b>',     f1:490, f2:1350},

  },
  spanish: {
    label:'Spanish', color:'#a78bfa',
    vowels:[
      {ipa:'i', h:0.02, b:0.02, desc:'Close front unrounded',     word:'s<b>í</b>, v<b>i</b>no',   f1:263, f2:2290},

      {ipa:'a',  h:0.95, b:0.23, desc:'Open front unrounded',          word:'p<b>a</b>tte, c<b>a</b>r',     f1:780, f2:1450},
      {ipa:'ɑ',  h:0.97, b:0.62, desc:'Open back unrounded',           word:'p<b>â</b>te, b<b>a</b>s',      f1:800, f2:1100},
      {ipa:'ə',  h:0.48, b:0.50, desc:'Mid central (schwa)',           word:'l<b>e</b>, c<b>e</b>la',       f1:490, f2:1490},
      {ipa:'ɑ̃',  h:0.97, b:0.70, desc:'Open back nasal vowel',         word:'b<b>an</b>c, t<b>em</b>ps',    f1:690, f2:1130, nasal:true},
      {ipa:'ɛ̃',  h:0.60, b:0.11, desc:'Open-mid front nasal vowel',    word:'v<b>in</b>, f<b>ain</b>',      f1:530, f2:1590, nasal:true},
      {ipa:'ɔ̃',  h:0.61, b:0.83, desc:'Open-mid back nasal vowel',     word:'b<b>on</b>, l<b>on</b>g',      f1:510, f2:810,  nasal:true},
    ]
  },
};

// ─── Active state ─────────────────────────────────────────────────────────────
const active = { cardinal:true, english:true, german:false, spanish:false, french:false };

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function $s(tag, attrs={}) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  return el;
}
function $t(text, attrs={}) {
  const el = $s('text', attrs);
  el.textContent = text;
  return el;
}

// ─── Build language toggle buttons ───────────────────────────────────────────
const ctrlEl = document.getElementById('controls');
for (const [key, lang] of Object.entries(LANGS)) {
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (active[key] ? ' on' : '');
  btn.textContent = lang.label;
  btn.style.borderColor = lang.color;
  btn.style.color = active[key] ? '#0d1117' : lang.color;
  btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
  btn.addEventListener('click', () => {
    active[key] = !active[key];
    btn.classList.toggle('on', active[key]);
    btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
    btn.style.color = active[key] ? '#0d1117' : lang.color;
    render();
  });
  ctrlEl.appendChild(btn);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // ── Grid lines (one per row height) ──
  for (const row of ROWS) {
    const L = trapPos(row.h, 0), R = trapPos(row.h, 1);
    svg.appendChild($s('line', {
      x1:L.x, y1:L.y, x2:R.x, y2:R.y,
      stroke:'#181e2c', 'stroke-width':1.5
    }));
  }

  // Central dashed guide
  const cTop = trapPos(0,.5), cBot = trapPos(1,.5);
  svg.appendChild($s('line', {
    x1:cTop.x, y1:cTop.y, x2:cBot.x, y2:cBot.y,
    stroke:'#181e2c', 'stroke-width':1, 'stroke-dasharray':'5 4'
  }));

  // ── Trapezoid outline ──
  const {TL,TR,BL,BR} = TRAP;
  svg.appendChild($s('path', {
    d:`M${TL.x},${TL.y} L${TR.x},${TR.y} L${BR.x},${BR.y} L${BL.x},${BL.y}Z`,
    fill:'none', stroke:'#252d3d', 'stroke-width':2
  }));

  // ── Row labels (left) ──
  for (const row of ROWS) {
    const p = trapPos(row.h, 0);
    svg.appendChild($t(row.label, {
      x:p.x - 11, y:p.y + 4, 'text-anchor':'end',
      'font-size':10.5, fill:'#3d4a60',
      'font-family':'system-ui,sans-serif'
    }));
  }

  // ── Column labels (top) ──
  for (const [label, b] of [['Front',0],['Central',.5],['Back',1]]) {
    const p = trapPos(0, b);
    svg.appendChild($t(label, {
      x:p.x, y:p.y - 20, 'text-anchor':'middle',
      'font-size':10.5, fill:'#3d4a60',
      'font-family':'system-ui,sans-serif'
    }));
  }

  // ── Title ──
  svg.appendChild($t('IPA Vowel Quadrilateral', {
    x:363, y:30, 'text-anchor':'middle',
    'font-size':11, fill:'#2d3a50', 'letter-spacing':'0.1em',
    'font-family':'system-ui,sans-serif', 'text-transform':'uppercase'
  }));

  // ── Draw vowels ──
  // Cardinals first (bottom layer), then language vowels on top
  const layers = Object.entries(LANGS)
    .sort(([a],[b]) => (a==='cardinal'?-1:1) - (b==='cardinal'?-1:1))
    .filter(([k]) => active[k]);

  for (const [key, lang] of layers) {
    const isCard = key === 'cardinal';

    for (const v of lang.vowels) {
      const {x, y} = trapPos(v.h, v.b);
      const g = $s('g', {style:'cursor:pointer'});

      if (isCard) {
        g.appendChild($s('circle', {cx:x, cy:y, r:4,
          fill:'#0e1420', stroke:'#2a3348', 'stroke-width':1.5}));
        const lbl = $s('text', {
          x, y:y-7, 'text-anchor':'middle',
          'font-size':10, fill:'#2e3a50',
          'font-family':'Georgia,serif'
        });
        lbl.textContent = v.ipa;
        g.appendChild(lbl);
      } else {
        const c = lang.color;
        // Soft halo
        g.appendChild($s('circle', {cx:x, cy:y, r:22,
          fill:`${c}0c`, stroke:'none'}));
        // Filled circle
        g.appendChild($s('circle', {cx:x, cy:y, r:16,
          fill:`${c}1e`,
          stroke:c, 'stroke-width':v.nasal ? 0 : 2,
          ...( v.nasal ? {'stroke-dasharray':'4 3', stroke:c, 'stroke-width':2} : {} )
        }));
        if (v.nasal) {
          // Extra dashed stroke for nasal
          g.appendChild($s('circle', {cx:x, cy:y, r:16,
            fill:'none', stroke:c, 'stroke-width':2,
            'stroke-dasharray':'4 3'}));
        }
        const lbl = $s('text', {
          x, y:y+6, 'text-anchor':'middle',
          'font-size':14, fill:c,
          'font-family':'Georgia,serif', 'font-weight':'bold'
        });
        lbl.textContent = v.ipa;
        g.appendChild(lbl);
      }

      g.addEventListener('mouseenter', e => showTip(e, v, lang));
      g.addEventListener('mousemove',  moveTip);
      g.addEventListener('mouseleave', hideTip);
      // Touch support
      g.addEventListener('touchstart',  e => { e.preventDefault(); showTip(e.touches[0], v, lang); }, {passive:false});
      g.addEventListener('touchmove',   e => { e.preventDefault(); moveTip(e.touches[0]); },          {passive:false});
      g.addEventListener('touchend',    hideTip);

      svg.appendChild(g);
    }
  }

  updateInfoBar();
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tip = document.getElementById('tip');

function showTip(e, v, lang) {
  tip.innerHTML = `
    <div class="tip-ipa" style="color:${lang.color}">${v.ipa}${v.nasal?'<sup style="font-size:.6em;opacity:.7"> nasal</sup>':''}</div>
    <div class="tip-lang" style="color:${lang.color}">${lang.label}</div>
    <div class="tip-desc">${v.desc}</div>
    ${v.word ? `<div class="tip-word">e.g. ${v.word}</div>` : ''}
    ${v.f1  ? `<div class="tip-f">F1 <span>${v.f1} Hz</span> &nbsp;·&nbsp; F2 <span>${v.f2} Hz</span></div>` : ''}
  `;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x = e.clientX + 18, y = e.clientY - 12;
  const r = tip.getBoundingClientRect();
  tip.style.left = Math.min(x, window.innerWidth - r.width - 8) + 'px';
  tip.style.top  = Math.max(4, Math.min(y, window.innerHeight - r.height - 8)) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

// ─── Info bar ─────────────────────────────────────────────────────────────────
function updateInfoBar() {
  const bar = document.getElementById('infoBar');
  bar.innerHTML = '';
  for (const [key, lang] of Object.entries(LANGS)) {
    if (!active[key]) continue;
    const item = document.createElement('div');
    item.className = 'info-item';
    const sw = document.createElement('div');
    sw.className = 'info-swatch';
    sw.style.borderColor = lang.color;
    sw.style.backgroundColor = lang.color + '30';
    const label = document.createElement('span');
    label.textContent = `${lang.label}: ${lang.vowels.length} vowels`;
    item.appendChild(sw); item.appendChild(label);
    bar.appendChild(item);
  }
}

render();
</script>
