<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Vowel Chart</title>
<style>
  :root { --bg:#141c28; --surface:#1b2436; --border:#26334a; --muted:#5a6e85; --card:#1e2c40; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    background:var(--bg); color:#e0e8f4;
    min-height:100vh; padding:24px 16px 48px;
    display:flex; flex-direction:column; align-items:center;
  }
  header { text-align:center; margin-bottom:18px; }
  header h1 { font-size:1.15rem; color:#7eb8f7; letter-spacing:.04em; margin-bottom:3px; }
  header p  { font-size:.78rem; color:var(--muted); }

  .controls { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
  .lang-btn {
    padding:5px 15px; border-radius:20px; border:2px solid;
    background:transparent; cursor:pointer; font-size:.8rem;
    font-weight:700; transition:background .15s,color .15s; line-height:1.4;
  }
  .lang-btn.on { color:#0d1117 !important; }

  .chart-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:10px; width:100%; max-width:760px;
  }
  svg#chart { display:block; width:100%; height:auto; overflow:visible; }

  /* ── Hover tooltip (non-interactive) ────────────────────── */
  .tip {
    position:fixed; pointer-events:none; z-index:999; display:none;
    background:#0d1524; border:1px solid #2d3a55; border-radius:10px;
    padding:10px 13px; min-width:170px; max-width:230px;
    box-shadow:0 6px 30px rgba(0,0,0,.7);
  }
  .tip-ipa  { font-size:2rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .tip-lang { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:3px 0 6px; }
  .tip-desc { font-size:.76rem; color:#8fa0b8; line-height:1.45; }
  .tip-word { font-size:.8rem; margin-top:6px; color:#c8d6e8; }
  .tip-word b { text-decoration:underline; font-weight:normal; }
  .tip-f    { font-size:.68rem; color:#5a7090; margin-top:4px; font-family:monospace; }
  .tip-f span { color:#7a90a8; }
  .tip-hint { font-size:.67rem; color:#3d5068; margin-top:6px; border-top:1px solid #1e2d42; padding-top:5px; }

  /* ── Legend & info bar ───────────────────────────────────── */
  .legend-strip {
    display:flex; gap:18px; justify-content:center; flex-wrap:wrap;
    margin-top:10px; font-size:.72rem; color:var(--muted);
  }
  .legend-strip span { display:flex; align-items:center; gap:6px; }
  .info-bar {
    display:flex; gap:14px; flex-wrap:wrap;
    justify-content:center; margin-top:12px; font-size:.75rem; color:var(--muted);
  }
  .info-item { display:flex; align-items:center; gap:6px; }
  .info-swatch { width:11px; height:11px; border-radius:50%; border:2px solid; flex-shrink:0; }

  /* ── Comparison section ──────────────────────────────────── */
  .compare-wrap {
    width:100%; max-width:760px; margin-top:28px;
  }
  .compare-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .compare-title {
    font-size:.85rem; color:#7eb8f7; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .compare-badge {
    background:#1e2d42; border:1px solid #2d4060; color:#5a8ab0;
    font-size:.7rem; padding:1px 7px; border-radius:10px;
  }
  .clear-btn {
    background:transparent; border:1px solid #2d4060; color:#5a7090;
    padding:4px 12px; border-radius:8px; cursor:pointer; font-size:.75rem;
    transition:border-color .15s, color .15s;
  }
  .clear-btn:hover { border-color:#60a5fa; color:#60a5fa; }

  .compare-empty {
    background:var(--surface); border:1px dashed #26334a; border-radius:12px;
    padding:28px; text-align:center; color:#3d5068; font-size:.82rem;
    line-height:1.5;
  }
  .compare-empty span { display:block; font-size:1.4rem; margin-bottom:8px; opacity:.5; }

  .compare-grid {
    display:flex; gap:12px; flex-wrap:wrap;
  }

  /* ── Comparison card ─────────────────────────────────────── */
  .ccard {
    background:var(--card); border:2px solid; border-radius:14px;
    padding:14px 13px 12px; width:168px; flex-shrink:0;
    position:relative; display:flex; flex-direction:column; gap:7px;
  }
  .ccard-remove {
    position:absolute; top:8px; right:9px;
    background:transparent; border:none; color:#3d5068;
    font-size:1rem; cursor:pointer; line-height:1; padding:0 2px;
    transition:color .15s;
  }
  .ccard-remove:hover { color:#f87171; }

  .ccard-top { display:flex; align-items:baseline; gap:7px; }
  .ccard-ipa {
    font-size:2rem; font-family:Georgia,'Noto Serif',serif; line-height:1;
  }
  .ccard-lang {
    font-size:.65rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; opacity:.85;
  }

  /* Tongue diagram container */
  .ccard-tongue {
    width:100%; border-radius:8px; overflow:hidden;
    background:#111924; border:1px solid #1e2d42;
    line-height:0;
  }
  .ccard-tongue svg { width:100%; height:auto; display:block; }

  .ccard-desc { font-size:.73rem; color:#8fa0b8; line-height:1.4; }
  .ccard-word { font-size:.75rem; color:#c8d6e8; }
  .ccard-word b { text-decoration:underline; font-weight:normal; }
  .ccard-formants { font-size:.68rem; color:#5a7090; font-family:monospace; }
  .ccard-formants span { color:#7a90a8; }

  .ccard-actions {
    display:flex; gap:6px; margin-top:auto; padding-top:4px;
    border-top:1px solid #1e2d42;
  }
  .ccard-play {
    flex:1; background:#1e2d42; border:1px solid #2d4060;
    color:#7eb8f7; padding:4px 0; border-radius:6px;
    cursor:pointer; font-size:.72rem; transition:background .15s;
  }
  .ccard-play:hover { background:#253650; }
  .ccard-wiki {
    flex:1; background:#1e2d42; border:1px solid #2d4060;
    color:#7eb8f7; padding:4px 0; border-radius:6px;
    text-align:center; text-decoration:none; font-size:.72rem;
    transition:background .15s;
  }
  .ccard-wiki:hover { background:#253650; }
</style>
</head>
<body>

<!-- vowels.js must be in the same directory as this HTML file -->
<script src="vowels.js"></script>

<header>
  <h1>IPA Vowel Chart</h1>
  <p>Hover for info · Click to compare · Toggle languages below</p>
</header>

<div class="controls" id="controls"></div>

<div class="chart-wrap">
  <svg id="chart" viewBox="0 0 740 510"></svg>
</div>

<div class="legend-strip">
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#1e2d42" stroke="#3d5068" stroke-width="1.5"/></svg>
    Cardinal reference
  </span>
  <span>
    <svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#60a5fa22" stroke="#60a5fa" stroke-width="1.5"/></svg>
    Language vowel
  </span>
  <span>
    <svg width="14" height="14">
      <circle cx="7" cy="7" r="6" fill="none" stroke="#4a8060" stroke-width="1.5" stroke-dasharray="3 2"/>
    </svg>
    Added to comparison
  </span>
</div>

<div class="info-bar" id="infoBar"></div>

<!-- ── Comparison section ────────────────────────────────────────────── -->
<div class="compare-wrap">
  <div class="compare-head">
    <span class="compare-title">
      Comparison
      <span class="compare-badge" id="compareBadge">0 selected</span>
    </span>
    <button class="clear-btn" id="clearBtn">Clear all</button>
  </div>
  <div class="compare-empty" id="compareEmpty">
    <span>⇧</span>
    Click any vowel on the chart to add it here and compare side by side
  </div>
  <div class="compare-grid" id="compareGrid"></div>
</div>

<div id="tip" class="tip"></div>

<script>
// ─── Fallback if vowels.js failed to load ────────────────────────────────────
if (typeof LANGS === 'undefined') {
  document.body.innerHTML = `
    <div style="padding:40px;color:#f87171;text-align:center;font-family:sans-serif">
      <h2>Could not load vowels.js</h2>
      <p style="margin-top:10px;color:#8fa0b8">
        Both files must be served together.<br>
        Run a local server: <code>npx serve .</code> or <code>python3 -m http.server</code>
      </p>
    </div>`;
}

// ─── Wikimedia Commons base URL ───────────────────────────────────────────────
const WM_BASE = 'https://commons.wikimedia.org/wiki/Special:Redirect/file/';

// ─── Audio helpers ────────────────────────────────────────────────────────────
let currentAudio = null;

function resolveBase(ipa) {
  return DIPHTHONG_MAP[ipa] ?? ipa.replace('ː', '');
}

function resolveAudioUrl(langKey, ipa) {
  if (USE_LOCAL_AUDIO)
    return `${LOCAL_AUDIO_BASE}${langKey}/${encodeURIComponent(ipa)}.ogg`;
  const file = WM_AUDIO[resolveBase(ipa)];
  return file ? WM_BASE + file : null;
}

function resolveWikiUrl(ipa) {
  return WIKI_ARTICLE[resolveBase(ipa)] ?? null;
}

function playVowel(langKey, ipa) {
  const url = resolveAudioUrl(langKey, ipa);
  if (!url) return;
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  currentAudio = new Audio(url);
  currentAudio.play().catch(e => console.warn('Audio:', e.message));
}

// ─── Generated tongue position SVG ───────────────────────────────────────────
// Draws a stylised sagittal cross-section driven by the vowel's articulatory
// coordinates (h = height 0→1, b = backness 0→1, rounded = lip rounding).
// No external images required — everything is computed from the data.
//
// Anatomy landmarks (viewBox 0 0 112 88):
//   Palate : curves from upper lip → hard palate peak → velum → pharynx
//   Floor  : curves from lower lip → floor of mouth → pharynx
//   Tongue : filled ellipse + tip, positioned by (tx, ty)
//   Lips   : narrow slit (unrounded) or small oval (rounded)

function generateTongueSVG(h, b, rounded, accentColor) {
  const C  = '#283d55';          // anatomy stroke (palate, jaw)
  const TC = accentColor;        // tongue stroke
  const TF = accentColor + '28'; // tongue fill

  // Jaw aperture — grows from 4px (close) to 30px (open)
  const ap     = 4 + h * 26;
  const midY   = 49;
  const lipTop = midY - ap / 2;
  const lipBot = midY + ap / 2;

  // Tongue body centre
  //   b=0 → tx=30 (front),  b=1 → tx=74 (back)
  //   h=0 → ty=33 (close),  h=1 → ty=59 (open)
  const tx = 30 + b * 44;
  const ty = 33 + h * 26;

  // Lip shape: rounded vowels get a protruded oval; unrounded get a slit
  const lip = rounded
    ? `<ellipse cx="5" cy="${midY}" rx="5" ry="${ap / 2 + 2}"
         fill="#111924" stroke="${C}" stroke-width="2.2"/>`
    : `<line x1="8" y1="${lipTop}" x2="8" y2="${lipBot}"
         stroke="${C}" stroke-width="2"/>`;

  // Tongue tip extends forward and slightly downward from the body
  const tipX1 = tx - 19, tipY1 = ty + 3;
  const tipX2 = tx - 27, tipY2 = ty + 10;
  const tipX3 = tx - 28, tipY3 = ty + 4;

  return `<svg viewBox="0 0 112 88" xmlns="http://www.w3.org/2000/svg">
  <!-- Palate (upper boundary) -->
  <path d="M8,${lipTop} C13,${lipTop - 7} 36,24 57,16 C79,16 98,25 108,43"
        fill="none" stroke="${C}" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pharynx back wall -->
  <line x1="108" y1="43" x2="108" y2="76" stroke="${C}" stroke-width="2"/>
  <!-- Floor of mouth / jaw -->
  <path d="M8,${lipBot} C20,${lipBot + 10} 50,74 82,76 C96,76 108,76 108,76"
        fill="none" stroke="${C}" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lip aperture -->
  ${lip}
  <!-- Tongue body -->
  <ellipse cx="${tx}" cy="${ty}" rx="22" ry="10"
           fill="${TF}" stroke="${TC}" stroke-width="2"/>
  <!-- Tongue tip -->
  <path d="M${tipX1},${tipY1} Q${tipX2},${tipY2} ${tipX3},${tipY3}"
        fill="${TF}" stroke="${TC}" stroke-width="1.6" stroke-linecap="round"/>
</svg>`.trim();
}

// ─── Trapezoid geometry ───────────────────────────────────────────────────────
const TRAP = { TL:{x:108,y:95}, TR:{x:638,y:95}, BL:{x:300,y:450}, BR:{x:638,y:450} };

function trapPos(h, b) {
  const fX = TRAP.TL.x + h * (TRAP.BL.x - TRAP.TL.x);
  return { x: fX + b * (TRAP.TR.x - fX), y: TRAP.TL.y + h * (TRAP.BL.y - TRAP.TL.y) };
}
const ROWS = [
  {h:0,   label:'Close'},    {h:1/6, label:'Near-close'},
  {h:2/6, label:'Close-mid'},{h:3/6, label:'Mid'},
  {h:4/6, label:'Open-mid'}, {h:5/6, label:'Near-open'},
  {h:1,   label:'Open'},
];

// ─── State ────────────────────────────────────────────────────────────────────
const active   = { cardinal:true, english:true, german:false, russian:false, norwegian:false };
// Map of compareKey → {vowel, lang, langKey}
const selected = new Map();

function compareKey(langKey, ipa) { return `${langKey}::${ipa}`; }

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function $s(tag, a={}) { const el=document.createElementNS(NS,tag); for(const [k,v] of Object.entries(a)) el.setAttribute(k,String(v)); return el; }
function $t(text, a={}) { const el=$s('text',a); el.textContent=text; return el; }

// ─── Language buttons ─────────────────────────────────────────────────────────
const ctrlEl = document.getElementById('controls');
for (const [key, lang] of Object.entries(LANGS)) {
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (active[key] ? ' on' : '');
  btn.textContent = lang.label;
  btn.style.borderColor = lang.color;
  btn.style.color = active[key] ? '#0d1117' : lang.color;
  btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
  btn.addEventListener('click', () => {
    active[key] = !active[key];
    btn.classList.toggle('on', active[key]);
    btn.style.backgroundColor = active[key] ? lang.color : 'transparent';
    btn.style.color = active[key] ? '#0d1117' : lang.color;
    render();
  });
  ctrlEl.appendChild(btn);
}

// ─── Main chart render ────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Grid lines
  for (const row of ROWS) {
    const L=trapPos(row.h,0), R=trapPos(row.h,1);
    svg.appendChild($s('line',{x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#222d40','stroke-width':1.5}));
  }
  const cT=trapPos(0,.5), cB=trapPos(1,.5);
  svg.appendChild($s('line',{x1:cT.x,y1:cT.y,x2:cB.x,y2:cB.y,stroke:'#222d40','stroke-width':1,'stroke-dasharray':'5 4'}));

  // Trapezoid outline
  const {TL,TR,BL,BR}=TRAP;
  svg.appendChild($s('path',{d:`M${TL.x},${TL.y} L${TR.x},${TR.y} L${BR.x},${BR.y} L${BL.x},${BL.y}Z`,fill:'none',stroke:'#2f3d52','stroke-width':2}));

  // Row labels
  for (const row of ROWS) {
    const p=trapPos(row.h,0);
    svg.appendChild($t(row.label,{x:p.x-10,y:p.y+4,'text-anchor':'end','font-size':10.5,fill:'#5a6e85','font-family':'system-ui,sans-serif'}));
  }
  // Column labels
  for (const [label,b] of [['Front',0],['Central',.5],['Back',1]]) {
    const p=trapPos(0,b);
    svg.appendChild($t(label,{x:p.x,y:p.y-18,'text-anchor':'middle','font-size':10.5,fill:'#5a6e85','font-family':'system-ui,sans-serif'}));
  }

  // Vowel dots — cardinals first (bottom layer)
  const layers = Object.entries(LANGS)
    .sort(([a],[b])=>(a==='cardinal'?-1:1)-(b==='cardinal'?-1:1))
    .filter(([k])=>active[k]);

  for (const [key, lang] of layers) {
    const isCard = key === 'cardinal';
    for (const v of lang.vowels) {
      const {x,y} = trapPos(v.h, v.b);
      const g = $s('g',{style:'cursor:pointer'});
      const ck = compareKey(key, v.ipa);
      const isSel = selected.has(ck);

      if (isCard) {
        // Show selection ring for cardinals too
        if (isSel) g.appendChild($s('circle',{cx:x,cy:y,r:13,fill:'none',stroke:'#4a8060','stroke-width':1.5,'stroke-dasharray':'3 2'}));
        g.appendChild($s('circle',{cx:x,cy:y,r:5,fill:'#1e2d42',stroke:'#3d5068','stroke-width':1.5}));
        const lbl=$s('text',{x,y:y-8,'text-anchor':'middle','font-size':10.5,fill:'#5a7090','font-family':'Georgia,serif'});
        lbl.textContent=v.ipa; g.appendChild(lbl);
      } else {
        const c = lang.color;
        // Selection ring
        if (isSel) g.appendChild($s('circle',{cx:x,cy:y,r:20,fill:'none',stroke:'#4a8060','stroke-width':2,'stroke-dasharray':'4 3'}));
        g.appendChild($s('circle',{cx:x,cy:y,r:16,fill:`${c}0d`,stroke:'none'}));
        g.appendChild($s('circle',{cx:x,cy:y,r:12,fill:`${c}20`,stroke:c,'stroke-width':2}));
        const lbl=$s('text',{x,y:y+5,'text-anchor':'middle','font-size':12,fill:c,'font-family':'Georgia,serif','font-weight':'bold'});
        lbl.textContent=v.ipa; g.appendChild(lbl);
      }

      g.addEventListener('mouseenter', e => showTip(e, v, lang));
      g.addEventListener('mousemove',  moveTip);
      g.addEventListener('mouseleave', hideTip);
      g.addEventListener('click', () => {
        toggleCompare(key, v, lang);
        playVowel(key, v.ipa);
        spawnPulse(svg, x, y, isCard ? '#4a6080' : lang.color, isCard ? 7 : 14);
      });
      let touchMoved=false;
      g.addEventListener('touchstart',e=>{touchMoved=false;e.preventDefault();showTip(e.touches[0],v,lang);},{passive:false});
      g.addEventListener('touchmove', e=>{touchMoved=true;e.preventDefault();moveTip(e.touches[0]);},{passive:false});
      g.addEventListener('touchend',  ()=>{hideTip();if(!touchMoved){toggleCompare(key,v,lang);playVowel(key,v.ipa);spawnPulse(svg,x,y,isCard?'#4a6080':lang.color,isCard?7:14);}});
      svg.appendChild(g);
    }
  }
  updateInfoBar();
}

// ─── Pulse ring ───────────────────────────────────────────────────────────────
function spawnPulse(svg, x, y, color, startR) {
  const ring=$s('circle',{cx:x,cy:y,r:startR,fill:'none',stroke:color,'stroke-width':2.5,opacity:.85,style:'pointer-events:none'});
  svg.appendChild(ring);
  let r=startR,op=.85;
  const step=()=>{if(!ring.parentNode)return;r+=1.5;op-=.038;ring.setAttribute('r',r);ring.setAttribute('opacity',Math.max(0,op).toFixed(3));if(op>0)requestAnimationFrame(step);else ring.parentNode?.removeChild(ring);};
  requestAnimationFrame(step);
}

// ─── Tooltip (hover only — non-interactive) ────────────────────────────────
const tip = document.getElementById('tip');

function showTip(e, v, lang) {
  tip.innerHTML = `
    <div class="tip-ipa" style="color:${lang.color}">${v.ipa}</div>
    <div class="tip-lang" style="color:${lang.color}">${lang.label}</div>
    <div class="tip-desc">${v.desc}</div>
    ${v.word ? `<div class="tip-word">e.g. ${v.word}</div>` : ''}
    ${v.f1   ? `<div class="tip-f">F1 <span>${v.f1} Hz</span> &nbsp;·&nbsp; F2 <span>${v.f2} Hz</span></div>` : ''}
    <div class="tip-hint">▶ Click to play &amp; add to comparison</div>
  `;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const x=e.clientX+18,y=e.clientY-12,r=tip.getBoundingClientRect();
  tip.style.left=Math.min(x,window.innerWidth-r.width-8)+'px';
  tip.style.top=Math.max(4,Math.min(y,window.innerHeight-r.height-8))+'px';
}
function hideTip() { tip.style.display='none'; }

// ─── Info bar ─────────────────────────────────────────────────────────────────
function updateInfoBar() {
  const bar=document.getElementById('infoBar');
  bar.innerHTML='';
  for (const [key,lang] of Object.entries(LANGS)) {
    if(!active[key]) continue;
    const item=document.createElement('div'); item.className='info-item';
    const sw=document.createElement('div'); sw.className='info-swatch';
    sw.style.borderColor=lang.color; sw.style.backgroundColor=lang.color+'30';
    const lbl=document.createElement('span'); lbl.textContent=`${lang.label}: ${lang.vowels.length} vowels`;
    item.appendChild(sw); item.appendChild(lbl); bar.appendChild(item);
  }
}

// ─── Comparison section ───────────────────────────────────────────────────────
function toggleCompare(langKey, vowel, lang) {
  const ck = compareKey(langKey, vowel.ipa);
  if (selected.has(ck)) {
    selected.delete(ck);
  } else {
    selected.set(ck, { vowel, lang, langKey });
  }
  render();           // redraw chart dots (selection rings)
  renderCompare();    // redraw comparison cards
}

function removeFromCompare(ck) {
  selected.delete(ck);
  render();
  renderCompare();
}

function renderCompare() {
  const grid  = document.getElementById('compareGrid');
  const empty = document.getElementById('compareEmpty');
  const badge = document.getElementById('compareBadge');

  badge.textContent = `${selected.size} selected`;
  grid.innerHTML = '';

  if (selected.size === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  for (const [ck, {vowel:v, lang, langKey}] of selected) {
    const c       = lang.color;
    const wikiUrl = resolveWikiUrl(v.ipa);
    const tongSVG = generateTongueSVG(v.h, v.b, v.rounded, c);

    const card = document.createElement('div');
    card.className = 'ccard';
    card.style.borderColor = c;
    card.innerHTML = `
      <button class="ccard-remove" title="Remove">×</button>
      <div class="ccard-top">
        <span class="ccard-ipa" style="color:${c}">${v.ipa}</span>
        <span class="ccard-lang" style="color:${c}">${lang.label}</span>
      </div>
      <div class="ccard-tongue">${tongSVG}</div>
      <div class="ccard-desc">${v.desc}</div>
      ${v.word ? `<div class="ccard-word">e.g. ${v.word}</div>` : ''}
      ${v.f1 ? `<div class="ccard-formants">F1 <span>${v.f1}</span> · F2 <span>${v.f2}</span> Hz</div>` : ''}
      <div class="ccard-actions">
        <button class="ccard-play">▶ Play</button>
        ${wikiUrl ? `<a class="ccard-wiki" href="${wikiUrl}" target="_blank" rel="noopener">Wiki ↗</a>` : ''}
      </div>
    `;
    card.querySelector('.ccard-remove').addEventListener('click', () => removeFromCompare(ck));
    card.querySelector('.ccard-play').addEventListener('click',   () => playVowel(langKey, v.ipa));
    grid.appendChild(card);
  }
}

// ─── Clear all ────────────────────────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  selected.clear();
  render();
  renderCompare();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
renderCompare();
</script>
</body>
</html>
