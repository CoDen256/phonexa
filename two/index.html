<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Vowel Chart</title>
<style>
  :root {
    --bg:      #1a2636;
    --surface: #213040;
    --border:  #2e4560;
    --muted:   #6a8298;
    --card:    #223042;
    --sidebar: #1e2e40;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    background:var(--bg); color:#d8e8f4;
    min-height:100vh; padding:20px 16px 60px;
    display:flex; flex-direction:column; align-items:center;
  }
  header { text-align:center; margin-bottom:16px; }
  header h1 { font-size:1.15rem; color:#7eb8f7; letter-spacing:.04em; margin-bottom:3px; }
  header p  { font-size:.76rem; color:var(--muted); }

  /* ── Page layout ─────────────────────────────────────────── */
  .page-layout {
    width:100%; max-width:1480px;
    display:flex; flex-direction:column; align-items:stretch; gap:0;
  }

  .chart-row {
    display:flex; gap:14px; align-items:flex-start; width:100%;
  }

  .chart-col { flex:1; min-width:0; }

  .chart-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:10px;
  }
  svg#chart { display:block; width:100%; height:auto; overflow:visible; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width:230px; flex-shrink:0;
    background:var(--sidebar); border:1px solid var(--border);
    border-radius:14px; padding:14px 12px;
    max-height:820px; overflow-y:auto;
  }
  .sb-title {
    font-size:.72rem; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); margin-bottom:12px; padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }

  .sb-lang { margin-bottom:12px; }
  .sb-lang-head {
    display:flex; align-items:center; gap:7px; padding:4px 2px;
    cursor:pointer; border-radius:6px;
    transition:background .1s;
    user-select:none;
  }
  .sb-lang-head:hover { background:#ffffff0a; }
  .sb-lang-name {
    font-size:.82rem; font-weight:700; letter-spacing:.02em;
    flex:1;
  }
  .sb-lang-count {
    font-size:.65rem; color:var(--muted);
  }

  /* collapse arrow */
  .sb-lang-arrow {
    font-size:.6rem; color:var(--muted);
    transition:transform .2s;
  }
  .sb-lang.collapsed .sb-lang-arrow { transform:rotate(-90deg); }
  .sb-lang.collapsed .sb-vowel-list { display:none; }

  .sb-vowel-list { padding:2px 0 4px 4px; }
  .sb-vowel-item {
    display:flex; align-items:center; gap:7px;
    padding:3px 4px; border-radius:5px; cursor:pointer;
    transition:background .1s; user-select:none;
  }
  .sb-vowel-item:hover { background:#ffffff0a; }
  .sb-vowel-item input[type=checkbox] { flex-shrink:0; cursor:pointer; width:13px; height:13px; }
  .sb-ipa {
    font-family:Georgia,'Noto Serif',serif; font-size:1rem;
    font-weight:bold; min-width:26px; line-height:1;
  }
  .sb-desc {
    font-size:.65rem; color:var(--muted); line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ── Sidebar category type selector ─────────────────────── */
  .cat-type-row {
    display:flex; margin:-14px -12px 16px;
    border-bottom:1px solid var(--border);
  }
  .cat-type-btn {
    flex:1; padding:10px 4px; text-align:center;
    font-size:.72rem; font-weight:700; letter-spacing:.03em;
    background:none; border:none; border-bottom:2px solid transparent;
    cursor:pointer; color:var(--muted);
    transition:color .15s, border-color .15s;
  }
  .cat-type-btn.active { color:#7eb8f7; border-bottom-color:#7eb8f7; }
  .cat-type-btn:hover:not(.active) { color:#a8c4da; }

  /* ── Sidebar toggle tabs (multi-selectable) ──────────────── */
  .cat-tabs {
    display:flex; flex-direction:column; gap:7px;
  }
  .cat-tab {
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; border-radius:10px;
    font-size:.82rem; font-weight:700;
    cursor:pointer; width:100%; text-align:left;
    border:1.5px solid; transition:background .12s, opacity .12s, border-color .12s;
    opacity:0.45;
  }
  .cat-tab.on { opacity:1; }
  .cat-tab:hover { opacity:0.75; }
  .cat-tab.on:hover { opacity:0.88; }
  .cat-tab-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
  }

  /* ── Legend ──────────────────────────────────────────────── */
  .legend {
    margin-top:8px; font-size:.71rem; color:var(--muted);
    text-align:center; line-height:1.7;
  }
  .legend b { color:#b8cee4; font-weight:600; }

  /* ── Tooltip ─────────────────────────────────────────────── */
  .tip {
    position:fixed; pointer-events:none; z-index:999; display:none;
    background:#14202e; border:1px solid #2e4560; border-radius:10px;
    padding:10px 13px; min-width:175px; max-width:248px;
    box-shadow:0 6px 28px rgba(0,0,0,.75);
  }
  .tip-ipa  { font-size:2rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .tip-lang { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:3px 0 5px; }
  .tip-desc { font-size:.75rem; color:#8fa8c0; line-height:1.45; }
  .tip-word { font-size:.78rem; margin-top:5px; color:#c8d8e8; }
  .tip-word b { text-decoration:underline; font-weight:normal; }
  .tip-f    { font-size:.67rem; color:#587898; margin-top:4px; font-family:monospace; }
  .tip-f span { color:#789ab8; }

  /* ── Detail section ──────────────────────────────────────── */
  .detail-section { margin-top:22px; width:100%; }
  .detail-empty {
    background:var(--surface); border:1px dashed var(--border);
    border-radius:12px; padding:24px; text-align:center;
    color:#3a5878; font-size:.82rem;
  }
  .detail-lang-block { margin-bottom:22px; }
  .detail-lang-title {
    font-size:.82rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .detail-lang-title::after {
    content:''; flex:1; height:1px; background:currentColor; opacity:.2;
  }
  .detail-cards-row {
    display:flex; gap:10px; flex-wrap:wrap;
  }

  /* ── Detail card ─────────────────────────────────────────── */
  .dcard {
    background:var(--card); border:2px solid;
    border-radius:12px; padding:12px 12px 10px;
    width:162px; flex-shrink:0;
    display:flex; flex-direction:column; gap:5px;
  }
  .dcard-ipa  { font-size:1.9rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .dcard-desc { font-size:.71rem; color:#8fa8c0; line-height:1.4; }
  .dcard-round { font-size:.66rem; }
  .dcard-word  { font-size:.72rem; color:#c8d8e8; }
  .dcard-word b { text-decoration:underline; font-weight:normal; }
  .dcard-formants { font-size:.66rem; color:#587898; font-family:monospace; }
  .dcard-formants span { color:#789ab8; }
  .dcard-actions {
    display:flex; gap:5px; margin-top:auto; padding-top:6px;
    border-top:1px solid #253548;
  }
  .dcard-play {
    flex:1; background:#1a2e48; border:1px solid #2a4060;
    color:#7eb8f7; padding:4px 0; border-radius:5px;
    cursor:pointer; font-size:.7rem; transition:background .15s;
  }
  .dcard-play:hover { background:#1f3a58; }
  .dcard-wiki {
    flex:1; background:#1a2e48; border:1px solid #2a4060;
    color:#7eb8f7; padding:4px 0; border-radius:5px;
    text-align:center; text-decoration:none; font-size:.7rem;
    transition:background .15s;
  }
  .dcard-wiki:hover { background:#1f3a58; }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 800px) {
    .chart-row { flex-direction:column; }
    .sidebar { width:100%; max-height:280px; }
  }
</style>
</head>
<body>

<script src="vowels.js"></script>

<header>
  <h1>IPA Vowel Chart</h1>
  <p>Use the checklist → to show vowels · Hover on chart for details</p>
</header>

<div class="page-layout">
  <div class="chart-row">

    <!-- Chart -->
    <div class="chart-col">
      <div class="chart-wrap">
        <svg id="chart" viewBox="0 0 1200 720"></svg>
      </div>
      <div class="legend">
        <b>·</b> exact position &nbsp;|&nbsp;
        label <b>left</b> of dot = unrounded &nbsp;|&nbsp;
        label <b>right</b> of dot = rounded
      </div>
    </div>

    <!-- Sidebar checklist -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-title">Show vowels</div>
      <!-- populated by JS -->
    </aside>

  </div><!-- .chart-row -->

  <!-- Detail cards (below chart + sidebar) -->
  <div class="detail-section" id="detailSection"></div>

</div><!-- .page-layout -->

<div id="tip" class="tip"></div>

<script>
if (typeof LANGS === 'undefined') {
  document.body.innerHTML = `<div style="padding:40px;color:#f87171;text-align:center">
    <h2>Could not load vowels.js</h2>
    <p style="margin-top:10px;color:#8fa0b8">Serve both files together:<br>
    <code>npx serve .</code> &nbsp;or&nbsp; <code>python3 -m http.server</code></p></div>`;
}

// ─── Audio ────────────────────────────────────────────────────────────────────
const WM_BASE = 'https://commons.wikimedia.org/wiki/Special:Redirect/file/';
let currentAudio = null;
function resolveBase(ipa) { return DIPHTHONG_MAP[ipa] ?? ipa.replace('ː',''); }
function resolveAudioUrl(lk, ipa) {
  if (USE_LOCAL_AUDIO) return `${LOCAL_AUDIO_BASE}${lk}/${encodeURIComponent(ipa)}.ogg`;
  const f = WM_AUDIO[resolveBase(ipa)]; return f ? WM_BASE+f : null;
}
function resolveWikiUrl(ipa) { return WIKI_ARTICLE[resolveBase(ipa)] ?? null; }
function playVowel(lk, ipa) {
  const url = resolveAudioUrl(lk, ipa); if (!url) return;
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  currentAudio = new Audio(url);
  currentAudio.play().catch(e => console.warn('Audio:', e.message));
}

// ─── Trapezoid ────────────────────────────────────────────────────────────────
// Right edge vertical (TR.x === BR.x). Large for readability.
const TRAP = {
  TL:{x:155, y:110},  TR:{x:1115, y:110},  // top span: 960px
  BL:{x:390, y:618},  BR:{x:1115, y:618},  // bottom span: 725px,  height: 508px
};
function trapPos(h, b) {
  const fX = TRAP.TL.x + h*(TRAP.BL.x - TRAP.TL.x);
  return { x: fX + b*(TRAP.TR.x - fX), y: TRAP.TL.y + h*(TRAP.BL.y - TRAP.TL.y) };
}
const ROWS = [
  {h:0,   label:'Close'},    {h:1/6, label:'Near-close'},
  {h:2/6, label:'Close-mid'},{h:3/6, label:'Mid'},
  {h:4/6, label:'Open-mid'}, {h:5/6, label:'Near-open'},
  {h:1,   label:'Open'},
];

// ─── Filter state ─────────────────────────────────────────────────────────────
// filterType controls which category system is active.
// activeLangs / activeRoundness track which tabs are toggled on.
// checkedVowels is derived — call updateFilter() after any state change.
let filterType = 'language';
const activeLangs = new Set(['cardinal', 'english']);
const activeRoundness = new Set(['rounded', 'unrounded']);
const checkedVowels = new Set();
function compareKey(lk, ipa) { return `${lk}::${ipa}`; }

// Track individual vowel selection per language
const langVowelSelections = new Map();

function updateFilter() {
  checkedVowels.clear();
  
  if (filterType === 'language') {
    for (const [lk, lang] of Object.entries(LANGS)) {
      if (!activeLangs.has(lk)) continue;
      
      // If no specific vowels selected for this language, show all
      const selectedVowels = langVowelSelections.get(lk);
      if (!selectedVowels || selectedVowels.size === 0) {
        for (const v of lang.vowels) checkedVowels.add(compareKey(lk, v.ipa));
      } else {
        // Only show explicitly selected vowels
        for (const v of lang.vowels) {
          if (selectedVowels.has(v.ipa)) checkedVowels.add(compareKey(lk, v.ipa));
        }
      }
    }
  } else { // roundness
    for (const [lk, lang] of Object.entries(LANGS)) {
      for (const v of lang.vowels) {
        if (activeRoundness.has(v.rounded ? 'rounded' : 'unrounded'))
          checkedVowels.add(compareKey(lk, v.ipa));
      }
    }
  }
}
updateFilter(); // populate on load

// ─── SVG helpers ──────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';
function $s(tag, a={}) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a)) el.setAttribute(k, String(v));
  return el;
}
function $t(str, a={}) { const el=$s('text',a); el.textContent=str; return el; }

function ipaWidth(ipa, fs) {
  let w=0; for(const ch of ipa) w += ch==='ː'?0.36:0.65;
  return w*fs;
}

// ─── Chart render ─────────────────────────────────────────────────────────────
function render() {
  const svg = document.getElementById('chart');
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Grid lines
  for (const row of ROWS) {
    const L=trapPos(row.h,0), R=trapPos(row.h,1);
    svg.appendChild($s('line',{x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#2e4560','stroke-width':1.5}));
  }
  const cT=trapPos(0,.5), cB=trapPos(1,.5);
  svg.appendChild($s('line',{x1:cT.x,y1:cT.y,x2:cB.x,y2:cB.y,stroke:'#2e4560','stroke-width':1,'stroke-dasharray':'6 5'}));

  // Trapezoid
  const {TL,TR,BL,BR}=TRAP;
  svg.appendChild($s('path',{
    d:`M${TL.x},${TL.y} L${TR.x},${TR.y} L${BR.x},${BR.y} L${BL.x},${BL.y}Z`,
    fill:'none', stroke:'#385878', 'stroke-width':2,
  }));

  // Row labels (left, following front edge) — bigger for readability
  for (const row of ROWS) {
    const p=trapPos(row.h,0);
    svg.appendChild($t(row.label,{
      x:p.x-16, y:p.y, dy:'0.36em',
      'text-anchor':'end','font-size':13,fill:'#6a8298',
      'font-family':'system-ui,sans-serif',
    }));
  }
  // Column labels
  for (const [label,b] of [['Front',0],['Central',.5],['Back',1]]) {
    const p=trapPos(0,b);
    svg.appendChild($t(label,{
      x:p.x, y:p.y-28,
      'text-anchor':'middle','font-size':13,fill:'#6a8298',
      'font-family':'system-ui,sans-serif',
    }));
  }

  // Layer order:
  //   1. langLayer  — language letter groups  (hover tooltip, background)
  //   2. cardLayer  — cardinal letter groups  (hover tooltip, above language)
  //   3. dotLayer   — ALL dots, interactive,  TOPMOST so always clickable
  //
  // Dots are on top of letters so a click near a position always hits the dot
  // even when multiple language letters overlap at the same spot.

  const langLayer = $s('g');
  const cardLayer = $s('g');
  const dotLayer  = $s('g');          // no pointer-events override — it's interactive
  svg.appendChild(langLayer);
  svg.appendChild(cardLayer);
  svg.appendChild(dotLayer);          // last = topmost

  const SF = 'drop-shadow(0px 1px 2px rgba(0,0,0,0.45))';
  const DOT_R_C = 4, DOT_R_L = 5;  // cardinal / language visual dot radius
  const DOT_HIT = 12;               // transparent hit radius for dots

  for (const [key, lang] of Object.entries(LANGS)) {
    const isCard  = key === 'cardinal';
    const lyrLbl  = isCard ? cardLayer : langLayer;
    const FS      = isCard ? 15 : 22;
    const GAP = 5, PAD = 4;
    const dotR    = isCard ? DOT_R_C : DOT_R_L;
    const fillOp  = isCard ? 0.70 : 0.78;
    const lblFill = isCard ? '#9ab8d0' : lang.color;
    const dotFill = isCard ? '#7090b8cc' : lang.color + 'bb';
    const dotColor = isCard ? '#7090b8' : lang.color;

    for (const v of lang.vowels) {
      const ck = compareKey(key, v.ipa);
      if (!checkedVowels.has(ck)) continue;
      const {x:dx, y:dy_} = trapPos(v.h, v.b);

      // ── Letter group — always clickable ─────────────────────
      const lx     = v.rounded ? dx+dotR+GAP : dx-dotR-GAP;
      const anchor = v.rounded ? 'start' : 'end';
      const tw     = ipaWidth(v.ipa, FS);
      const hitX   = (v.rounded ? lx : lx-tw) - PAD;
      const hitY   = dy_ - FS*0.40 - PAD;

      const lg = $s('g', {style:'cursor:pointer'});
      lg.appendChild($s('rect',{
        x:hitX, y:hitY, width:tw+PAD*2, height:FS*0.82+PAD*2,
        rx:3, fill:'transparent',
      }));
      lg.appendChild($t(v.ipa, {
        x:lx, y:dy_, dy:'0.36em',
        'text-anchor':anchor, 'font-size':FS,
        fill:lblFill, opacity:fillOp,
        'font-family':"Georgia,'Noto Serif',serif",
        'font-weight':isCard?'normal':'bold',
        style:`filter:${SF}; user-select:none`,
      }));
      lg.addEventListener('mouseenter', e => showTip(e, v, lang));
      lg.addEventListener('mousemove',  moveTip);
      lg.addEventListener('mouseleave', hideTip);
      lg.addEventListener('click', () => { playVowel(key,v.ipa); spawnPulse(dx,dy_,dotColor); });
      lyrLbl.appendChild(lg);

      // ── Dot group — topmost, ALWAYS wins click priority ──────
      const dg = $s('g', {style:'cursor:pointer'});
      dg.appendChild($s('circle',{cx:dx,cy:dy_,r:DOT_HIT,fill:'transparent'}));
      dg.appendChild($s('circle',{cx:dx,cy:dy_,r:dotR,fill:dotFill}));
      dg.addEventListener('mouseenter', e => showTip(e, v, lang));
      dg.addEventListener('mousemove',  moveTip);
      dg.addEventListener('mouseleave', hideTip);
      dg.addEventListener('click', () => { playVowel(key,v.ipa); spawnPulse(dx,dy_,dotColor); });
      let tm=false;
      dg.addEventListener('touchstart',e=>{tm=false;e.preventDefault();showTip(e.touches[0],v,lang);},{passive:false});
      dg.addEventListener('touchmove', e=>{tm=true; moveTip(e.touches[0]);},{passive:false});
      dg.addEventListener('touchend',  ()=>{hideTip();if(!tm){playVowel(key,v.ipa);spawnPulse(dx,dy_,dotColor);}});
      dotLayer.appendChild(dg);
    }
  }
}

// ─── Pulse (used by detail card play button) ──────────────────────────────────
function spawnPulse(x, y, color) {
  const svg = document.getElementById('chart');
  const ring = $s('circle',{cx:x,cy:y,r:5,fill:'none',stroke:color,'stroke-width':2,opacity:.9,style:'pointer-events:none'});
  svg.appendChild(ring);
  let r=5, op=.9;
  const step=()=>{
    if(!ring.parentNode) return;
    r+=2; op-=.045;
    ring.setAttribute('r',r); ring.setAttribute('opacity',Math.max(0,op).toFixed(3));
    if(op>0) requestAnimationFrame(step);
    else ring.parentNode?.removeChild(ring);
  };
  requestAnimationFrame(step);
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
const tip = document.getElementById('tip');
function showTip(e, v, lang) {
  tip.innerHTML = `
    <div class="tip-ipa" style="color:${lang.color}">${v.ipa}</div>
    <div class="tip-lang" style="color:${lang.color}">${lang.label}</div>
    <div class="tip-desc">${v.desc}</div>
    ${v.word ? `<div class="tip-word">e.g. ${v.word}</div>` : ''}
    ${v.f1   ? `<div class="tip-f">F1 <span>${v.f1} Hz</span> &nbsp;·&nbsp; F2 <span>${v.f2} Hz</span></div>` : ''}
  `;
  tip.style.display='block'; moveTip(e);
}
function moveTip(e) {
  const x=e.clientX+18, y=e.clientY-12, r=tip.getBoundingClientRect();
  tip.style.left=Math.min(x,window.innerWidth-r.width-8)+'px';
  tip.style.top=Math.max(4,Math.min(y,window.innerHeight-r.height-8))+'px';
}
function hideTip() { tip.style.display='none'; }

// ─── Sidebar ──────────────────────────────────────────────────────────────────
// Two-level design:
//   Level 1 — "Category type" selector:  Language | Roundness
//   Level 2 — Toggle tabs for each item in the chosen category.
//             Multiple tabs can be active simultaneously (multi-select).
//             Active = filled, dim = inactive.
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  // ── Level 1: Category type buttons ───────────────────────────
  const typeRow = document.createElement('div');
  typeRow.className = 'cat-type-row';

  const TYPES = [
    {id:'language',  label:'Language'},
    {id:'roundness', label:'Roundness'},
  ];
  for (const t of TYPES) {
    const btn = document.createElement('button');
    btn.className = 'cat-type-btn' + (filterType===t.id ? ' active' : '');
    btn.textContent = t.label; btn.type = 'button';
    btn.addEventListener('click', () => {
      if (filterType === t.id) return;
      filterType = t.id;
      updateFilter(); buildSidebar(); render(); renderDetail();
    });
    typeRow.appendChild(btn);
  }
  sb.appendChild(typeRow);

  // ── Level 2: Toggle tabs ──────────────────────────────────────
  const tabWrap = document.createElement('div');
  tabWrap.className = 'cat-tabs';

  if (filterType === 'language') {
    // One toggle tab per language
    for (const [lk, lang] of Object.entries(LANGS)) {
      const tab = makeCatTab(
        lang.label, lang.color, activeLangs.has(lk),
        () => {
          if (activeLangs.has(lk)) activeLangs.delete(lk);
          else activeLangs.add(lk);
          updateFilter(); buildSidebar(); render(); renderDetail();
        }
      );
      
      // Add vowel checkboxes for each language
      const vowelList = document.createElement('div');
      vowelList.className = 'sb-vowel-list';
      
      if (activeLangs.has(lk)) {
        for (const v of lang.vowels) {
          const item = document.createElement('div');
          item.className = 'sb-vowel-item';
          
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = langVowelSelections.get(lk)?.has(v.ipa) || false;
          
          checkbox.addEventListener('change', () => {
            if (!langVowelSelections.has(lk)) langVowelSelections.set(lk, new Set());
            const selected = langVowelSelections.get(lk);
            
            if (checkbox.checked) {
              selected.add(v.ipa);
            } else {
              selected.delete(v.ipa);
            }
            
            updateFilter(); render(); renderDetail();
          });
          
          const ipaSpan = document.createElement('span');
          ipaSpan.className = 'sb-ipa';
          ipaSpan.textContent = v.ipa;
          
          const descSpan = document.createElement('span');
          descSpan.className = 'sb-desc';
          descSpan.textContent = v.desc;
          
          item.appendChild(checkbox);
          item.appendChild(ipaSpan);
          item.appendChild(descSpan);
          vowelList.appendChild(item);
        }
      }
      
      tab.appendChild(vowelList);
      tabWrap.appendChild(tab);
    }
  } else {
    // Rounded / Unrounded
    const ROUND_OPTS = [
      {id:'unrounded', label:'Unrounded', color:'#7eb8f7'},
      {id:'rounded',   label:'Rounded',   color:'#c084fc'},
    ];
    for (const opt of ROUND_OPTS) {
      tabWrap.appendChild(makeCatTab(
        opt.label, opt.color, activeRoundness.has(opt.id),
        () => {
          if (activeRoundness.has(opt.id)) activeRoundness.delete(opt.id);
          else activeRoundness.add(opt.id);
          updateFilter(); buildSidebar(); render(); renderDetail();
        }
      ));
    }
  }
  sb.appendChild(tabWrap);
}

// Build a single toggleable category tab
function makeCatTab(label, color, isOn, onClick) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cat-tab' + (isOn ? ' on' : '');

  // Color dot
  const dot = document.createElement('span');
  dot.className = 'cat-tab-dot';
  dot.style.backgroundColor = color;
  btn.appendChild(dot);
  btn.appendChild(document.createTextNode(label));

  // Style
  btn.style.setProperty('--tc', color);
  if (isOn) {
    btn.style.borderColor = color;
    btn.style.color = color;
    btn.style.backgroundColor = color + '22';
  } else {
    btn.style.borderColor = '#2e4560';
    btn.style.color = '#5a7898';
    btn.style.backgroundColor = 'transparent';
  }
  btn.addEventListener('click', onClick);
  return btn;
}

// ─── Detail cards (sorted by chart position, no language grouping) ────────────
function renderDetail() {
  const section = document.getElementById('detailSection');
  section.innerHTML = '';

  // Collect all checked vowels across all languages
  const all = [];
  for (const [langKey, lang] of Object.entries(LANGS)) {
    for (const v of lang.vowels) {
      if (checkedVowels.has(compareKey(langKey, v.ipa))) {
        all.push({langKey, lang, v});
      }
    }
  }

  if (all.length === 0) {
    section.innerHTML = `<div class="detail-empty">
      Select vowels from the checklist → to see them here and on the chart
    </div>`;
    return;
  }

  // Sort by chart position: h (close first) then b (front first)
  all.sort((a, b) => {
    const dh = a.v.h - b.v.h;
    if (Math.abs(dh) > 0.001) return dh;
    return a.v.b - b.v.b;
  });

  const grid = document.createElement('div');
  grid.className = 'detail-cards-row';

  for (const {langKey, lang, v} of all) {
    const c = lang.color;
    const wikiUrl = resolveWikiUrl(v.ipa);
    const {x:dx, y:dy_} = trapPos(v.h, v.b);

    const card = document.createElement('div');
    card.className = 'dcard'; card.style.borderColor = c;
    card.innerHTML = `
      <div class="dcard-ipa" style="color:${c}">${v.ipa}</div>
      <div class="dcard-desc" style="color:${c}bb;font-size:.65rem;font-weight:700;margin:-2px 0 1px">${lang.label}</div>
      <div class="dcard-desc">${v.desc}</div>
      <div class="dcard-round" style="color:${c}88">${v.rounded?'⊙ Rounded':'○ Unrounded'}</div>
      ${v.word ? `<div class="dcard-word">e.g. ${v.word}</div>` : ''}
      ${v.f1   ? `<div class="dcard-formants">F1 <span>${v.f1}</span> · F2 <span>${v.f2}</span> Hz</div>` : ''}
      <div class="dcard-actions">
        <button class="dcard-play">▶ Play</button>
        ${wikiUrl ? `<a class="dcard-wiki" href="${wikiUrl}" target="_blank" rel="noopener">Wiki ↗</a>` : ''}
      </div>
    `;
    card.querySelector('.dcard-play').addEventListener('click', () => {
      playVowel(langKey, v.ipa); spawnPulse(dx, dy_, c);
    });
    grid.appendChild(card);
  }
  section.appendChild(grid);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
buildSidebar();
render();
renderDetail();
</script>
