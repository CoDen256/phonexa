<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real-time Formants</title>
  <style>
    body { background: #0e1117; color: #eee; font-family: monospace;
           display: flex; flex-direction: column; align-items: center; padding: 24px; }
    h2   { margin-bottom: 4px; }
    .row { display: flex; gap: 24px; margin-top: 16px; }

    canvas { border: 1px solid #333; border-radius: 6px; }
    #status{ margin-top: 12px; font-size: .85rem; color: #888; }

    .label { text-align: center; font-size: .8rem; color: #888; margin-top: 4px; }

    button {
      margin-top: 16px; padding: 10px 28px; border-radius: 6px; border: none;
      background: #4f8ef7; color: #fff; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #3a7be0; }
    #timeCanvas { display: block; }
    #rmsCanvas  { display: block; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Real-time Formant Tracker (F1 / F2)</h2>
  <button id="btn">▶ Start</button>
  <p id="status">Idle</p>

  <div class="row">
    <!-- Scrolling time plot -->
    <div>
      <canvas id="timeCanvas" width="680" height="240"></canvas>
      <canvas id="rmsCanvas" width="680" height="240"></canvas>
      <div class="label">F1 (red) &amp; F2 (cyan) over time</div>
    </div>
    <!-- Vowel space -->
    <div>
      <canvas id="vowelCanvas" width="280" height="280"></canvas>
      <div class="label">Vowel space  (F2 →, F1 ↓)</div>
    </div>
  </div>

<script>
// ─── Configuration ────────────────────────────────────────────────────────────
const WS_URL      = "ws://localhost:8765";
const F1_MIN = 200,  F1_MAX = 1000;   // Hz range for display
const F2_MIN = 500,  F2_MAX = 3000;
const HISTORY_LEN = 200;              // data-points kept in scrolling plot
const TRAIL_LEN   = 60;              // vowel-space trail dots

// ─── State ────────────────────────────────────────────────────────────────────
let ws, audioCtx, worklet, mediaStream;
let running = false;

const f1History = [];
const f2History = [];
const trail     = [];    // [{f1,f2}] for vowel space

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const tcvs = document.getElementById("timeCanvas");
const tctx = tcvs.getContext("2d");
const vcvs = document.getElementById("vowelCanvas");
const vctx = vcvs.getContext("2d");
const rcvs = document.getElementById("rmsCanvas");
const rctx = rcvs.getContext("2d");


// ─── Helpers ─────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const norm  = (v, lo, hi) => clamp((v - lo) / (hi - lo), 0, 1);

let currentRms = 0;
const rmsHistory  = [];
const RMS_MIN   = 0.00001;   // bottom of display (your noise floor)
const RMS_MAX   = 1.0;       // top of display
const RMS_FLOOR = 0.01;     // gate threshold
const LABEL_W   = 52;        // pixels reserved for y-axis labels


// ─── Draw scrolling time plot ─────────────────────────────────────────────────
function drawTime() {
  const W = tcvs.width, H = tcvs.height;
  const METER_W = 18;      // pixel width of the bar
  const PLOT_W  = W - METER_W - 6;   // shrink plot area to make room

  tctx.clearRect(0, 0, W, H);

  // ── grid (scoped to plot area) ────────────────────────────────
  tctx.strokeStyle = "#222"; tctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(r => {
    tctx.beginPath();
    tctx.moveTo(0, r * H); tctx.lineTo(PLOT_W, r * H);
    tctx.stroke();
  });

  // ── formant traces (use PLOT_W instead of W) ──────────────────
  const draw = (data, color, fMin, fMax) => {
    if (data.length < 2) return;
    tctx.strokeStyle = color; tctx.lineWidth = 2;
    tctx.beginPath();
    data.forEach((v, i) => {
      if (v == null) return;
      const x = (i / HISTORY_LEN) * PLOT_W;
      const y = (1 - norm(v, fMin, fMax)) * H;
      i === 0 || data[i-1] == null ? tctx.moveTo(x, y) : tctx.lineTo(x, y);
    });
    tctx.stroke();
  };

  draw(f1History, "#ff4c4c", F1_MIN, F1_MAX);
  draw(f2History, "#00d4ff", F2_MIN, F2_MAX);

  // readout
  const f1 = f1History.at(-1), f2 = f2History.at(-1);
  tctx.fillStyle = "#ff4c4c"; tctx.font = "bold 14px monospace";
  tctx.fillText(`F1: ${f1 ?? "–"} Hz`, PLOT_W - 130, 20);
  tctx.fillStyle = "#00d4ff";
  tctx.fillText(`F2: ${f2 ?? "–"} Hz`, PLOT_W - 130, 38);

  // ── RMS meter bar ─────────────────────────────────────────────
  const meterX = PLOT_W + 6;

  // background track
  tctx.fillStyle = "#1a1a1a";
  tctx.fillRect(meterX, 0, METER_W, H);

  // threshold line
  const threshY = (1 - norm(RMS_FLOOR, 0, RMS_MAX)) * H;
  tctx.strokeStyle = "#555"; tctx.lineWidth = 1;
  tctx.setLineDash([3, 3]);
  tctx.beginPath();
  tctx.moveTo(meterX, threshY); tctx.lineTo(meterX + METER_W, threshY);
  tctx.stroke();
  tctx.setLineDash([]);

  // filled level
  const level = norm(currentRms, 0, RMS_MAX);
  const barH  = level * H;
  const barY  = H - barH;

  // colour: green below threshold, yellow mid, red near peak
  const r = Math.round(255 * Math.min(1, level * 2));
  const g = Math.round(255 * Math.min(1, 2 - level * 2));
  tctx.fillStyle = currentRms < RMS_FLOOR
    ? "#2a2a2a"                         // muted when gated
    : `rgb(${r},${g},30)`;
  tctx.fillRect(meterX, barY, METER_W, barH);

  // current value label
  tctx.fillStyle = "#666"; tctx.font = "9px monospace";
  tctx.save();
  tctx.translate(meterX + METER_W - 4, H - 4);
  tctx.rotate(-Math.PI / 2);
  tctx.fillText(`RMS ${currentRms.toFixed(3)}`, 0, 0);
  tctx.restore();
}

// ─── Draw vowel space ─────────────────────────────────────────────────────────
function drawVowel() {
  const W = vcvs.width, H = vcvs.height;
  vctx.clearRect(0, 0, W, H);

  // grid
  vctx.strokeStyle = "#1e2530"; vctx.lineWidth = 1;
  [0.25,0.5,0.75].forEach(r => {
    vctx.beginPath(); vctx.moveTo(r*W,0); vctx.lineTo(r*W,H); vctx.stroke();
    vctx.beginPath(); vctx.moveTo(0,r*H); vctx.lineTo(W,r*H); vctx.stroke();
  });

  // rough IPA vowel reference (F2, F1) — approximate centroids
  const refs = [
    {label:"i", f2:2400, f1:280},  {label:"e", f2:2100, f1:420},
    {label:"ɛ", f2:1900, f1:580},  {label:"a", f2:1200, f1:800},
    {label:"ɔ", f2:800,  f1:600},  {label:"o", f2:700,  f1:450},
    {label:"u", f2:650,  f1:300},  {label:"ə", f2:1400, f1:500},
    {label:"æ", f2:1800, f1:700},
  ];
  refs.forEach(({label, f1, f2}) => {
    // F2 on x-axis (high→left like IPA), F1 on y-axis (high→down)
    const x = (1 - norm(f2, F2_MIN, F2_MAX)) * W;
    const y = norm(f1, F1_MIN, F1_MAX) * H;
    vctx.fillStyle = "#2a3040";
    vctx.beginPath(); vctx.arc(x, y, 14, 0, 2*Math.PI); vctx.fill();
    vctx.fillStyle = "#445"; vctx.font = "13px serif";
    vctx.fillText(label, x - 5, y + 5);
  });

  // trail
  trail.forEach(({f1, f2}, i) => {
    if (f1 == null || f2 == null) return;
    const alpha = i / trail.length;
    const x = (1 - norm(f2, F2_MIN, F2_MAX)) * W;
    const y = norm(f1, F1_MIN, F1_MAX) * H;
    vctx.fillStyle = `rgba(255,200,0,${alpha * 0.7})`;
    vctx.beginPath(); vctx.arc(x, y, 4, 0, 2*Math.PI); vctx.fill();
  });

  // current dot
  const f1 = f1History.at(-1), f2 = f2History.at(-1);
  if (f1 && f2) {
    const x = (1 - norm(f2, F2_MIN, F2_MAX)) * W;
    const y = norm(f1, F1_MIN, F1_MAX) * H;
    vctx.fillStyle = "#ffd700";
    vctx.beginPath(); vctx.arc(x, y, 7, 0, 2*Math.PI); vctx.fill();
  }

  // axis labels
  vctx.fillStyle = "#666"; vctx.font = "11px monospace";
  vctx.fillText("← F2 (Hz) →", W/2 - 40, H - 6);
  vctx.save(); vctx.translate(12, H/2);
  vctx.rotate(-Math.PI/2);
  vctx.fillText("F1 (Hz) ↓", -30, 0);
  vctx.restore();
}

function logNorm(v) {
  // maps RMS_MIN..RMS_MAX → 0..1 on a log scale
  return (Math.log10(Math.max(v, RMS_MIN)) - Math.log10(RMS_MIN))
       / (Math.log10(RMS_MAX) - Math.log10(RMS_MIN));
}

function drawRms() {
  const W = rcvs.width, H = rcvs.height;
  const plotW = W - LABEL_W;

  rctx.clearRect(0, 0, W, H);

  // ── y-axis tick marks and labels ────────────────────────────────
  const ticks = [0.00001, 0.0001, 0.001, 0.01, 0.1, 0.5];
  rctx.font = "10px monospace";

  ticks.forEach(val => {
    const y = (1 - logNorm(val)) * H;

    // grid line across plot area
    rctx.strokeStyle = "#222"; rctx.lineWidth = 1;
    rctx.setLineDash([2, 4]);
    rctx.beginPath();
    rctx.moveTo(LABEL_W, y); rctx.lineTo(W, y);
    rctx.stroke();
    rctx.setLineDash([]);

    // tick
    rctx.strokeStyle = "#444"; rctx.lineWidth = 1;
    rctx.beginPath();
    rctx.moveTo(LABEL_W - 4, y); rctx.lineTo(LABEL_W, y);
    rctx.stroke();

    // label — right-align inside the label column
    rctx.fillStyle = "#666";
    rctx.textAlign = "right";
    rctx.fillText(val < 0.001
      ? val.toExponential(0)     // 1e-5, 1e-4
      : val.toString(),          // 0.001, 0.01, 0.1, 0.5
      LABEL_W - 7, y + 3);
  });

  rctx.textAlign = "left";   // reset

  // ── gate threshold line ──────────────────────────────────────────
  const threshY = (1 - logNorm(RMS_FLOOR)) * H;
  rctx.strokeStyle = "#555"; rctx.lineWidth = 1;
  rctx.setLineDash([5, 4]);
  rctx.beginPath();
  rctx.moveTo(LABEL_W, threshY); rctx.lineTo(W, threshY);
  rctx.stroke();
  rctx.setLineDash([]);

  rctx.fillStyle = "#555"; rctx.font = "9px monospace";
  rctx.fillText("gate", LABEL_W + 4, threshY - 3);

  // ── bars ─────────────────────────────────────────────────────────
  const barW = plotW / HISTORY_LEN;

  rmsHistory.forEach((v, i) => {
    const level = logNorm(v);
    const barH  = level * H;
    const gated = v < RMS_FLOOR;

    const t = Math.min(level * 1.5, 1);    // colour ramp: green→yellow→red
    const r = Math.round(255 * Math.min(1, t * 2));
    const g = Math.round(255 * Math.min(1, 2 - t * 2));

    rctx.fillStyle = gated ? "#1c1c1c" : `rgb(${r},${g},30)`;
    rctx.fillRect(LABEL_W + i * barW, H - barH, Math.max(barW - 1, 1), barH);
  });

  // ── current value readout ────────────────────────────────────────
  rctx.fillStyle = "#666"; rctx.font = "10px monospace";
  rctx.fillText(`${currentRms.toExponential(2)}`, LABEL_W + 4, 12);
}

// ─── Animation loop ───────────────────────────────────────────────────────────
function frame() {
  drawTime();
  drawRms();
  drawVowel();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─── WebSocket handling ───────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onmessage = ({ data }) => {

  const { f1, f2, rms } = JSON.parse(data);   // ← destructure rms

  currentRms = rms ?? 0;
  rmsHistory.push(currentRms);
  if (rmsHistory.length > HISTORY_LEN) rmsHistory.shift();

  f1History.push(f1 ?? null);
  f2History.push(f2 ?? null);
  if (f1History.length > HISTORY_LEN) f1History.shift();
  if (f2History.length > HISTORY_LEN) f2History.shift();

  trail.push({ f1, f2 });
  if (trail.length > TRAIL_LEN) trail.shift();
  ws.onopen  = () => setStatus("Connected ✓");
  ws.onerror = () => setStatus("WebSocket error");
  ws.onclose = () => { if (running) setTimeout(connectWS, 1000); };
  }
}

// ─── Audio capture ────────────────────────────────────────────────────────────
async function startAudio() {
  audioCtx   = new AudioContext({ sampleRate: 16000 });
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  const src  = audioCtx.createMediaStreamSource(mediaStream);

  await audioCtx.audioWorklet.addModule("processor.js");
  worklet = new AudioWorkletNode(audioCtx, "pcm-processor");

  worklet.port.onmessage = ({ data }) => {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(data);       // raw Float32 PCM → backend
  };

  src.connect(worklet);
  worklet.connect(audioCtx.destination);
}

function stopAudio() {
  worklet?.disconnect();
  mediaStream?.getTracks().forEach(t => t.stop());
  audioCtx?.close();
}

// ─── UI ───────────────────────────────────────────────────────────────────────
const btn = document.getElementById("btn");
const setStatus = t => { document.getElementById("status").textContent = t; };

btn.addEventListener("click", async () => {
  if (!running) {
    running = true;
    btn.textContent = "⏹ Stop";
    setStatus("Connecting…");
    connectWS();
    await startAudio();
    setStatus("Recording…");
  } else {
    running = false;
    btn.textContent = "▶ Start";
    stopAudio();
    ws?.close();
    setStatus("Stopped");
  }
});
</script>
</body>
</html>
