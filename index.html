<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Vowel Chart</title>
<style>
  :root {
    --bg:#1a2636; --surface:#213040; --border:#2e4560;
    --muted:#6a8298; --card:#223042; --sidebar:#1e2e40;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    background:var(--bg); color:#d8e8f4;
    min-height:100vh; padding:20px 16px 60px;
  }
  header { text-align:center; margin-bottom:16px; }
  header h1 { font-size:1.15rem; color:#7eb8f7; letter-spacing:.04em; margin-bottom:3px; }
  header p  { font-size:.76rem; color:var(--muted); }

  #loading { padding:60px 20px; text-align:center; color:var(--muted); font-size:.9rem; }
  #loading .spinner {
    width:32px; height:32px; border:3px solid #2e4560;
    border-top-color:#7eb8f7; border-radius:50%;
    animation:spin .8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #app { }

  /* ── Layout ──────────────────────────────────────────────── */
  .page-layout {
    width:100%; max-width:1480px; margin:0 auto;
    display:flex; flex-direction:column;
  }
  .chart-row   { display:flex; gap:14px; align-items:flex-start; }
  .chart-col   { flex:1; min-width:0; }

  /* ── View tabs ───────────────────────────────────────────── */
  .view-tabs { display:flex; gap:2px; margin-bottom:6px; }
  .view-tab  {
    padding:7px 18px; border-radius:8px 8px 0 0;
    font-size:.78rem; font-weight:700; cursor:pointer; border:none;
    background:var(--surface); color:var(--muted);
    border:1px solid var(--border); border-bottom:none;
    transition:background .15s, color .15s;
  }
  .view-tab.active { background:#253850; color:#7eb8f7; }
  .chart-panel { display:none; }
  .chart-panel.active { display:block; }
  .chart-wrap {
    background:var(--surface); border:1px solid var(--border);
    border-radius:0 14px 14px 14px; padding:10px;
  }
  svg.chart-svg { display:block; width:100%; aspect-ratio: 1200 / 720; overflow:visible; }
  .legend {
    margin-top:8px; font-size:.71rem; color:var(--muted);
    text-align:center; line-height:1.7;
  }
  .legend b { color:#b8cee4; font-weight:600; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width:256px; flex-shrink:0;
    background:var(--sidebar); border:1px solid var(--border);
    border-radius:14px; display:flex; flex-direction:column;
    max-height:860px;
  }
  .sb-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px 0; flex-shrink:0;
  }
  .sb-header-title { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .sb-clear-btn {
    font-size:.68rem; color:#4a6888; background:none; border:1px solid #2e4560;
    padding:2px 9px; border-radius:6px; cursor:pointer;
    transition:color .12s, border-color .12s;
  }
  .sb-clear-btn:hover { color:#7eb8f7; border-color:#7eb8f7; }
  .sb-count { font-size:.7rem; color:#4a7090; padding:5px 14px 0; flex-shrink:0; }
  .sb-count b { color:#7eb8f7; }
  .sb-divider { height:1px; background:var(--border); margin:10px 0 0; flex-shrink:0; }
  .sb-body { overflow-y:auto; padding:12px 12px 14px; flex:1; }

  /* ── Filter section ──────────────────────────────────────── */
  .filter-section { margin-bottom:14px; }
  .filter-label {
    font-size:.65rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.09em; color:#4a6888; margin-bottom:6px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .filter-clear-link {
    font-size:.62rem; font-weight:400; color:#3a5878; cursor:pointer;
    text-transform:none; letter-spacing:0; background:none; border:none; padding:0;
    transition:color .12s;
  }
  .filter-clear-link:hover { color:#7eb8f7; }
  .chip-grid { display:flex; flex-wrap:wrap; gap:5px; }
  .chip {
    padding:4px 10px; border-radius:20px; border:1.5px solid #2e4560;
    font-size:.75rem; cursor:pointer; background:transparent;
    color:#5a7898; transition:background .1s, color .1s, border-color .1s;
    user-select:none; line-height:1.4;
  }
  .chip:hover { border-color:#4a7098; color:#8ab8d8; }
  .chip.on {
    border-color:var(--chip-color, #7eb8f7) !important;
    background:color-mix(in srgb, var(--chip-color, #7eb8f7) 18%, transparent);
    color:var(--chip-color, #7eb8f7) !important;
  }
  .chip.ipa {
    font-family:Georgia,'Noto Serif',serif;
    font-size:.9rem; font-weight:bold; padding:3px 8px;
  }

  /* ── Disambiguation picker ───────────────────────────────── */
  #vowelPicker {
    position:fixed; display:none; z-index:9999;
    background:#14202e; border:1px solid #3a5878;
    border-radius:12px; padding:8px;
    box-shadow:0 8px 32px rgba(0,0,0,.8); min-width:165px;
  }
  .picker-title {
    font-size:.62rem; text-transform:uppercase; letter-spacing:.08em;
    color:#4a6888; padding:2px 4px 6px; margin-bottom:2px;
    border-bottom:1px solid #1e3048;
  }
  .picker-btn {
    display:flex; align-items:center; gap:8px; width:100%;
    padding:7px 10px; border-radius:8px; border:none;
    background:transparent; cursor:pointer; text-align:left;
    transition:background .12s;
  }
  .picker-btn:hover { background:#ffffff0a; }
  .picker-ipa  { font-family:Georgia,'Noto Serif',serif; font-size:1.4rem; line-height:1; min-width:28px; }
  .picker-info { display:flex; flex-direction:column; gap:1px; }
  .picker-lang { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; opacity:.75; }
  .picker-desc { font-size:.65rem; color:#7a98b0; line-height:1.3; }

  /* ── Tooltip ─────────────────────────────────────────────── */
  .tip {
    position:fixed; pointer-events:none; z-index:998; display:none;
    background:#14202e; border:1px solid #2e4560; border-radius:10px;
    padding:10px 13px; min-width:175px; max-width:248px;
    box-shadow:0 6px 28px rgba(0,0,0,.75);
  }
  .tip-ipa  { font-size:2rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .tip-lang { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin:3px 0 5px; }
  .tip-desc { font-size:.75rem; color:#8fa8c0; line-height:1.45; }
  .tip-f    { font-size:.67rem; color:#587898; margin-top:4px; font-family:monospace; }
  .tip-f span { color:#789ab8; }
  .tip-words { display:flex; flex-wrap:wrap; gap:3px; margin-top:6px; padding-top:6px; border-top:1px solid #1e3048; }
  .tip-word-chip {
    font-size:.73rem; color:#c8d8e8; padding:1px 6px;
    border-radius:5px; border:1px solid #2a4060;
    background:none; line-height:1.5;
  }
  .tip-word-chip b { text-decoration:underline; font-weight:normal; }

  /* ── Detail section ──────────────────────────────────────── */
  .detail-section { margin-top:22px; width:100%; }
  .detail-empty {
    background:var(--surface); border:1px dashed var(--border);
    border-radius:12px; padding:24px; text-align:center; color:#3a5878; font-size:.82rem;
  }
  .detail-cards-row { display:flex; gap:10px; flex-wrap:wrap; }
  .dcard {
    background:var(--card); border:2px solid; border-radius:12px;
    padding:12px 12px 10px; width:175px; flex-shrink:0;
    display:flex; flex-direction:column; gap:5px;
  }
  .dcard-ipa     { font-size:1.9rem; font-family:Georgia,'Noto Serif',serif; line-height:1; }
  .dcard-sublang { font-size:.65rem; font-weight:700; letter-spacing:.03em; }
  .dcard-desc    { font-size:.71rem; color:#8fa8c0; line-height:1.4; }
  .dcard-round   { font-size:.66rem; }
  .dcard-formants { font-size:.66rem; color:#587898; font-family:monospace; }
  .dcard-formants span { color:#789ab8; }
  .dcard-words-label {
    font-size:.6rem; text-transform:uppercase; letter-spacing:.07em;
    color:#3a5878; margin-top:2px;
  }
  .dcard-words { display:flex; flex-wrap:wrap; gap:4px; }
  .word-btn {
    font-size:.78rem; padding:2px 7px; border-radius:6px;
    border:1px solid transparent; cursor:pointer;
    background:transparent; color:#c8d8e8; line-height:1.5;
    transition:background .1s, border-color .1s;
  }
  .word-btn.has-audio { border-color:#2a4060; }
  .word-btn.has-audio:hover { background:#1a3050; border-color:#3a6090; }
  .word-btn.no-audio  { cursor:default; color:#7a98b0; }
  .word-btn b { text-decoration:underline; font-weight:normal; }
  .word-btn .pi { font-size:.6rem; opacity:.6; margin-right:2px; }
  .dcard-actions {
    display:flex; gap:5px; margin-top:auto; padding-top:6px;
    border-top:1px solid #253548;
  }
  .dcard-btn {
    flex:1; background:#1a2e48; border:1px solid #2a4060;
    color:#7eb8f7; padding:4px 0; border-radius:5px;
    cursor:pointer; font-size:.68rem; text-align:center;
    text-decoration:none; display:block; transition:background .15s;
  }
  .dcard-btn:hover { background:#1f3a58; }

  /* ── Reload button ───────────────────────────────────────── */
  .reload-btn {
    display:inline-flex; align-items:center; gap:5px;
    margin-top:6px; padding:3px 11px 3px 8px;
    font-size:.7rem; color:#4a7090; cursor:pointer;
    background:none; border:1px solid #2e4560; border-radius:20px;
    transition:color .15s, border-color .15s, transform .15s;
  }
  .reload-btn:hover { color:#7eb8f7; border-color:#7eb8f7; }
  .reload-btn.spinning .reload-icon { animation:spin .7s linear infinite; }
  .reload-icon { font-size:.75rem; display:inline-block; }

  .editor-link {
    display:inline-flex; align-items:center; gap:5px;
    margin-top:6px; margin-left:8px;
    padding:3px 11px; font-size:.7rem; color:#4a7090;
    background:none; border:1px solid #2e4560; border-radius:20px;
    text-decoration:none; transition:color .15s, border-color .15s;
  }
  .editor-link:hover { color:#7eb8f7; border-color:#7eb8f7; }

  @media (max-width:800px) {
    .chart-row { flex-direction:column; }
    .sidebar { width:100%; max-height:300px; }
  }
</style>
</head>
<body>

<header>
  <h1>IPA Vowel Chart</h1>
  <p>Use filters → · Hover for details · Click dot or letter to play</p>
  <button class="reload-btn" id="reloadBtn" type="button">
    <span class="reload-icon">↺</span> Reload languages
  </button>
  <a href="editor.html" class="editor-link">✎ Edit languages</a>
</header>

<div id="loading">
  <div class="spinner"></div>
  Loading language data…
</div>

<div id="app">
<div class="page-layout">
  <div class="chart-row">
    <div class="chart-col">
      <div class="view-tabs">
        <button class="view-tab active" id="tabIpa"     type="button">IPA Chart</button>
        <button class="view-tab"        id="tabFormant" type="button">Formant Plot</button>
      </div>
      <div class="chart-panel active" id="panelIpa">
        <div class="chart-wrap">
          <svg class="chart-svg" id="chartIpa" viewBox="0 0 1200 720"></svg>
        </div>
        <div class="legend">
          <b>·</b> exact position &nbsp;|&nbsp; left = unrounded &nbsp;|&nbsp; right = rounded &nbsp;|&nbsp; shared dot → click to pick
        </div>
      </div>
      <div class="chart-panel" id="panelFormant">
        <div class="chart-wrap">
          <svg class="chart-svg" id="chartFormant" viewBox="0 0 1200 720"></svg>
        </div>
        <div class="legend">
          X: <b>F2 (Hz)</b> high→left (front) &nbsp;|&nbsp; Y: <b>F1 (Hz)</b> high→bottom (open)
        </div>
      </div>
    </div>
    <aside class="sidebar">
      <div class="sb-header">
        <span class="sb-header-title">Filters</span>
        <button class="sb-clear-btn" id="clearAllFilters">Clear all</button>
      </div>
      <div class="sb-count" id="sbCount"></div>
      <div class="sb-divider"></div>
      <div class="sb-body" id="sidebarBody"></div>
    </aside>
  </div>
  <div class="detail-section" id="detailSection"></div>
</div>
</div>

<div id="vowelPicker">
  <div class="picker-title">Choose vowel</div>
  <div id="pickerItems"></div>
</div>
<div id="tip" class="tip"></div>

<!-- ── Language loader (JSON via fetch) ─────────────────────────────────────── -->
<script>
const LANGS = {};   // populated by loadLanguages()

async function loadLanguages() {
  try {
    // 1. Load the language list
    const idx = await fetch('lang/index.json').then(r => r.json());
    const names = (idx.languages || []).filter(n => !n.startsWith('_'));

    // 2. Fetch all language files in parallel
    const results = await Promise.all(
      names.map(name =>
        fetch(`lang/${name}/lang.json`)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .catch(e => { console.warn(`Skipped lang/${name}/lang.json:`, e.message); return null; })
      )
    );

    // 3. Register each successfully loaded language
    for (const data of results) {
      if (data && data.key) LANGS[data.key] = data;
    }
  } catch (e) {
    console.error('Failed to load lang/index.json:', e);
  }

  init();
}

loadLanguages();
</script>

<!-- ── Main application ─────────────────────────────────────────────────────── -->
<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────
let curAudio = null;
function playUrl(url) {
  if (!url) return;
  if (curAudio) { curAudio.pause(); curAudio.currentTime = 0; }
  curAudio = new Audio(url);
  curAudio.play().catch(e => console.warn('Audio:', e.message));
}

function getLength(ipa) {
  if (ipa.includes('ː')) return 'long';
  // diphthong: multiple letters, none being ː, and longer than 1 char
  const base = ipa.replace('ː', '');
  if (base.length > 1) return 'diphthong';
  return 'short';
}

function getBase(ipa) {
  // Strip length mark, return first character as the base phoneme symbol
  return ipa.replace('ː', '')[0] || ipa;
}

// IPA base display order (Close → Open, Front → Back)
const IPA_BASE_ORDER = [
  'i','y','ɨ','ʉ','ɯ','u','ɪ','ʏ','ʊ',
  'e','ø','ɘ','ɤ','o',
  'ə',
  'ɛ','œ','ɜ','ʌ','ɔ',
  'æ','ɐ',
  'a','ɶ','ɑ','ɒ',
];

// ─── IPA trapezoid ────────────────────────────────────────────────────────────
const TRAP = { TL:{x:155,y:110}, TR:{x:1115,y:110}, BL:{x:390,y:618}, BR:{x:1115,y:618} };
function trapPos(h, b) {
  const fX = TRAP.TL.x + h*(TRAP.BL.x-TRAP.TL.x);
  return { x: fX + b*(TRAP.TR.x-fX), y: TRAP.TL.y + h*(TRAP.BL.y-TRAP.TL.y) };
}
const ROWS = [
  {h:0,label:'Close'},{h:1/6,label:'Near-close'},{h:2/6,label:'Close-mid'},
  {h:3/6,label:'Mid'},{h:4/6,label:'Open-mid'},{h:5/6,label:'Near-open'},{h:1,label:'Open'},
];

// ─── Formant plot ─────────────────────────────────────────────────────────────
const FP = {x0:90, x1:1150, y0:60, y1:660};
const F2MIN=400, F2MAX=2800, F1MIN=150, F1MAX=1000;
function formantPos(f1, f2) {
  const xf=(f2-F2MIN)/(F2MAX-F2MIN), yf=(f1-F1MIN)/(F1MAX-F1MIN);
  return { x: FP.x1 - xf*(FP.x1-FP.x0), y: FP.y0 + yf*(FP.y1-FP.y0) };
}

// ─── Filter state ─────────────────────────────────────────────────────────────
const filters = {
  languages : new Set(),
  roundness : new Set(),
  length    : new Set(),
  ipaBase   : new Set(),
};
function passesFilters(lk, v) {
  if (filters.languages.size > 0 && !filters.languages.has(lk))                      return false;
  if (filters.roundness.size > 0 && !filters.roundness.has(v.rounded?'rounded':'unrounded')) return false;
  if (filters.length.size    > 0 && !filters.length.has(getLength(v.ipa)))            return false;
  if (filters.ipaBase.size   > 0 && !filters.ipaBase.has(getBase(v.ipa)))             return false;
  return true;
}
function countShown() {
  let n=0;
  for (const [lk,lang] of Object.entries(LANGS))
    for (const v of lang.vowels) if (passesFilters(lk,v)) n++;
  return n;
}
function totalVowels() {
  return Object.values(LANGS).reduce((s,l)=>s+l.vowels.length, 0);
}

// ─── SVG helpers ─────────────────────────────────────────────────────────────
const NS='http://www.w3.org/2000/svg';
function $s(tag,a={}) {
  const el=document.createElementNS(NS,tag);
  for(const[k,vv]of Object.entries(a)) el.setAttribute(k,String(vv));
  return el;
}
function $t(str,a={}) { const el=$s('text',a); el.textContent=str; return el; }
function ipaW(ipa,fs) { let w=0; for(const c of ipa) w+=c==='ː'?0.36:0.65; return w*fs; }

// ─── Pulse ────────────────────────────────────────────────────────────────────
function pulse(svgId, x, y, color) {
  const svg=document.getElementById(svgId); if(!svg)return;
  const ring=$s('circle',{cx:x,cy:y,r:6,fill:'none',stroke:color,'stroke-width':2,opacity:.9,style:'pointer-events:none'});
  svg.appendChild(ring);
  let r=6, op=.9;
  const step=()=>{
    if(!ring.parentNode)return; r+=2; op-=.045;
    ring.setAttribute('r',r); ring.setAttribute('opacity',Math.max(0,op).toFixed(3));
    if(op>0)requestAnimationFrame(step); else ring.parentNode?.removeChild(ring);
  };
  requestAnimationFrame(step);
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
const tip=document.getElementById('tip');
function showTip(e,v,lang) {
  const ws=v.words||[];
  const wordsHtml=ws.length
    ? `<div class="tip-words">${ws.map(w=>`<span class="tip-word-chip">${w.text||''}</span>`).join('')}</div>`
    : '';
  tip.innerHTML=`
    <div class="tip-ipa" style="color:${lang.color}">${v.ipa}</div>
    <div class="tip-lang" style="color:${lang.color}">${lang.label}</div>
    <div class="tip-desc">${v.desc}</div>
    ${v.f1?`<div class="tip-f">F1 <span>${v.f1} Hz</span> · F2 <span>${v.f2} Hz</span></div>`:''}
    ${wordsHtml}
  `;
  tip.style.display='block'; moveTip(e);
}
function moveTip(e) {
  const x=e.clientX+18, y=e.clientY-12, r=tip.getBoundingClientRect();
  tip.style.left=Math.min(x,window.innerWidth-r.width-8)+'px';
  tip.style.top=Math.max(4,Math.min(y,window.innerHeight-r.height-8))+'px';
}
function hideTip() { tip.style.display='none'; }

// ─── Disambiguation picker ────────────────────────────────────────────────────
const picker=document.getElementById('vowelPicker');
function showPicker(cx, cy, group, svgId, dx, dy) {
  hideTip();
  document.getElementById('pickerItems').innerHTML='';
  for (const {lk,lang,v} of group) {
    const btn=document.createElement('button'); btn.className='picker-btn';
    btn.innerHTML=`<span class="picker-ipa" style="color:${lang.color}">${v.ipa}</span><span class="picker-info"><span class="picker-lang" style="color:${lang.color}">${lang.label}</span><span class="picker-desc">${v.desc}</span></span>`;
    btn.addEventListener('click',()=>{ hidePicker(); playUrl(v.ipaAudio); pulse(svgId,dx,dy,lang.color); });
    document.getElementById('pickerItems').appendChild(btn);
  }
  picker.style.display='block';
  const pw=Math.max(picker.offsetWidth,170), ph=picker.scrollHeight||120;
  let px=cx+10, py=cy-10;
  if(px+pw>window.innerWidth-8)  px=cx-pw-10;
  if(py+ph>window.innerHeight-8) py=window.innerHeight-ph-8;
  picker.style.left=Math.max(4,px)+'px'; picker.style.top=Math.max(4,py)+'px';
}
function hidePicker() { picker.style.display='none'; }
document.addEventListener('click', e=>{ if(!picker.contains(e.target)) hidePicker(); }, true);

// ─── Chart builder (shared by IPA + Formant renderers) ───────────────────────
function buildVowels(svg, getPos, svgId) {
  const langL=$s('g'), cardL=$s('g'), dotL=$s('g');
  svg.appendChild(langL); svg.appendChild(cardL); svg.appendChild(dotL);

  const SF='drop-shadow(0px 1px 2px rgba(0,0,0,0.45))';
  const DR_C=7, DR_L=9, DH=16;
  const posGroups=new Map();

  for (const [lk,lang] of Object.entries(LANGS)) {
    for (const v of lang.vowels) {
      if (!passesFilters(lk,v)) continue;
      const pos=getPos(v); if(!pos) continue;
      const {x:dx,y:dy}=pos;
      const pk=`${Math.round(dx/3)},${Math.round(dy/3)}`;
      if (!posGroups.has(pk)) posGroups.set(pk,[]);
      posGroups.get(pk).push({lk,lang,v,dx,dy});
    }
  }

  // Letters
  for (const group of posGroups.values()) {
    for (const {lk,lang,v,dx,dy} of group) {
      const ic=lk==='cardinal', lyr=ic?cardL:langL;
      const FS=ic?15:22, GAP=5, PAD=4, dotR=ic?DR_C:DR_L;
      const lx=v.rounded?dx+dotR+GAP:dx-dotR-GAP;
      const anch=v.rounded?'start':'end', tw=ipaW(v.ipa,FS);
      const hx=(v.rounded?lx:lx-tw)-PAD, hy=dy-FS*0.40-PAD;
      const lg=$s('g',{style:'cursor:pointer'});
      lg.appendChild($s('rect',{x:hx,y:hy,width:tw+PAD*2,height:FS*0.82+PAD*2,rx:3,fill:'transparent'}));
      lg.appendChild($t(v.ipa,{x:lx,y:dy,dy:'0.36em','text-anchor':anch,'font-size':FS,
        fill:ic?'#d0e6f8':lang.color, opacity:ic?0.92:0.78,
        'font-family':"Georgia,'Noto Serif',serif", 'font-weight':ic?'normal':'bold',
        style:`filter:${SF};user-select:none`}));
      lg.addEventListener('mouseenter',e=>showTip(e,v,lang));
      lg.addEventListener('mousemove',moveTip); lg.addEventListener('mouseleave',hideTip);
      lg.addEventListener('click',()=>{ playUrl(v.ipaAudio); pulse(svgId,dx,dy,ic?'#7090b8':lang.color); });
      lyr.appendChild(lg);
    }
  }

  // One dot per unique position
  for (const group of posGroups.values()) {
    const {dx,dy}=group[0], multi=group.length>1;
    const ic=group.every(g=>g.lk==='cardinal'), dotR=ic?DR_C:DR_L;
    const dc=multi?'#8090a8':(ic?'#90b4d0':group[0].lang.color);
    const df=multi?'#8090a8cc':(ic?'#90b4d0dd':group[0].lang.color+'bb');
    const dg=$s('g',{style:'cursor:pointer'});
    dg.appendChild($s('circle',{cx:dx,cy:dy,r:DH,fill:'transparent'}));
    if(multi) dg.appendChild($s('circle',{cx:dx,cy:dy,r:dotR+2.5,fill:'none',stroke:'#8090a840','stroke-width':1.5}));
    dg.appendChild($s('circle',{cx:dx,cy:dy,r:dotR,fill:df}));
    if (!multi) {
      const {lk,lang,v}=group[0];
      dg.addEventListener('mouseenter',e=>showTip(e,v,lang));
      dg.addEventListener('mousemove',moveTip); dg.addEventListener('mouseleave',hideTip);
      dg.addEventListener('click',()=>{ playUrl(v.ipaAudio); pulse(svgId,dx,dy,dc); });
      let tm=false;
      dg.addEventListener('touchstart',e=>{tm=false;e.preventDefault();showTip(e.touches[0],v,lang);},{passive:false});
      dg.addEventListener('touchmove', e=>{tm=true;moveTip(e.touches[0]);},{passive:false});
      dg.addEventListener('touchend',  ()=>{hideTip();if(!tm){playUrl(v.ipaAudio);pulse(svgId,dx,dy,dc);}});
    } else {
      dg.addEventListener('click',e=>{e.stopPropagation();showPicker(e.clientX,e.clientY,group,svgId,dx,dy);});
      dg.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];showPicker(t.clientX,t.clientY,group,svgId,dx,dy);},{passive:false});
    }
    dotL.appendChild(dg);
  }
}

// ─── IPA Chart ────────────────────────────────────────────────────────────────
function renderIpa() {
  const svg=document.getElementById('chartIpa');
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  for(const r of ROWS){
    const L=trapPos(r.h,0),R=trapPos(r.h,1);
    svg.appendChild($s('line',{x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#2e4560','stroke-width':1.5}));
  }
  const cT=trapPos(0,.5),cB=trapPos(1,.5);
  svg.appendChild($s('line',{x1:cT.x,y1:cT.y,x2:cB.x,y2:cB.y,stroke:'#2e4560','stroke-width':1,'stroke-dasharray':'6 5'}));
  const{TL,TR,BL,BR}=TRAP;
  svg.appendChild($s('path',{d:`M${TL.x},${TL.y} L${TR.x},${TR.y} L${BR.x},${BR.y} L${BL.x},${BL.y}Z`,fill:'none',stroke:'#385878','stroke-width':2}));
  for(const r of ROWS){
    const p=trapPos(r.h,0);
    svg.appendChild($t(r.label,{x:p.x-56,y:p.y,dy:'0.36em','text-anchor':'end','font-size':13,fill:'#6a8298','font-family':'system-ui,sans-serif'}));
  }
  for(const[l,b]of[['Front',0],['Central',.5],['Back',1]]){
    const p=trapPos(0,b);
    svg.appendChild($t(l,{x:p.x,y:p.y-28,'text-anchor':'middle','font-size':13,fill:'#6a8298','font-family':'system-ui,sans-serif'}));
  }
  buildVowels(svg, v=>trapPos(v.h,v.b), 'chartIpa');
}

// ─── Formant Plot ─────────────────────────────────────────────────────────────
function renderFormant() {
  const svg=document.getElementById('chartFormant');
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  svg.appendChild($s('rect',{x:FP.x0,y:FP.y0,width:FP.x1-FP.x0,height:FP.y1-FP.y0,fill:'#192838',rx:6}));
  for(const f2 of[500,700,900,1100,1400,1700,2000,2400,2800]){
    const{x}=formantPos(F1MIN,f2);
    svg.appendChild($s('line',{x1:x,y1:FP.y0,x2:x,y2:FP.y1,stroke:'#2a3e58','stroke-width':1,'stroke-dasharray':'4 4'}));
    svg.appendChild($t(f2,{x,y:FP.y1+18,'text-anchor':'middle','font-size':11,fill:'#4a6888','font-family':'system-ui,sans-serif'}));
  }
  for(const f1 of[200,300,400,500,600,700,800,900,1000]){
    const{y}=formantPos(f1,F2MIN);
    svg.appendChild($s('line',{x1:FP.x0,y1:y,x2:FP.x1,y2:y,stroke:'#2a3e58','stroke-width':1,'stroke-dasharray':'4 4'}));
    svg.appendChild($t(f1,{x:FP.x0-8,y,'text-anchor':'end','font-size':11,dy:'0.35em',fill:'#4a6888','font-family':'system-ui,sans-serif'}));
  }
  svg.appendChild($t('← F2 (Hz)',{x:(FP.x0+FP.x1)/2,y:FP.y1+38,'text-anchor':'middle','font-size':12,fill:'#6a8298','font-family':'system-ui,sans-serif'}));
  const f1el=$t('F1 (Hz) ↓',{x:18,y:(FP.y0+FP.y1)/2,'text-anchor':'middle','font-size':12,fill:'#6a8298','font-family':'system-ui,sans-serif'});
  f1el.setAttribute('transform',`rotate(-90,18,${(FP.y0+FP.y1)/2})`);
  svg.appendChild(f1el);
  svg.appendChild($s('rect',{x:FP.x0,y:FP.y0,width:FP.x1-FP.x0,height:FP.y1-FP.y0,fill:'none',stroke:'#385878','stroke-width':1.5,rx:6}));
  buildVowels(svg, v=>(v.f1&&v.f2?formantPos(v.f1,v.f2):null), 'chartFormant');
}

function renderAll() { renderIpa(); renderFormant(); renderDetail(); updateCount(); }

// ─── View tabs ────────────────────────────────────────────────────────────────
document.getElementById('tabIpa').addEventListener('click',()=>{
  document.getElementById('tabIpa').classList.add('active');
  document.getElementById('tabFormant').classList.remove('active');
  document.getElementById('panelIpa').classList.add('active');
  document.getElementById('panelFormant').classList.remove('active');
});
document.getElementById('tabFormant').addEventListener('click',()=>{
  document.getElementById('tabFormant').classList.add('active');
  document.getElementById('tabIpa').classList.remove('active');
  document.getElementById('panelFormant').classList.add('active');
  document.getElementById('panelIpa').classList.remove('active');
});

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function updateCount() {
  document.getElementById('sbCount').innerHTML =
    `<b>${countShown()}</b> of ${totalVowels()} vowels shown`;
}

function buildSidebar() {
  const body=document.getElementById('sidebarBody');
  body.innerHTML='';

  function chip(label, fset, value, color) {
    const btn=document.createElement('button');
    btn.type='button'; btn.className='chip'+(fset.has(value)?' on':'');
    if(color) btn.style.setProperty('--chip-color',color);
    btn.textContent=label;
    btn.addEventListener('click',()=>{ fset.has(value)?fset.delete(value):fset.add(value); buildSidebar(); renderAll(); });
    return btn;
  }
  function ipaChip(base) {
    const b=chip(base,filters.ipaBase,base); b.classList.add('ipa'); return b;
  }
  function section(title, fset, buildFn) {
    const sec=document.createElement('div'); sec.className='filter-section';
    const lbl=document.createElement('div'); lbl.className='filter-label';
    const sp=document.createElement('span'); sp.textContent=title;
    const cl=document.createElement('button'); cl.className='filter-clear-link'; cl.textContent='clear'; cl.type='button';
    cl.addEventListener('click',()=>{ fset.clear(); buildSidebar(); renderAll(); });
    lbl.appendChild(sp); lbl.appendChild(cl);
    const grid=document.createElement('div'); grid.className='chip-grid';
    buildFn(grid);
    sec.appendChild(lbl); sec.appendChild(grid);
    return sec;
  }

  body.appendChild(section('Language', filters.languages, grid=>{
    for (const[lk,lang] of Object.entries(LANGS))
      grid.appendChild(chip(lang.label, filters.languages, lk, lang.color));
  }));

  body.appendChild(section('Roundness', filters.roundness, grid=>{
    grid.appendChild(chip('Rounded',   filters.roundness,'rounded',  '#c084fc'));
    grid.appendChild(chip('Unrounded', filters.roundness,'unrounded','#7eb8f7'));
  }));

  body.appendChild(section('Length', filters.length, grid=>{
    grid.appendChild(chip('Long ː',    filters.length,'long',      '#34d399'));
    grid.appendChild(chip('Short',     filters.length,'short',     '#fbbf24'));
    grid.appendChild(chip('Diphthong', filters.length,'diphthong', '#f87171'));
  }));

  // Collect which base symbols actually exist in current loaded languages
  const existingBases=new Set();
  for (const lang of Object.values(LANGS))
    for (const v of lang.vowels) existingBases.add(getBase(v.ipa));

  body.appendChild(section('IPA Base', filters.ipaBase, grid=>{
    for (const base of IPA_BASE_ORDER) if (existingBases.has(base)) grid.appendChild(ipaChip(base));
    for (const base of existingBases)  if (!IPA_BASE_ORDER.includes(base)) grid.appendChild(ipaChip(base));
  }));

  updateCount();
}

document.getElementById('clearAllFilters').addEventListener('click',()=>{
  filters.languages.clear(); filters.roundness.clear();
  filters.length.clear();    filters.ipaBase.clear();
  buildSidebar(); renderAll();
});

// ─── Detail cards ─────────────────────────────────────────────────────────────
function renderDetail() {
  const sec=document.getElementById('detailSection');
  sec.innerHTML='';
  const all=[];
  for (const [lk,lang] of Object.entries(LANGS))
    for (const v of lang.vowels) if (passesFilters(lk,v)) all.push({lk,lang,v});
  if (!all.length) {
    sec.innerHTML='<div class="detail-empty">No vowels match the current filters</div>';
    return;
  }
  all.sort((a,b)=>{ const dh=a.v.h-b.v.h; return Math.abs(dh)>.001?dh:a.v.b-b.v.b; });
  const grid=document.createElement('div'); grid.className='detail-cards-row';

  for (const {lk,lang,v} of all) {
    const c=lang.color;
    const tPos=trapPos(v.h,v.b);
    const fPos=v.f1&&v.f2?formantPos(v.f1,v.f2):null;
    const card=document.createElement('div');
    card.className='dcard'; card.style.borderColor=c;

    let wordsHtml='';
    if (v.words && v.words.length > 0) {
      wordsHtml='<div class="dcard-words-label">Examples</div><div class="dcard-words">';
      for (const w of v.words) {
        const ha=!!w.audio;
        wordsHtml+=`<button class="word-btn ${ha?'has-audio':'no-audio'}" data-audio="${w.audio||''}">${ha?'<span class="pi">▶</span>':''}${w.text}</button>`;
      }
      wordsHtml+='</div>';
    }

    card.innerHTML=`
      <div class="dcard-ipa" style="color:${c}">${v.ipa}</div>
      <div class="dcard-sublang" style="color:${c}bb">${lang.label}</div>
      <div class="dcard-desc">${v.desc}</div>
      <div class="dcard-round" style="color:${c}88">${v.rounded?'⊙ Rounded':'○ Unrounded'} · ${getLength(v.ipa)}</div>
      ${v.f1?`<div class="dcard-formants">F1 <span>${v.f1}</span> · F2 <span>${v.f2}</span> Hz</div>`:''}
      ${wordsHtml}
      <div class="dcard-actions">
        <button class="dcard-btn dcard-play">▶ Sound</button>
        ${v.wikiUrl?`<a class="dcard-btn" href="${v.wikiUrl}" target="_blank" rel="noopener">Wiki ↗</a>`:''}
      </div>`;

    card.querySelectorAll('.word-btn.has-audio').forEach(btn=>{
      btn.addEventListener('click',()=>playUrl(btn.dataset.audio));
    });
    card.querySelector('.dcard-play').addEventListener('click',()=>{
      playUrl(v.ipaAudio);
      pulse('chartIpa',tPos.x,tPos.y,c);
      if(fPos) pulse('chartFormant',fPos.x,fPos.y,c);
    });
    grid.appendChild(card);
  }
  sec.appendChild(grid);
}

// ─── Init (called after all lang.js files have loaded) ───────────────────────
function init() {
  if (!Object.keys(LANGS).length) {
    console.warn('No languages loaded — check lang/index.json and lang/*/lang.json');
  }
  document.getElementById('loading').style.display = 'none';
  buildSidebar();
  renderAll();
}

// ─── Reload button ────────────────────────────────────────────────────────────
document.getElementById('reloadBtn').addEventListener('click', async () => {
  const btn  = document.getElementById('reloadBtn');
  const icon = btn.querySelector('.reload-icon');
  btn.classList.add('spinning');
  btn.disabled = true;

  // Clear existing language data
  for (const key of Object.keys(LANGS)) delete LANGS[key];

  try {
    // Add cache-busting param so browsers re-fetch even if cached
    const ts  = Date.now();
    const idx = await fetch(`lang/index.json?t=${ts}`).then(r => r.json());
    const names = (idx.languages || []).filter(n => !n.startsWith('_'));

    await Promise.all(
      names.map(name =>
        fetch(`lang/${name}/lang.json?t=${ts}`)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(data => { if (data && data.key) LANGS[data.key] = data; })
          .catch(e => console.warn(`Skipped lang/${name}:`, e.message))
      )
    );
  } catch (e) {
    console.error('Reload failed:', e);
  }

  btn.classList.remove('spinning');
  btn.disabled = false;
  buildSidebar();
  renderAll();
});
</script>
