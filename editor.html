<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Language Editor</title>
<style>
  :root {
    --bg:#1a2636; --surface:#213040; --surface2:#253848;
    --border:#2e4560; --muted:#6a8298; --accent:#7eb8f7;
    --card:#1e2d40; --input:#192736;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',sans-serif;
    background:var(--bg); color:#d8e8f4;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  .top-bar {
    display:flex; align-items:center; gap:12px; padding:10px 16px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .back-btn { color:var(--muted); text-decoration:none; font-size:.8rem; transition:color .15s; white-space:nowrap; }
  .back-btn:hover { color:var(--accent); }
  .top-bar h1 { font-size:.95rem; color:var(--accent); letter-spacing:.04em; flex:1; }
  .folder-btn {
    display:flex; align-items:center; gap:6px; padding:5px 12px;
    border-radius:8px; font-size:.76rem; cursor:pointer;
    background:var(--card); border:1px solid var(--border);
    color:var(--muted); transition:border-color .15s, color .15s; white-space:nowrap;
  }
  .folder-btn:hover { border-color:var(--accent); color:var(--accent); }
  .folder-btn.connected { border-color:#34d399; color:#34d399; }

  /* ── Layout ──────────────────────────────────────────────── */
  .editor-layout { display:flex; flex:1; overflow:hidden; }

  /* ── Language sidebar ────────────────────────────────────── */
  .lang-sidebar {
    width:195px; flex-shrink:0; background:var(--card);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .lang-sidebar-head { padding:10px 10px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .new-lang-btn {
    width:100%; padding:6px 8px; border-radius:7px;
    background:var(--surface); border:1px dashed var(--border);
    color:var(--muted); font-size:.75rem; cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .new-lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-list { overflow-y:auto; flex:1; padding:6px; }
  .lang-item {
    display:flex; align-items:center; gap:8px; padding:8px 9px;
    border-radius:8px; cursor:pointer; font-size:.81rem;
    transition:background .12s; user-select:none; margin-bottom:2px;
  }
  .lang-item:hover { background:var(--surface); }
  .lang-item.active { background:var(--surface2); }
  .lang-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .lang-item-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lang-item-key { font-size:.62rem; color:var(--muted); flex-shrink:0; }

  /* ── Main panel ──────────────────────────────────────────── */
  .main-panel { flex:1; overflow-y:auto; }
  .placeholder { height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.85rem; }

  /* ── Forms ───────────────────────────────────────────────── */
  .lang-form { padding:12px 18px; border-bottom:1px solid var(--border); }
  .form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  input[type=text], input[type=url], input[type=number] {
    background:var(--input); border:1px solid var(--border); border-radius:6px;
    color:#d8e8f4; padding:6px 10px; font-size:.82rem; outline:none;
    transition:border-color .15s;
  }
  input:focus { border-color:var(--accent); }
  input[type=color] { width:44px; height:32px; border-radius:6px; border:1px solid var(--border); background:var(--input); cursor:pointer; padding:2px; }
  input[type=checkbox] { width:14px; height:14px; accent-color:var(--accent); cursor:pointer; }
  .lang-form-actions { margin-top:10px; display:flex; gap:8px; align-items:center; }
  .unsaved-note { font-size:.68rem; color:#fbbf24; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn { padding:6px 14px; border-radius:7px; font-size:.78rem; cursor:pointer; border:1px solid; font-weight:600; transition:background .15s,color .15s,opacity .15s; }
  .btn:disabled { opacity:.4; cursor:default; }
  .btn-primary { background:var(--accent); color:#0d1824; border-color:var(--accent); }
  .btn-primary:not(:disabled):hover { background:#9dcbfa; }
  .btn-secondary { background:transparent; color:var(--muted); border-color:var(--border); }
  .btn-secondary:hover { color:var(--accent); border-color:var(--accent); }
  .btn-sm { padding:4px 10px; font-size:.72rem; }

  /* ── Chart section ───────────────────────────────────────── */
  .chart-section { padding:12px 18px 0; max-width:680px; }
  .chart-wrap { background:#192535; border:1px solid var(--border); border-radius:0 8px 8px 8px; max-height:320px; overflow:hidden; }
  .chart-svg { display:block; width:100%; height:auto; overflow:visible; max-height:320px; }
  .chart-tab {
    padding:5px 14px; border-radius:6px 6px 0 0; font-size:.74rem; font-weight:700;
    cursor:pointer; background:var(--card); color:var(--muted);
    border:1px solid var(--border); border-bottom:none;
    transition:background .15s, color .15s;
  }
  .chart-tab.active { background:var(--surface2); color:var(--accent); }
  .chart-tab-panel { display:none; }
  .chart-tab-panel.active { display:block; }
  .chart-hint { font-size:.62rem; color:var(--muted); text-align:center; margin-top:4px; margin-bottom:4px; }

  /* ── Inline vowel editor ─────────────────────────────────── */
  .ve-inline { padding:12px 18px; border-top:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface2); }
  .ve-inline-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .ve-inline-title { font-size:.85rem; font-weight:700; color:var(--accent); flex:1; }

  /* ── IPA picker ──────────────────────────────────────────── */
  .ipa-section { display:flex; gap:12px; align-items:flex-start; margin-bottom:10px; }
  .ipa-left { display:flex; flex-direction:column; gap:8px; align-items:center; flex-shrink:0; }
  .ipa-preview { font-family:Georgia,serif; font-size:3rem; line-height:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 14px; text-align:center; min-width:80px; color:var(--accent); }
  .ipa-field-wrap { display:flex; flex-direction:column; gap:3px; }
  .ipa-field-wrap label { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .ipa-text { font-family:Georgia,serif; font-size:1.2rem; background:var(--input); border:1px solid var(--border); border-radius:6px; color:#d8e8f4; padding:5px 10px; width:80px; outline:none; text-align:center; transition:border-color .15s; }
  .ipa-text:focus { border-color:var(--accent); }
  .ipa-picker-box { flex:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 10px; }
  .ipa-picker-title { font-size:.59rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:6px; }
  .ipa-grid { display:flex; flex-direction:column; gap:2px; }
  .ipa-row { display:flex; align-items:center; gap:2px; }
  .ipa-row-lbl { font-size:.52rem; color:#3a5878; width:48px; flex-shrink:0; line-height:1; }
  .ipa-ch { font-family:Georgia,serif; font-size:.95rem; width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:5px; cursor:pointer; border:1px solid transparent; transition:background .1s,border-color .1s; color:#8ab8d0; flex-shrink:0; }
  .ipa-ch:hover { background:var(--surface2); border-color:var(--border); color:#d8e8f4; }
  .ipa-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; }
  .ipa-mods-row { display:flex; gap:3px; flex-wrap:wrap; margin-top:5px; border-top:1px solid var(--border); padding-top:5px; }
  .ipa-mod { font-family:Georgia,serif; font-size:.78rem; padding:2px 6px; border:1px solid var(--border); border-radius:4px; cursor:pointer; color:var(--muted); background:none; transition:color .1s,border-color .1s; display:flex; flex-direction:column; align-items:center; gap:1px; }
  .ipa-mod:hover { color:var(--accent); border-color:var(--accent); }
  .ipa-mod small { font-family:system-ui; font-size:.45rem; color:var(--muted); }

  /* ── Vowel meta fields ───────────────────────────────────── */
  .ve-meta { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; margin-bottom:8px; }
  .ve-meta .field { flex:1; min-width:160px; }
  .field input[type=url] { width:100%; }
  .field input[type=text].wide { width:100%; }
  .rounded-row { display:flex; align-items:center; gap:8px; font-size:.82rem; padding-top:6px; }

  /* Position/formant direct inputs */
  .ve-coords { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
  .ve-coords .field { min-width:130px; }
  .ve-coords input { width:100%; }

  /* ── Words list ──────────────────────────────────────────── */
  .words-list { display:flex; flex-direction:column; gap:5px; }
  .word-row { display:flex; gap:6px; align-items:center; }
  .word-row .word-text { width:180px; flex-shrink:0; font-family:Georgia,serif; }
  .word-row .word-audio { flex:1; font-size:.75rem; }
  .word-del { width:26px; height:26px; flex-shrink:0; border-radius:5px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; font-size:.9rem; display:flex; align-items:center; justify-content:center; transition:color .12s,border-color .12s; }
  .word-del:hover { color:#f87171; border-color:#f87171; }
  .add-word-btn { display:flex; align-items:center; gap:5px; align-self:flex-start; background:none; border:1px dashed var(--border); color:var(--muted); border-radius:6px; padding:4px 10px; font-size:.73rem; cursor:pointer; transition:border-color .15s,color .15s; }
  .add-word-btn:hover { border-color:var(--accent); color:var(--accent); }
  .divider-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }

  /* ── Vowel cards ─────────────────────────────────────────── */
  .vowel-section { padding:12px 18px; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .section-title { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
  .vowel-cards { display:flex; flex-wrap:wrap; gap:8px; }
  .vowel-card { background:var(--card); border:1.5px solid var(--border); border-radius:8px; padding:6px 10px; width:175px; display:flex; flex-direction:column; gap:2px; transition:border-color .12s; cursor:pointer; }
  .vowel-card:hover { border-color:#4a7098; }
  .vowel-card.active { border-color:var(--accent); }
  .vc-ipa { font-family:Georgia,serif; font-size:1.2rem; line-height:1; }
  .vc-desc { font-size:.57rem; color:var(--muted); line-height:1.3; }
  .vc-round { font-size:.57rem; }
  .vc-formants { font-size:.57rem; color:#4a6888; font-family:monospace; }
  .vc-formants span { color:#6a90b0; }
  .vc-words-label { font-size:.52rem; text-transform:uppercase; letter-spacing:.06em; color:#3a5878; margin-top:3px; }
  .vc-words { display:flex; flex-wrap:wrap; gap:3px; margin-top:2px; }
  .vc-word { font-size:.72rem; padding:1px 5px; border-radius:5px; border:1px solid transparent; background:transparent; color:#c8d8e8; cursor:pointer; line-height:1.4; transition:background .1s,border-color .1s; }
  .vc-word.has-audio { border-color:#2a4060; }
  .vc-word.has-audio:hover { background:#1a3050; }
  .vc-word.no-audio { color:#5a7898; cursor:default; }
  .vc-word b { text-decoration:underline; font-weight:normal; }
  .pi { font-size:.55rem; opacity:.7; margin-right:2px; }
  .vc-actions { display:flex; gap:4px; margin-top:5px; padding-top:5px; border-top:1px solid #1e3048; }
  .vc-btn { font-size:.62rem; padding:2px 7px; border-radius:4px; border:1px solid var(--border); background:none; color:var(--muted); cursor:pointer; transition:color .12s,border-color .12s; }
  .vc-btn:hover { color:#d8e8f4; border-color:#4a7098; }
  .vc-btn.del:hover { color:#f87171; border-color:#f87171; }

  /* ── Toast + tip ─────────────────────────────────────────── */
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a3050; border:1px solid #2a5080; color:#d8e8f4; padding:8px 18px; border-radius:20px; font-size:.78rem; opacity:0; transition:opacity .3s; pointer-events:none; z-index:9999; white-space:nowrap; }
  .toast.show { opacity:1; }

  /* ── Styled scrollbars ───────────────────────────────────── */
  * { scrollbar-width:thin; scrollbar-color:#2e4a68 transparent; }
  *::-webkit-scrollbar { width:6px; height:6px; }
  *::-webkit-scrollbar-track { background:transparent; }
  *::-webkit-scrollbar-thumb { background:#2a4560; border-radius:10px; border:1px solid transparent; background-clip:padding-box; }
  *::-webkit-scrollbar-thumb:hover { background:#3a6080; }
  *::-webkit-scrollbar-corner { background:transparent; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Chart</a>
  <h1>Language Editor</h1>
  <button class="folder-btn" id="folderBtn" type="button">📁 Connect lang/ folder</button>
</div>

<div class="editor-layout">
  <aside class="lang-sidebar">
    <div class="lang-sidebar-head">
      <button class="new-lang-btn" id="newLangBtn" type="button">+ New Language</button>
    </div>
    <div class="lang-list" id="langList"></div>
  </aside>
  <main class="main-panel" id="mainPanel">
    <div class="placeholder" id="placeholder">← Select a language to edit</div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div id="chartTip" style="position:fixed;display:none;background:#0d1524;border:1px solid #2e4560;border-radius:7px;padding:5px 10px;font-size:.74rem;color:#c8d8e8;pointer-events:none;z-index:9998;max-width:280px;white-space:nowrap"></div>

<script>
// ─── IPA data ─────────────────────────────────────────────────────────────────
const IPA_ROWS=[
  {label:'Close',   pairs:[['i','y'],['ɨ','ʉ'],['ɯ','u']]},
  {label:'Near-cl', pairs:[['ɪ','ʏ'],[null,null],['ʊ',null]]},
  {label:'Cl-mid',  pairs:[['e','ø'],['ɘ','ɵ'],['ɤ','o']]},
  {label:'Mid',     pairs:[[null,null],['ə',null],[null,null]]},
  {label:'Op-mid',  pairs:[['ɛ','œ'],['ɜ','ɞ'],['ʌ','ɔ']]},
  {label:'Near-op', pairs:[['æ',null],['ɐ',null],[null,null]]},
  {label:'Open',    pairs:[['a','ɶ'],[null,null],['ɑ','ɒ']]},
];
const IPA_MODS=[
  {ch:'ː',lbl:'long'},{ch:'ˑ',lbl:'½-long'},{ch:'̃',lbl:'nasal'},
  {ch:'ʲ',lbl:'palat'},{ch:'ʷ',lbl:'lab'},{ch:'ˠ',lbl:'velar'},
  {ch:'ˤ',lbl:'phar'},{ch:'ʰ',lbl:'asp'},{ch:'̥',lbl:'voiceless'},
];

// ─── Large chart geometry (viewBox 700 × 420) ─────────────────────────────────
// IPA trapezoid
const LT={TL:{x:90,y:42},TR:{x:648,y:42},BL:{x:234,y:378},BR:{x:648,y:378}};
function ltPos(h,b){const fX=LT.TL.x+h*(LT.BL.x-LT.TL.x);return{x:fX+b*(LT.TR.x-fX),y:LT.TL.y+h*(LT.BL.y-LT.TL.y)};}
function ltHB(px,py){
  const h=Math.max(0,Math.min(1,(py-LT.TL.y)/(LT.BL.y-LT.TL.y)));
  const fX=LT.TL.x+h*(LT.BL.x-LT.TL.x);
  return{h:+h.toFixed(4),b:+Math.max(0,Math.min(1,(px-fX)/(LT.TR.x-fX))).toFixed(4)};
}
// Formant plot (same viewBox)
const LF={x0:60,x1:685,y0:30,y1:390};
const F2MIN=400,F2MAX=2800,F1MIN=150,F1MAX=1000;
function lfPos(f1,f2){
  return{x:LF.x1-(f2-F2MIN)/(F2MAX-F2MIN)*(LF.x1-LF.x0),y:LF.y0+(f1-F1MIN)/(F1MAX-F1MIN)*(LF.y1-LF.y0)};
}
function lfF1F2(px,py){
  return{
    f2:Math.round(Math.max(F2MIN,Math.min(F2MAX,F2MAX-(px-LF.x0)/(LF.x1-LF.x0)*(F2MAX-F2MIN)))),
    f1:Math.round(Math.max(F1MIN,Math.min(F1MAX,F1MIN+(py-LF.y0)/(LF.y1-LF.y0)*(F1MAX-F1MIN)))),
  };
}
const TRAP_ROWS=[
  {h:0,label:'Close'},{h:1/6,label:'Near-cl'},{h:2/6,label:'Cl-mid'},
  {h:3/6,label:'Mid'},{h:4/6,label:'Op-mid'},{h:5/6,label:'Near-op'},{h:1,label:'Open'},
];

// ─── State ────────────────────────────────────────────────────────────────────
const state={
  langs:{}, selKey:null, langDraft:null,
  vowelIdx:null, vowelDraft:null,
  dirHandle:null, unsaved:false, chartTab:'ipa', clickTarget:'start',
};

// ─── Utilities ────────────────────────────────────────────────────────────────
function clone(o){return JSON.parse(JSON.stringify(o));}
function toast(msg,dur=2200){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function svgPt(svgEl,cx,cy){const r=svgEl.getBoundingClientRect(),vb=svgEl.viewBox.baseVal;return{x:(cx-r.left)/r.width*vb.width,y:(cy-r.top)/r.height*vb.height};}
const NS='http://www.w3.org/2000/svg';
function $s(tag,a={}){const el=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))el.setAttribute(k,String(v));return el;}
function $t(str,a={}){const el=$s('text',a);el.textContent=str;return el;}

// ─── IndexedDB persistence for dirHandle ──────────────────────────────────────
function idbOpen(){return new Promise((res,rej)=>{const rq=indexedDB.open('ipa-editor',1);rq.onupgradeneeded=e=>e.target.result.createObjectStore('kv');rq.onsuccess=e=>res(e.target.result);rq.onerror=rej;});}
async function idbPut(key,val){try{const db=await idbOpen();const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);}catch(e){}}
async function idbGet(key){try{const db=await idbOpen();return new Promise((res)=>{const tx=db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(key);rq.onsuccess=()=>res(rq.result??null);rq.onerror=()=>res(null);});}catch(e){return null;}}

async function tryRestoreHandle(){
  const h=await idbGet('dirHandle');
  if(!h) return;
  try{
    const perm=await h.queryPermission({mode:'readwrite'});
    if(perm==='granted'){applyHandle(h);return;}
    // Permission was not persisted — can't request without user gesture, skip silently
  }catch(e){}
}
function applyHandle(h){
  state.dirHandle=h;
  const btn=document.getElementById('folderBtn');
  btn.textContent='✓ '+h.name+' connected';
  btn.classList.add('connected');
}

// ─── Load languages ───────────────────────────────────────────────────────────
async function loadLanguages(){
  state.langs={};
  try{
    const idx=await fetch(`lang/index.json?t=${Date.now()}`).then(r=>r.json());
    const names=(idx.languages||[]).filter(n=>!n.startsWith('_'));
    await Promise.all(names.map(name=>
      fetch(`lang/${name}/lang.json?t=${Date.now()}`)
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(d=>{if(d&&d.key)state.langs[d.key]=d;})
        .catch(e=>console.warn(`Skip ${name}:`,e.message))
    ));
  }catch(e){console.error('Failed to load index',e);}
  renderLangList();
}

// ─── Language list ────────────────────────────────────────────────────────────
function renderLangList(){
  const el=document.getElementById('langList');
  el.innerHTML='';
  for(const[key,lang]of Object.entries(state.langs)){
    const item=document.createElement('div');
    item.className='lang-item'+(state.selKey===key?' active':'');
    item.innerHTML=`<span class="lang-dot" style="background:${lang.color}"></span><span class="lang-item-name">${lang.label||key}</span><span class="lang-item-key">${key}</span>`;
    item.addEventListener('click',()=>selectLang(key));
    el.appendChild(item);
  }
}

function selectLang(key){
  if(state.unsaved&&!confirm('Discard unsaved changes?'))return;
  state.selKey=key; state.langDraft=clone(state.langs[key]);
  state.unsaved=false; state.vowelIdx=null; state.vowelDraft=null;
  renderLangList(); renderMain();
}

// ─── Render main panel ────────────────────────────────────────────────────────
function renderMain(){
  const panel=document.getElementById('mainPanel');
  const ph=document.getElementById('placeholder');
  if(!state.langDraft){ph.style.display='flex';return;}
  ph.style.display='none';
  [...panel.children].forEach(c=>{if(c!==ph)c.remove();});

  // ── Language metadata form ──
  const form=document.createElement('div');
  form.className='lang-form';
  form.innerHTML=`
    <div class="form-row">
      <div class="field"><label>Key</label><input type="text" id="fKey" value="${state.langDraft.key||''}" style="width:80px"></div>
      <div class="field"><label>Label</label><input type="text" id="fLabel" value="${state.langDraft.label||''}" style="width:140px"></div>
      <div class="field"><label>Color</label><input type="color" id="fColor" value="${state.langDraft.color||'#7eb8f7'}"></div>
    </div>
    <div class="lang-form-actions">
      <button class="btn btn-primary" id="saveLangBtn" type="button">💾 Save</button>
      <span class="unsaved-note" id="unsavedNote" style="display:none">● unsaved</span>
    </div>`;
  panel.appendChild(form);
  ['fKey','fLabel','fColor'].forEach(id=>{
    document.getElementById(id).addEventListener('input',e=>{
      const map={fKey:'key',fLabel:'label',fColor:'color'};
      state.langDraft[map[id]]=e.target.value; markUnsaved();
    });
  });
  document.getElementById('saveLangBtn').addEventListener('click',saveLang);

  // ── Chart section with tabs ──
  const cs=document.createElement('div');
  cs.className='chart-section';
  cs.innerHTML=`
    <div class="chart-top-bar">
      <div class="chart-tabs">
        <button class="chart-tab${state.chartTab==='ipa'?' active':''}" id="tabIpa" type="button">IPA Chart</button>
        <button class="chart-tab${state.chartTab==='form'?' active':''}" id="tabForm" type="button">Formant Plot</button>
      </div>
    </div>
    <div class="chart-tab-panel${state.chartTab==='ipa'?' active':''}" id="panelIpa">
      <div class="chart-wrap"><svg class="chart-svg" id="langIpaSvg" viewBox="0 0 700 420"></svg></div>
    </div>
    <div class="chart-tab-panel${state.chartTab==='form'?' active':''}" id="panelForm">
      <div class="chart-wrap"><svg class="chart-svg" id="langFormSvg" viewBox="0 0 700 420"></svg></div>
    </div>
    <p class="chart-hint" id="chartHint">${state.vowelIdx!==null?'Click chart to reposition vowel':'Click a vowel to edit it'}</p>`;
  panel.appendChild(cs);

  document.getElementById('tabIpa').addEventListener('click',()=>{state.chartTab='ipa';document.getElementById('tabIpa').classList.add('active');document.getElementById('tabForm').classList.remove('active');document.getElementById('panelIpa').classList.add('active');document.getElementById('panelForm').classList.remove('active');});
  document.getElementById('tabForm').addEventListener('click',()=>{state.chartTab='form';document.getElementById('tabForm').classList.add('active');document.getElementById('tabIpa').classList.remove('active');document.getElementById('panelForm').classList.add('active');document.getElementById('panelIpa').classList.remove('active');});

  // Chart click handlers — position a vowel being edited
  function onIpaClick(clientX,clientY){
    if(state.vowelIdx===null)return;
    const svg=document.getElementById('langIpaSvg');
    const pt=svgPt(svg,clientX,clientY);
    const {h,b}=ltHB(pt.x,pt.y);
    const diph=state.vowelDraft.type==='diphthong';
    if(diph && state.clickTarget==='target'){
      state.vowelDraft.h2=h; state.vowelDraft.b2=b;
      state.clickTarget='start';
    } else {
      state.vowelDraft.h=h; state.vowelDraft.b=b;
      if(diph) state.clickTarget='target';
    }
    syncCoordsToForm(); refreshCharts();
    // Update the toggle label if visible
    const lbl=document.getElementById('clickTargetLabel');
    if(lbl) lbl.textContent=state.clickTarget==='target'?'Target':'Start';
  }
  function onFormClick(clientX,clientY){
    if(state.vowelIdx===null)return;
    const svg=document.getElementById('langFormSvg');
    const pt=svgPt(svg,clientX,clientY);
    const {f1,f2}=lfF1F2(pt.x,pt.y);
    state.vowelDraft.f1=f1; state.vowelDraft.f2=f2;
    syncCoordsToForm(); refreshCharts();
  }
  ['langIpaSvg'].forEach(id=>{
    const s=document.getElementById(id);
    let drag=false;
    s.addEventListener('mousedown',e=>{drag=true;onIpaClick(e.clientX,e.clientY);});
    s.addEventListener('mouseup',()=>drag=false);
    s.addEventListener('mousemove',e=>{if(drag)onIpaClick(e.clientX,e.clientY);});
    s.addEventListener('click',e=>onIpaClick(e.clientX,e.clientY));
  });
  ['langFormSvg'].forEach(id=>{
    const s=document.getElementById(id);
    let drag=false;
    s.addEventListener('mousedown',e=>{drag=true;onFormClick(e.clientX,e.clientY);});
    s.addEventListener('mouseup',()=>drag=false);
    s.addEventListener('mousemove',e=>{if(drag)onFormClick(e.clientX,e.clientY);});
    s.addEventListener('click',e=>onFormClick(e.clientX,e.clientY));
  });

  // ── Inline vowel editor (always in DOM, shown/hidden) ──
  const veSection=document.createElement('div');
  veSection.id='veInline';
  veSection.className='ve-inline';
  veSection.style.display=state.vowelIdx!==null?'block':'none';
  panel.appendChild(veSection);

  // ── Vowel cards ──
  const vs=document.createElement('div');
  vs.className='vowel-section';
  vs.innerHTML=`<div class="section-head"><span class="section-title" id="sectionTitle">Vowels (${(state.langDraft.vowels||[]).length})</span><button class="btn btn-secondary btn-sm" id="addVowelBtn" type="button">+ Add Vowel</button></div><div class="vowel-cards" id="vowelCards"></div>`;
  panel.appendChild(vs);
  document.getElementById('addVowelBtn').addEventListener('click',()=>openVowelEditor(-1));

  refreshCharts();
  renderVowelCards();
  if(state.vowelIdx!==null) buildInlineForm();
}

// ─── Refresh charts (called on any draft change) ───────────────────────────────
function refreshCharts(){
  renderLangIpa();
  renderLangFormant();
  const hint=document.getElementById('chartHint');
  if(hint){
    if(state.vowelIdx!==null && state.vowelDraft?.type==='diphthong'){
      hint.textContent=`Click chart to set ${state.clickTarget==='target'?'TARGET (end)':'START (begin)'} position`;
    } else {
      hint.textContent=state.vowelIdx!==null?'Click chart to reposition vowel':'Click a vowel to edit it';
    }
  }
}

// ─── Sync coordinate form inputs from draft ───────────────────────────────────
function syncCoordsToForm(){
  if(state.vowelDraft===null)return;
  const map={veH:'h',veB:'b',veF1:'f1',veF2:'f2',veH2:'h2',veB2:'b2'};
  for(const[id,key]of Object.entries(map)){
    const el=document.getElementById(id);
    if(el) el.value=state.vowelDraft[key]??'';
  }
}

// ─── Open vowel editor ────────────────────────────────────────────────────────
function openVowelEditor(idx){
  state.vowelIdx=idx;
  const existing=(idx>=0&&state.langDraft.vowels)?state.langDraft.vowels[idx]:null;
  state.vowelDraft=existing?clone(existing):{ipa:'',h:0.5,b:0.5,h2:null,b2:null,rounded:false,desc:'',type:'short',f1:null,f2:null,ipaAudio:'',wikiUrl:'',words:[]};
  const veSection=document.getElementById('veInline');
  if(veSection){veSection.style.display='block';buildInlineForm();}
  renderVowelCards();
  refreshCharts();
}

function closeVowelEditor(){
  state.vowelIdx=null; state.vowelDraft=null;
  const veSection=document.getElementById('veInline');
  if(veSection)veSection.style.display='none';
  renderVowelCards(); refreshCharts();
}

// ─── Inline vowel form ────────────────────────────────────────────────────────

      <span style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Start position</span>
      <button type="button" id="clickTargetBtn" style="font-size:.68rem;padding:2px 9px;border-radius:6px;border:1px solid var(--border);background:var(--input);color:var(--accent);cursor:pointer">
        Next click → <b id="clickTargetLabel">${state.clickTarget==='target'?'Target':'Start'}</b>
      </button>

function applyVowel(){
  if(!state.vowelDraft)return;
  if(!state.vowelDraft.ipa?.trim()){toast('IPA symbol is required');return;}
  if(!state.langDraft.vowels)state.langDraft.vowels=[];
  if(state.vowelIdx<0)state.langDraft.vowels.push(state.vowelDraft);
  else state.langDraft.vowels[state.vowelIdx]=state.vowelDraft;
  markUnsaved();
  const applied=state.vowelDraft.ipa;
  closeVowelEditor();
  updateSectionTitle();
  toast(`Vowel "${applied}" applied`);
}

function renderWordRows(container,v){
  container.innerHTML='';
  (v.words||[]).forEach((w,i)=>{
    const row=document.createElement('div'); row.className='word-row';
    row.innerHTML=`<input type="text" class="word-text" placeholder="f&lt;b&gt;ee&lt;/b&gt;t" value="${(w.text||'').replace(/"/g,'&quot;')}"><input type="url" class="word-audio" placeholder="Audio URL" value="${w.audio||''}"><button class="word-del" title="Remove">✕</button>`;
    row.querySelector('.word-text').addEventListener('input',e=>w.text=e.target.value);
    row.querySelector('.word-audio').addEventListener('input',e=>w.audio=e.target.value||null);
    row.querySelector('.word-del').addEventListener('click',()=>{v.words.splice(i,1);renderWordRows(container,v);});
    container.appendChild(row);
  });
}

// ─── IPA picker grid ──────────────────────────────────────────────────────────

// ─── SVG draw helpers ─────────────────────────────────────────────────────────

  const T=LT;
  svg.appendChild($s('path',{d:`M${T.TL.x},${T.TL.y} L${T.TR.x},${T.TR.y} L${T.BR.x},${T.BR.y} L${T.BL.x},${T.BL.y}Z`,fill:'none',stroke:'#2e4a64','stroke-width':1.5}));
  TRAP_ROWS.forEach(row=>{const p=ltPos(row.h,0);svg.appendChild($t(row.label,{x:p.x-14,y:p.y,dy:'0.36em','text-anchor':'end','font-size':9,fill:'#4a6888','font-family':'system-ui'}));});
  [['Front',0],['Central',.5],['Back',1]].forEach(([l,b])=>{const p=ltPos(0,b);svg.appendChild($t(l,{x:p.x,y:p.y-16,'text-anchor':'middle','font-size':9,fill:'#4a6888','font-family':'system-ui'}));});
}

  svg.appendChild($s('rect',{x:LF.x0,y:LF.y0,width:LF.x1-LF.x0,height:LF.y1-LF.y0,fill:'#192535',rx:4}));

  [200,300,400,500,600,700,800,900,1000].forEach(f1=>{

function drawCardinalDots(svg, posFn, validFn){
  const cl=state.langs['cardinal'];
  if(!cl)return;
  cl.vowels.forEach(cv=>{
    if(validFn&&!validFn(cv))return;
    const{x,y}=posFn(cv);
    svg.appendChild($s('circle',{cx:x,cy:y,r:3.5,fill:'#4a6888'}));
    svg.appendChild($t(cv.ipa,{x:x+(cv.rounded?5:-5),y,dy:'0.35em','text-anchor':cv.rounded?'start':'end','font-size':7,fill:'#4a6888','font-family':'Georgia,serif',style:'pointer-events:none'}));
  });
}

function isDiph(v){ return v.type==='diphthong' && v.h2!=null && v.b2!=null; }

function drawDiphArrow(layer, x1, y1, x2, y2, v, c, isAct){
  const dist=Math.hypot(x2-x1,y2-y1); if(dist<3)return;
  const op=isAct?0.88:0.5;
  const dx=x2-x1,dy=y2-y1,len=dist,off=Math.min(dist*0.28,40);
  const cpx=(x1+x2)/2-(dy/len)*off, cpy=(y1+y2)/2+(dx/len)*off;
  const pathD=`M${x1},${y1} Q${cpx},${cpy} ${x2},${y2}`;
  const pathId=`edp_${v.ipa.replace(/[^\w]/g,'X')}_${Math.round(x1+y1)}`;
  layer.appendChild($s('path',{id:pathId,d:pathD,fill:'none',stroke:'none'}));
  const tx=x2-cpx,ty=y2-cpy,tl=Math.hypot(tx,ty),AR=9;
  const xe=x2-tx/tl*AR, ye=y2-ty/tl*AR;
  layer.appendChild($s('path',{
    d:`M${x1},${y1} Q${cpx},${cpy} ${xe.toFixed(1)},${ye.toFixed(1)}`,
    fill:'none',stroke:c,'stroke-width':isAct?2:1.5,opacity:op,'stroke-linecap':'round',style:'pointer-events:none',
  }));
  const ux=tx/tl,uy=ty/tl,W=4;
  layer.appendChild($s('polygon',{
    points:`${x2.toFixed(1)},${y2.toFixed(1)} ${(xe-uy*W).toFixed(1)},${(ye+ux*W).toFixed(1)} ${(xe+uy*W).toFixed(1)},${(ye-ux*W).toFixed(1)}`,
    fill:c,opacity:op,style:'pointer-events:none',
  }));
  if(isAct && v.ipa){
    const textEl=document.createElementNS('http://www.w3.org/2000/svg','text');
    textEl.setAttribute('font-size','13'); textEl.setAttribute('font-family',"Georgia,'Noto Serif',serif");
    textEl.setAttribute('fill',c); textEl.setAttribute('opacity','0.9'); textEl.setAttribute('dy','-4');
    textEl.style.cssText='pointer-events:none;user-select:none';
    const tp=document.createElementNS('http://www.w3.org/2000/svg','textPath');
    tp.setAttribute('href','#'+pathId); tp.setAttribute('startOffset','50%'); tp.setAttribute('text-anchor','middle');
    tp.textContent=v.ipa; textEl.appendChild(tp); layer.appendChild(textEl);
  }
}

function drawVowelsOnChart(svg, vowels, activeIdx, c, posFn, validFn, showArrows=false){
  const arrowL=$s('g'), dotLayer=$s('g'), labelLayer=$s('g');
  svg.appendChild(arrowL); svg.appendChild(dotLayer); svg.appendChild(labelLayer);

  // Draw diphthong arrows first (behind dots)
  if(showArrows){
    vowels.forEach((v,i)=>{
      if(!isDiph(v))return;
      if(validFn&&!validFn(v))return;
      const sp=posFn(v); if(!sp)return;
      const tp=posFn({...v,h:v.h2,b:v.b2}); if(!tp)return;
      const isAct=i===activeIdx;
      drawDiphArrow(arrowL,sp.x,sp.y,tp.x,tp.y,v,c,isAct);
      // Hollow target dot
      dotLayer.appendChild($s('circle',{cx:tp.x,cy:tp.y,r:isAct?6:4,fill:'none',stroke:c+(isAct?'cc':'88'),'stroke-width':isAct?2:1.5}));
    });
  }

  // Group by snapped pos
  const groups=new Map();
  vowels.forEach((v,i)=>{
    if(validFn&&!validFn(v))return;
    const pos=posFn(v); if(!pos)return;
    const{x,y}=pos;
    const pk=`${Math.round(x/3)},${Math.round(y/3)}`;
    if(!groups.has(pk))groups.set(pk,[]);
    groups.get(pk).push({v,i,x,y});
  });

  // Dots
  groups.forEach(grp=>{
    const{x,y}=grp[0];
    const isAct=grp.some(g=>g.i===activeIdx);
    const dotR=isAct?7:5;
    if(grp.length>1)dotLayer.appendChild($s('circle',{cx:x,cy:y,r:dotR+4,fill:'none',stroke:c+'55','stroke-width':1.5,'stroke-dasharray':'3 2'}));
    dotLayer.appendChild($s('circle',{cx:x,cy:y,r:dotR,fill:isAct?c:c+'99'}));
  });

  // Labels
  vowels.forEach((v,i)=>{
    if(validFn&&!validFn(v))return;
    const pos=posFn(v); if(!pos)return;
    const{x,y}=pos;
    const isAct=i===activeIdx;
    const FS=isAct?17:13;
    const dotR=isAct?7:5;
    const GAP=5;
    const lx=v.rounded?x+dotR+GAP:x-dotR-GAP;
    const anchor=v.rounded?'start':'end';
    const g=$s('g',{style:'cursor:pointer'});
    const tw=(v.ipa||'').length*FS*0.6;
    g.appendChild($s('rect',{x:(v.rounded?lx:lx-tw)-4,y:y-FS*0.5-4,width:tw+8,height:FS+8,rx:4,fill:'transparent'}));
    const lbl=$t(v.ipa||'?',{x:lx,y,dy:'0.36em','text-anchor':anchor,'font-size':FS,fill:isAct?'#ffffff':c,opacity:isAct?1:0.82,'font-family':"Georgia,'Noto Serif',serif",'font-weight':isAct?'bold':'normal',style:`filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));user-select:none`});
    if(isAct)lbl.style.filter=`drop-shadow(0 0 5px ${c}) drop-shadow(0 1px 2px rgba(0,0,0,.5))`;
    g.appendChild(lbl);
    g.addEventListener('click',e=>{e.stopPropagation();openVowelEditor(i);});
    g.addEventListener('mouseenter',e=>{const tip=document.getElementById('chartTip');tip.textContent=`${v.ipa} — ${v.desc||''}`;tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-28)+'px';});
    g.addEventListener('mousemove',e=>{const tip=document.getElementById('chartTip');tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-28)+'px';});
    g.addEventListener('mouseleave',()=>document.getElementById('chartTip').style.display='none');
    labelLayer.appendChild(g);
  });
}

// ─── Render language IPA chart ────────────────────────────────────────────────
function renderLangIpa(){
  const svg=document.getElementById('langIpaSvg');
  if(!svg)return;
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  drawGridIpa(svg);
  drawCardinalDots(svg,cv=>ltPos(+cv.h||0,+cv.b||0));
  const vowels=[...(state.langDraft?.vowels||[])];
  const activeIdx=state.vowelIdx;
  // If editing, show draft in place of the original
  if(state.vowelDraft!==null&&activeIdx>=0) vowels[activeIdx]=state.vowelDraft;
  else if(state.vowelDraft!==null&&activeIdx<0) vowels.push(state.vowelDraft);
  const c=state.langDraft?.color||'#7eb8f7';
  drawVowelsOnChart(svg,vowels,activeIdx<0?vowels.length-1:activeIdx,c,v=>ltPos(+v.h||0,+v.b||0),null,true);
}

// ─── Render language formant chart ────────────────────────────────────────────
function renderLangFormant(){
  const svg=document.getElementById('langFormSvg');
  if(!svg)return;
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  drawGridFormant(svg);
  drawCardinalDots(svg,cv=>{
    const f1=+cv.f1,f2=+cv.f2;
    if(!f1||!f2)return{x:-100,y:-100};
    return lfPos(f1,f2);
  },cv=>cv.f1&&cv.f2);
  const vowels=[...(state.langDraft?.vowels||[])];
  const activeIdx=state.vowelIdx;
  if(state.vowelDraft!==null&&activeIdx>=0) vowels[activeIdx]=state.vowelDraft;
  else if(state.vowelDraft!==null&&activeIdx<0) vowels.push(state.vowelDraft);
  const c=state.langDraft?.color||'#7eb8f7';
  drawVowelsOnChart(svg,vowels,activeIdx<0?vowels.length-1:activeIdx,c,
    v=>{const f1=+v.f1,f2=+v.f2;if(!f1||!f2)return null;return lfPos(f1,f2);},
    v=>!!(v.f1&&v.f2));
}

// ─── Vowel cards ─────────────────────────────────────────────────────────────
function renderVowelCards(){
  const grid=document.getElementById('vowelCards');
  if(!grid)return;
  grid.innerHTML='';
  const c=state.langDraft?.color||'#7eb8f7';
  let curAudio=null;
  function playUrl(url){if(!url)return;if(curAudio){curAudio.pause();curAudio.currentTime=0;}curAudio=new Audio(url);curAudio.play().catch(()=>{});}

  (state.langDraft.vowels||[]).forEach((v,i)=>{
    const isActive=state.vowelIdx===i;
    const card=document.createElement('div');
    card.className='vowel-card'+(isActive?' active':'');
    card.style.borderColor=isActive?c:'';
    const ws=v.words||[];
    let wordsHtml='';
    if(ws.length){
      wordsHtml+='<div class="vc-words-label">Examples</div><div class="vc-words">';
      ws.forEach((w,wi)=>{const ha=!!w.audio;wordsHtml+=`<button class="vc-word ${ha?'has-audio':'no-audio'}" data-wi="${wi}" data-audio="${w.audio||''}">${ha?'<span class="pi">▶</span>':''}${w.text||''}</button>`;});
      wordsHtml+='</div>';
    }
    card.innerHTML=`
      <div class="vc-ipa" style="color:${c}">${v.ipa||'?'}</div>
      <div class="vc-desc">${v.desc||''}</div>
      <div class="vc-round" style="color:${c}70">${v.rounded?'⊙ Rounded':'○ Unrounded'} · ${v.type||'short'}</div>
      ${v.f1?`<div class="vc-formants">F1 <span>${v.f1}</span> · F2 <span>${v.f2}</span> Hz</div>`:''}
      ${wordsHtml}
      <div class="vc-actions">
        <button class="vc-btn vc-play">▶ Sound</button>
        <button class="vc-btn" data-i="${i}" data-action="edit">✎ Edit</button>
        <button class="vc-btn del" data-i="${i}" data-action="del">✕</button>
      </div>`;
    card.querySelectorAll('.vc-word.has-audio').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();playUrl(btn.dataset.audio);}));
    card.querySelector('.vc-play').addEventListener('click',e=>{e.stopPropagation();playUrl(v.ipaAudio);});
    card.querySelectorAll('.vc-btn[data-action]').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        const idx=+btn.dataset.i;
        if(btn.dataset.action==='edit')openVowelEditor(idx);
        else if(btn.dataset.action==='del'&&confirm(`Delete vowel "${v.ipa}"?`)){
          state.langDraft.vowels.splice(idx,1);
          if(state.vowelIdx===idx)closeVowelEditor();
          else if(state.vowelIdx>idx)state.vowelIdx--;
          markUnsaved(); renderVowelCards(); refreshCharts(); updateSectionTitle();
        }
      });
    });
    card.addEventListener('click',()=>openVowelEditor(i));
    grid.appendChild(card);
  });
}

function updateSectionTitle(){const el=document.getElementById('sectionTitle');if(el)el.textContent=`Vowels (${(state.langDraft?.vowels||[]).length})`;}
function markUnsaved(){state.unsaved=true;const n=document.getElementById('unsavedNote');if(n)n.style.display='inline';}

// ─── Save language ────────────────────────────────────────────────────────────
async function saveLang(){
  if(!state.langDraft)return;
  const data=clone(state.langDraft);
  const key=data.key;
  if(!key){toast('Language key is required');return;}
  const json=JSON.stringify(data,null,2);

  if(state.dirHandle){
    try{
      const subDir=await state.dirHandle.getDirectoryHandle(key,{create:true});
      const fh=await subDir.getFileHandle('lang.json',{create:true});
      const w=await fh.createWritable(); await w.write(json); await w.close();
      // Update index.json
      const allKeys=Object.keys(state.langs);
      if(!allKeys.includes(key))allKeys.push(key);
      const origKey=state.selKey;
      if(origKey&&origKey!==key){const p=allKeys.indexOf(origKey);if(p>=0)allKeys.splice(p,1);}
      const idxFh=await state.dirHandle.getFileHandle('index.json',{create:true});
      const iw=await idxFh.createWritable(); await iw.write(JSON.stringify({languages:allKeys},null,2)); await iw.close();
      if(origKey&&origKey!==key)delete state.langs[origKey];
      state.langs[key]=data; state.selKey=key; state.unsaved=false;
      const n=document.getElementById('unsavedNote'); if(n)n.style.display='none';
      renderLangList(); toast('✓ Saved to lang/'+key+'/lang.json');
      return;
    }catch(e){console.error('FS write failed:',e); toast('Write failed — downloading instead');}
  }
  // Fallback: download
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='lang.json'; a.click();
  toast(`Downloaded — put in lang/${key}/`);
  state.langs[key]=data; state.selKey=key; state.unsaved=false;
  const n=document.getElementById('unsavedNote'); if(n)n.style.display='none';
  renderLangList();
}

// ─── Folder connect ───────────────────────────────────────────────────────────
document.getElementById('folderBtn').addEventListener('click',async()=>{
  if(!window.showDirectoryPicker){toast('File System API not supported — use Chrome/Edge');return;}
  try{
    const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
    applyHandle(h);
    await idbPut('dirHandle',h);
    toast('Folder connected — saves go directly to files');
  }catch(e){if(e.name!=='AbortError')toast('Could not connect: '+e.message);}
});

// ─── New language ─────────────────────────────────────────────────────────────
document.getElementById('newLangBtn').addEventListener('click',()=>{
  if(state.unsaved&&!confirm('Discard unsaved changes?'))return;
  const key='lang-'+Date.now().toString(36);
  const fresh={key,label:'New Language',color:'#a78bfa',vowels:[]};
  state.langs[key]=fresh; state.selKey=key; state.langDraft=clone(fresh);
  state.unsaved=true; state.vowelIdx=null; state.vowelDraft=null;
  renderLangList(); renderMain();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  await tryRestoreHandle();
  await loadLanguages();
}
init();
</script>
