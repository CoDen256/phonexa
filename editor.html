<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Language Editor</title>
<link rel="stylesheet" href="css/editor.css">
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Chart</a>
  <h1>Language Editor</h1>
  <button class="folder-btn" id="folderBtn" type="button">📁 Connect lang/ folder</button>
</div>

<div class="editor-layout">
  <aside class="lang-sidebar">
    <div class="lang-sidebar-head">
      <button class="new-lang-btn" id="newLangBtn" type="button">+ New Language</button>
    </div>
    <div class="lang-list" id="langList"></div>
  </aside>
  <main class="main-panel" id="mainPanel">
    <div class="placeholder" id="placeholder">← Select a language to edit</div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div id="chartTip" style="position:fixed;display:none;background:#0d1524;border:1px solid #2e4560;border-radius:7px;padding:5px 10px;font-size:.74rem;color:#c8d8e8;pointer-events:none;z-index:9998;max-width:280px;white-space:nowrap"></div>

<!-- Shared utilities (SVG helpers, isDiph) -->
<script src="js/utils.js"></script>
<!-- Editor chart helpers -->
<script src="js/editor-charts.js"></script>
<!-- Editor vowel cards + form -->
<script src="js/editor-vowels.js"></script>

<script>
// ─── IPA data ─────────────────────────────────────────────────────────────────
const IPA_ROWS=[
  {label:'Close',   pairs:[['i','y'],['ɨ','ʉ'],['ɯ','u']]},
  {label:'Near-cl', pairs:[['ɪ','ʏ'],[null,null],['ʊ',null]]},
  {label:'Cl-mid',  pairs:[['e','ø'],['ɘ','ɵ'],['ɤ','o']]},
  {label:'Mid',     pairs:[[null,null],['ə',null],[null,null]]},
  {label:'Op-mid',  pairs:[['ɛ','œ'],['ɜ','ɞ'],['ʌ','ɔ']]},
  {label:'Near-op', pairs:[['æ',null],['ɐ',null],[null,null]]},
  {label:'Open',    pairs:[['a','ɶ'],[null,null],['ɑ','ɒ']]},
];
const IPA_MODS=[
  {ch:'ː',lbl:'long'},{ch:'ˑ',lbl:'½-long'},{ch:'̃',lbl:'nasal'},
  {ch:'ʲ',lbl:'palat'},{ch:'ʷ',lbl:'lab'},{ch:'ˠ',lbl:'velar'},
  {ch:'ˤ',lbl:'phar'},{ch:'ʰ',lbl:'asp'},{ch:'̥',lbl:'voiceless'},
];

// ─── Large chart geometry (viewBox 700 × 420) ─────────────────────────────────
// IPA trapezoid
const LT={TL:{x:90,y:42},TR:{x:648,y:42},BL:{x:234,y:378},BR:{x:648,y:378}};
function ltPos(h,b){const fX=LT.TL.x+h*(LT.BL.x-LT.TL.x);return{x:fX+b*(LT.TR.x-fX),y:LT.TL.y+h*(LT.BL.y-LT.TL.y)};}
function ltHB(px,py){
  const h=Math.max(0,Math.min(1,(py-LT.TL.y)/(LT.BL.y-LT.TL.y)));
  const fX=LT.TL.x+h*(LT.BL.x-LT.TL.x);
  return{h:+h.toFixed(4),b:+Math.max(0,Math.min(1,(px-fX)/(LT.TR.x-fX))).toFixed(4)};
}
// Formant plot (same viewBox)
const LF={x0:60,x1:685,y0:30,y1:390};
const F2MIN=400,F2MAX=2800,F1MIN=150,F1MAX=1000;
function lfPos(f1,f2){
  return{x:LF.x1-(f2-F2MIN)/(F2MAX-F2MIN)*(LF.x1-LF.x0),y:LF.y0+(f1-F1MIN)/(F1MAX-F1MIN)*(LF.y1-LF.y0)};
}
function lfF1F2(px,py){
  return{
    f2:Math.round(Math.max(F2MIN,Math.min(F2MAX,F2MAX-(px-LF.x0)/(LF.x1-LF.x0)*(F2MAX-F2MIN)))),
    f1:Math.round(Math.max(F1MIN,Math.min(F1MAX,F1MIN+(py-LF.y0)/(LF.y1-LF.y0)*(F1MAX-F1MIN)))),
  };
}
const TRAP_ROWS=[
  {h:0,label:'Close'},{h:1/6,label:'Near-cl'},{h:2/6,label:'Cl-mid'},
  {h:3/6,label:'Mid'},{h:4/6,label:'Op-mid'},{h:5/6,label:'Near-op'},{h:1,label:'Open'},
];

// ─── State ────────────────────────────────────────────────────────────────────
const state={
  langs:{}, selKey:null, langDraft:null,
  vowelIdx:null, vowelDraft:null,
  dirHandle:null, unsaved:false, chartTab:'ipa', clickTarget:'start',
};

// ─── Utilities ────────────────────────────────────────────────────────────────
function clone(o){return JSON.parse(JSON.stringify(o));}
function toast(msg,dur=2200){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function svgPt(svgEl,cx,cy){const r=svgEl.getBoundingClientRect(),vb=svgEl.viewBox.baseVal;return{x:(cx-r.left)/r.width*vb.width,y:(cy-r.top)/r.height*vb.height};}

// ─── IndexedDB persistence for dirHandle ──────────────────────────────────────
function idbOpen(){return new Promise((res,rej)=>{const rq=indexedDB.open('ipa-editor',1);rq.onupgradeneeded=e=>e.target.result.createObjectStore('kv');rq.onsuccess=e=>res(e.target.result);rq.onerror=rej;});}
async function idbPut(key,val){try{const db=await idbOpen();const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);}catch(e){}}
async function idbGet(key){try{const db=await idbOpen();return new Promise((res)=>{const tx=db.transaction('kv','readonly');const rq=tx.objectStore('kv').get(key);rq.onsuccess=()=>res(rq.result??null);rq.onerror=()=>res(null);});}catch(e){return null;}}

async function tryRestoreHandle(){
  const h=await idbGet('dirHandle');
  if(!h) return;
  try{
    const perm=await h.queryPermission({mode:'readwrite'});
    if(perm==='granted'){applyHandle(h);return;}
    // Permission was not persisted — can't request without user gesture, skip silently
  }catch(e){}
}
function applyHandle(h){
  state.dirHandle=h;
  const btn=document.getElementById('folderBtn');
  btn.textContent='✓ '+h.name+' connected';
  btn.classList.add('connected');
}

// ─── Load languages ───────────────────────────────────────────────────────────
async function loadLanguages(){
  state.langs={};
  try{
    const idx=await fetch(`lang/index.json?t=${Date.now()}`).then(r=>r.json());
    const names=(idx.languages||[]).filter(n=>!n.startsWith('_'));
    await Promise.all(names.map(name=>
      fetch(`lang/${name}/lang.json?t=${Date.now()}`)
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(d=>{if(d&&d.key)state.langs[d.key]=d;})
        .catch(e=>console.warn(`Skip ${name}:`,e.message))
    ));
  }catch(e){console.error('Failed to load index',e);}
  renderLangList();
}

// ─── Language list ────────────────────────────────────────────────────────────
function renderLangList(){
  const el=document.getElementById('langList');
  el.innerHTML='';
  for(const[key,lang]of Object.entries(state.langs)){
    const item=document.createElement('div');
    item.className='lang-item'+(state.selKey===key?' active':'');
    item.innerHTML=`<span class="lang-dot" style="background:${lang.color}"></span><span class="lang-item-name">${lang.label||key}</span><span class="lang-item-key">${key}</span>`;
    item.addEventListener('click',()=>selectLang(key));
    el.appendChild(item);
  }
}

function selectLang(key){
  if(state.unsaved&&!confirm('Discard unsaved changes?'))return;
  state.selKey=key; state.langDraft=clone(state.langs[key]);
  state.unsaved=false; state.vowelIdx=null; state.vowelDraft=null;
  renderLangList(); renderMain();
}

// ─── Render main panel ────────────────────────────────────────────────────────
function renderMain(){
  const panel=document.getElementById('mainPanel');
  const ph=document.getElementById('placeholder');
  if(!state.langDraft){ph.style.display='flex';return;}
  ph.style.display='none';
  [...panel.children].forEach(c=>{if(c!==ph)c.remove();});

  // ── Language metadata form ──
  const form=document.createElement('div');
  form.className='lang-form';
  form.innerHTML=`
    <div class="form-row">
      <div class="field"><label>Key</label><input type="text" id="fKey" value="${state.langDraft.key||''}" style="width:80px"></div>
      <div class="field"><label>Label</label><input type="text" id="fLabel" value="${state.langDraft.label||''}" style="width:140px"></div>
      <div class="field"><label>Color</label><input type="color" id="fColor" value="${state.langDraft.color||'#7eb8f7'}"></div>
    </div>
    <div class="lang-form-actions">
      <button class="btn btn-primary" id="saveLangBtn" type="button">💾 Save</button>
      <span class="unsaved-note" id="unsavedNote" style="display:none">● unsaved</span>
    </div>`;
  panel.appendChild(form);
  ['fKey','fLabel','fColor'].forEach(id=>{
    document.getElementById(id).addEventListener('input',e=>{
      const map={fKey:'key',fLabel:'label',fColor:'color'};
      state.langDraft[map[id]]=e.target.value; markUnsaved();
    });
  });
  document.getElementById('saveLangBtn').addEventListener('click',saveLang);

  // ── Chart section with tabs ──
  const cs=document.createElement('div');
  cs.className='chart-section';
  cs.innerHTML=`
    <div class="chart-top-bar">
      <div class="chart-tabs">
        <button class="chart-tab${state.chartTab==='ipa'?' active':''}" id="tabIpa" type="button">IPA Chart</button>
        <button class="chart-tab${state.chartTab==='form'?' active':''}" id="tabForm" type="button">Formant Plot</button>
      </div>
    </div>
    <div class="chart-tab-panel${state.chartTab==='ipa'?' active':''}" id="panelIpa">
      <div class="chart-wrap"><svg class="chart-svg" id="langIpaSvg" viewBox="0 0 700 420"></svg></div>
    </div>
    <div class="chart-tab-panel${state.chartTab==='form'?' active':''}" id="panelForm">
      <div class="chart-wrap"><svg class="chart-svg" id="langFormSvg" viewBox="0 0 700 420"></svg></div>
    </div>
    <p class="chart-hint" id="chartHint">${state.vowelIdx!==null?'Click chart to reposition vowel':'Click a vowel to edit it'}</p>`;
  panel.appendChild(cs);

  document.getElementById('tabIpa').addEventListener('click',()=>{state.chartTab='ipa';document.getElementById('tabIpa').classList.add('active');document.getElementById('tabForm').classList.remove('active');document.getElementById('panelIpa').classList.add('active');document.getElementById('panelForm').classList.remove('active');});
  document.getElementById('tabForm').addEventListener('click',()=>{state.chartTab='form';document.getElementById('tabForm').classList.add('active');document.getElementById('tabIpa').classList.remove('active');document.getElementById('panelForm').classList.add('active');document.getElementById('panelIpa').classList.remove('active');});

  // Chart click handlers — position a vowel being edited
  function onIpaClick(clientX,clientY){
    if(state.vowelIdx===null)return;
    const svg=document.getElementById('langIpaSvg');
    const pt=svgPt(svg,clientX,clientY);
    const {h,b}=ltHB(pt.x,pt.y);
    const diph=state.vowelDraft.type==='diphthong';
    if(diph && state.clickTarget==='target'){
      state.vowelDraft.h2=h; state.vowelDraft.b2=b;
      state.clickTarget='start';
    } else {
      state.vowelDraft.h=h; state.vowelDraft.b=b;
      if(diph) state.clickTarget='target';
    }
    syncCoordsToForm(); refreshCharts();
    // Update the toggle label if visible
    const lbl=document.getElementById('clickTargetLabel');
    if(lbl) lbl.textContent=state.clickTarget==='target'?'Target':'Start';
  }
  function onFormClick(clientX,clientY){
    if(state.vowelIdx===null)return;
    const svg=document.getElementById('langFormSvg');
    const pt=svgPt(svg,clientX,clientY);
    const {f1,f2}=lfF1F2(pt.x,pt.y);
    state.vowelDraft.f1=f1; state.vowelDraft.f2=f2;
    syncCoordsToForm(); refreshCharts();
  }
  ['langIpaSvg'].forEach(id=>{
    const s=document.getElementById(id);
    let drag=false;
    s.addEventListener('mousedown',e=>{drag=true;onIpaClick(e.clientX,e.clientY);});
    s.addEventListener('mouseup',()=>drag=false);
    s.addEventListener('mousemove',e=>{if(drag)onIpaClick(e.clientX,e.clientY);});
    s.addEventListener('click',e=>onIpaClick(e.clientX,e.clientY));
  });
  ['langFormSvg'].forEach(id=>{
    const s=document.getElementById(id);
    let drag=false;
    s.addEventListener('mousedown',e=>{drag=true;onFormClick(e.clientX,e.clientY);});
    s.addEventListener('mouseup',()=>drag=false);
    s.addEventListener('mousemove',e=>{if(drag)onFormClick(e.clientX,e.clientY);});
    s.addEventListener('click',e=>onFormClick(e.clientX,e.clientY));
  });

  // ── Inline vowel editor (always in DOM, shown/hidden) ──
  const veSection=document.createElement('div');
  veSection.id='veInline';
  veSection.className='ve-inline';
  veSection.style.display=state.vowelIdx!==null?'block':'none';
  panel.appendChild(veSection);

  // ── Vowel cards ──
  const vs=document.createElement('div');
  vs.className='vowel-section';
  vs.innerHTML=`<div class="section-head"><span class="section-title" id="sectionTitle">Vowels (${(state.langDraft.vowels||[]).length})</span><button class="btn btn-secondary btn-sm" id="addVowelBtn" type="button">+ Add Vowel</button></div><div class="vowel-cards" id="vowelCards"></div>`;
  panel.appendChild(vs);
  document.getElementById('addVowelBtn').addEventListener('click',()=>openVowelEditor(-1));

  refreshCharts();
  renderVowelCards();
  if(state.vowelIdx!==null) buildInlineForm();
}

// ─── Refresh charts (called on any draft change) ───────────────────────────────
function refreshCharts(){
  renderLangIpa();
  renderLangFormant();
  const hint=document.getElementById('chartHint');
  if(hint){
    if(state.vowelIdx!==null && state.vowelDraft?.type==='diphthong'){
      hint.textContent=`Click chart to set ${state.clickTarget==='target'?'TARGET (end)':'START (begin)'} position`;
    } else {
      hint.textContent=state.vowelIdx!==null?'Click chart to reposition vowel':'Click a vowel to edit it';
    }
  }
}

// ─── Sync coordinate form inputs from draft ───────────────────────────────────
function syncCoordsToForm(){
  if(state.vowelDraft===null)return;
  const map={veH:'h',veB:'b',veF1:'f1',veF2:'f2',veH2:'h2',veB2:'b2'};
  for(const[id,key]of Object.entries(map)){
    const el=document.getElementById(id);
    if(el) el.value=state.vowelDraft[key]??'';
  }
}

// ─── Open vowel editor ────────────────────────────────────────────────────────
function openVowelEditor(idx){
  state.vowelIdx=idx;
  const existing=(idx>=0&&state.langDraft.vowels)?state.langDraft.vowels[idx]:null;
  state.vowelDraft=existing?clone(existing):{ipa:'',h:0.5,b:0.5,h2:null,b2:null,rounded:false,desc:'',type:'short',f1:null,f2:null,ipaAudio:'',wikiUrl:'',words:[]};
  const veSection=document.getElementById('veInline');
  if(veSection){veSection.style.display='block';buildInlineForm();}
  renderVowelCards();
  refreshCharts();
}

function closeVowelEditor(){
  state.vowelIdx=null; state.vowelDraft=null;
  const veSection=document.getElementById('veInline');
  if(veSection)veSection.style.display='none';
  renderVowelCards(); refreshCharts();
}

// ─── Inline vowel form ────────────────────────────────────────────────────────
function buildInlineForm(){
  const sec=document.getElementById('veInline');
  if(!sec||!state.vowelDraft)return;
  sec.innerHTML='';
  const v=state.vowelDraft;
  const c=state.langDraft?.color||'#7eb8f7';

  // Header
  const hdr=document.createElement('div');
  hdr.className='ve-inline-header';
  hdr.innerHTML=`<span class="ve-inline-title" id="veTitle">${state.vowelIdx<0?'New Vowel':'Edit: '+v.ipa}</span>`;
  const cancelBtn=document.createElement('button'); cancelBtn.className='btn btn-secondary btn-sm'; cancelBtn.textContent='Cancel'; cancelBtn.type='button';
  const applyBtn=document.createElement('button'); applyBtn.className='btn btn-primary btn-sm'; applyBtn.textContent='Apply'; applyBtn.type='button';
  hdr.appendChild(cancelBtn); hdr.appendChild(applyBtn);
  cancelBtn.addEventListener('click',closeVowelEditor);
  applyBtn.addEventListener('click',applyVowel);
  sec.appendChild(hdr);

  // IPA picker
  const ipaSection=document.createElement('div'); ipaSection.className='ipa-section';
  const ipaLeft=document.createElement('div'); ipaLeft.className='ipa-left';
  ipaLeft.innerHTML=`<div class="ipa-preview" id="ipaPreview" style="color:${c}">${v.ipa||'?'}</div><div class="ipa-field-wrap"><label>Symbol</label><input class="ipa-text" type="text" id="ipaInput" value="${v.ipa||''}"></div>`;
  const ipaBox=document.createElement('div'); ipaBox.className='ipa-picker-box';
  ipaBox.innerHTML=`<div class="ipa-picker-title">Click to insert</div><div class="ipa-grid" id="ipaGrid"></div><div class="ipa-mods-row" id="ipaMods"></div>`;
  ipaSection.appendChild(ipaLeft); ipaSection.appendChild(ipaBox);
  sec.appendChild(ipaSection);

  const ipaInput=sec.querySelector('#ipaInput');
  ipaInput.addEventListener('input',()=>{
    v.ipa=ipaInput.value;
    document.getElementById('ipaPreview').textContent=v.ipa||'?';
    document.getElementById('veTitle').textContent=state.vowelIdx<0?'New Vowel':'Edit: '+v.ipa;
    refreshCharts(); renderVowelCards();
  });
  buildIpaPicker(ipaBox.querySelector('#ipaGrid'),ipaBox.querySelector('#ipaMods'),ipaInput,v,c);

  // Description + rounded
  const metaRow=document.createElement('div'); metaRow.className='ve-meta';
  metaRow.innerHTML=`
    <div class="field"><label>Description</label><input type="text" class="wide" id="fDesc" value="${v.desc||''}" placeholder="Close front unrounded"></div>
    <div class="field" style="flex:0;min-width:120px">
      <label>Type</label>
      <select id="fType" style="background:var(--input);border:1px solid var(--border);border-radius:6px;color:#d8e8f4;padding:6px 8px;font-size:.82rem;outline:none;cursor:pointer">
        <option value="short"      ${(v.type||'short')==='short'      ?'selected':''}>Short</option>
        <option value="long"       ${(v.type||'short')==='long'       ?'selected':''}>Long</option>
        <option value="diphthong"  ${(v.type||'short')==='diphthong'  ?'selected':''}>Diphthong</option>
        <option value="variable"   ${(v.type||'short')==='variable'   ?'selected':''}>Variable (long/short)</option>
      </select>
    </div>
    <div class="field" style="flex:0"><label>Rounded</label><div class="rounded-row"><input type="checkbox" id="fRounded" ${v.rounded?'checked':''}><span style="font-size:.8rem">Lip rounded</span></div></div>`;
  sec.appendChild(metaRow);
  metaRow.querySelector('#fDesc').addEventListener('input',e=>{v.desc=e.target.value;renderVowelCards();});
  metaRow.querySelector('#fType').addEventListener('change',e=>{
    v.type=e.target.value;
    if(v.type!=='diphthong'){delete v.h2;delete v.b2;}
    else if(v.h2==null){v.h2=v.h;v.b2=v.b;}
    state.clickTarget='start';
    buildInlineForm(); renderVowelCards(); refreshCharts();
  });
  metaRow.querySelector('#fRounded').addEventListener('change',e=>{v.rounded=e.target.checked;refreshCharts();renderVowelCards();});

  // Coordinate inputs
  const diph=v.type==='diphthong';
  const coordsRow=document.createElement('div'); coordsRow.className='ve-coords';
  coordsRow.innerHTML=`
    ${diph?`<div style="width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Start position</span>
      <button type="button" id="clickTargetBtn" style="font-size:.68rem;padding:2px 9px;border-radius:6px;border:1px solid var(--border);background:var(--input);color:var(--accent);cursor:pointer">
        Next click → <b id="clickTargetLabel">${state.clickTarget==='target'?'Target':'Start'}</b>
      </button>
    </div>`:''}
    <div class="field"><label>h (0=Close · 1=Open)</label><input type="number" id="veH" min="0" max="1" step="0.001" value="${v.h??0.5}"></div>
    <div class="field"><label>b (0=Front · 1=Back)</label><input type="number" id="veB" min="0" max="1" step="0.001" value="${v.b??0.5}"></div>
    <div class="field"><label>F1 (Hz)</label><input type="number" id="veF1" min="${F1MIN}" max="${F1MAX}" step="1" value="${v.f1||''}"></div>
    <div class="field"><label>F2 (Hz)</label><input type="number" id="veF2" min="${F2MIN}" max="${F2MAX}" step="1" value="${v.f2||''}"></div>
    ${diph?`<div style="width:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
      <span style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Target position (end of diphthong)</span>
    </div>
    <div class="field"><label>h Target</label><input type="number" id="veH2" min="0" max="1" step="0.001" value="${v.h2??v.h??0.5}"></div>
    <div class="field"><label>b Target</label><input type="number" id="veB2" min="0" max="1" step="0.001" value="${v.b2??v.b??0.5}"></div>`:''}
  `;
  sec.appendChild(coordsRow);
  coordsRow.querySelector('#veH').addEventListener('input',e=>{v.h=+e.target.value;refreshCharts();});
  coordsRow.querySelector('#veB').addEventListener('input',e=>{v.b=+e.target.value;refreshCharts();});
  coordsRow.querySelector('#veF1').addEventListener('input',e=>{v.f1=+e.target.value||null;refreshCharts();});
  coordsRow.querySelector('#veF2').addEventListener('input',e=>{v.f2=+e.target.value||null;refreshCharts();});
  if(diph){
    coordsRow.querySelector('#veH2').addEventListener('input',e=>{v.h2=+e.target.value;refreshCharts();});
    coordsRow.querySelector('#veB2').addEventListener('input',e=>{v.b2=+e.target.value;refreshCharts();});
    coordsRow.querySelector('#clickTargetBtn').addEventListener('click',()=>{
      state.clickTarget=state.clickTarget==='target'?'start':'target';
      document.getElementById('clickTargetLabel').textContent=state.clickTarget==='target'?'Target':'Start';
      refreshCharts();
    });
  }

  // Audio + wiki
  const urlRow=document.createElement('div'); urlRow.className='ve-meta';
  urlRow.innerHTML=`<div class="field"><label>IPA Audio URL</label><input type="url" id="fIpaAudio" value="${v.ipaAudio||''}" placeholder="https://..."></div><div class="field"><label>Wikipedia URL</label><input type="url" id="fWiki" value="${v.wikiUrl||''}" placeholder="https://en.wikipedia.org/..."></div>`;
  sec.appendChild(urlRow);
  urlRow.querySelector('#fIpaAudio').addEventListener('input',e=>v.ipaAudio=e.target.value);
  urlRow.querySelector('#fWiki').addEventListener('input',e=>v.wikiUrl=e.target.value);

  // Words
  const wordsSec=document.createElement('div');
  wordsSec.innerHTML=`<div class="divider-label" style="margin-bottom:6px">Example Words</div>`;
  const wordsList=document.createElement('div'); wordsList.className='words-list'; wordsList.id='wordsList';
  wordsSec.appendChild(wordsList);
  const addWordBtn=document.createElement('button'); addWordBtn.className='add-word-btn'; addWordBtn.type='button'; addWordBtn.textContent='+ Add word';
  addWordBtn.addEventListener('click',()=>{v.words=[...(v.words||[]),{text:'',audio:null}];renderWordRows(wordsList,v);});
  wordsSec.appendChild(addWordBtn);
  sec.appendChild(wordsSec);
  renderWordRows(wordsList,v);
}

function applyVowel(){
  if(!state.vowelDraft)return;
  if(!state.vowelDraft.ipa?.trim()){toast('IPA symbol is required');return;}
  if(!state.langDraft.vowels)state.langDraft.vowels=[];
  if(state.vowelIdx<0)state.langDraft.vowels.push(state.vowelDraft);
  else state.langDraft.vowels[state.vowelIdx]=state.vowelDraft;
  markUnsaved();
  const applied=state.vowelDraft.ipa;
  closeVowelEditor();
  updateSectionTitle();
  toast(`Vowel "${applied}" applied`);
}

function renderWordRows(container,v){
  container.innerHTML='';
  (v.words||[]).forEach((w,i)=>{
    const row=document.createElement('div'); row.className='word-row';
    row.innerHTML=`<input type="text" class="word-text" placeholder="f&lt;b&gt;ee&lt;/b&gt;t" value="${(w.text||'').replace(/"/g,'&quot;')}"><input type="url" class="word-audio" placeholder="Audio URL" value="${w.audio||''}"><button class="word-del" title="Remove">✕</button>`;
    row.querySelector('.word-text').addEventListener('input',e=>w.text=e.target.value);
    row.querySelector('.word-audio').addEventListener('input',e=>w.audio=e.target.value||null);
    row.querySelector('.word-del').addEventListener('click',()=>{v.words.splice(i,1);renderWordRows(container,v);});
    container.appendChild(row);
  });
}

// ─── IPA picker grid ──────────────────────────────────────────────────────────
function buildIpaPicker(grid,modsRow,inputEl,v,color){
  const hdr=document.createElement('div'); hdr.className='ipa-row';
  hdr.innerHTML=`<span class="ipa-row-lbl"></span><span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Front</span><span class="ipa-sep"></span><span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Central</span><span class="ipa-sep"></span><span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Back</span>`;
  grid.appendChild(hdr);
  IPA_ROWS.forEach(row=>{
    const rowEl=document.createElement('div'); rowEl.className='ipa-row';
    const lbl=document.createElement('span'); lbl.className='ipa-row-lbl'; lbl.textContent=row.label;
    rowEl.appendChild(lbl);
    row.pairs.forEach((pair,pi)=>{
      if(pi>0){const sep=document.createElement('span');sep.className='ipa-sep';rowEl.appendChild(sep);}
      const cell=document.createElement('span');
      cell.style.cssText='display:flex;flex:1;justify-content:space-around';
      pair.forEach(ch=>{
        if(!ch){const sp=document.createElement('span');sp.className='ipa-ch';sp.style.cursor='default';cell.appendChild(sp);return;}
        const btn=document.createElement('span'); btn.className='ipa-ch'; btn.textContent=ch; btn.title=ch;
        btn.addEventListener('click',()=>{
          inputEl.value+=ch; v.ipa=inputEl.value;
          document.getElementById('ipaPreview').textContent=v.ipa||'?';
          document.getElementById('veTitle').textContent=(state.vowelIdx<0?'New Vowel':'Edit: ')+v.ipa;
          refreshCharts(); renderVowelCards();
        });
        cell.appendChild(btn);
      });
      rowEl.appendChild(cell);
    });
    grid.appendChild(rowEl);
  });
  IPA_MODS.forEach(mod=>{
    const btn=document.createElement('button'); btn.type='button'; btn.className='ipa-mod';
    btn.innerHTML=`${mod.ch}<small>${mod.lbl}</small>`;
    btn.addEventListener('click',()=>{
      const pos=inputEl.selectionStart??inputEl.value.length;
      inputEl.value=inputEl.value.slice(0,pos)+mod.ch+inputEl.value.slice(pos);
      v.ipa=inputEl.value;
      document.getElementById('ipaPreview').textContent=v.ipa||'?';
      refreshCharts(); renderVowelCards();
    });
    modsRow.appendChild(btn);
  });
}

// ─── Save language ────────────────────────────────────────────────────────────
async function saveLang(){
  if(!state.langDraft)return;
  const data=clone(state.langDraft);
  const key=data.key;
  if(!key){toast('Language key is required');return;}
  const json=JSON.stringify(data,null,2);

  if(state.dirHandle){
    try{
      const subDir=await state.dirHandle.getDirectoryHandle(key,{create:true});
      const fh=await subDir.getFileHandle('lang.json',{create:true});
      const w=await fh.createWritable(); await w.write(json); await w.close();
      // Update index.json
      const allKeys=Object.keys(state.langs);
      if(!allKeys.includes(key))allKeys.push(key);
      const origKey=state.selKey;
      if(origKey&&origKey!==key){const p=allKeys.indexOf(origKey);if(p>=0)allKeys.splice(p,1);}
      const idxFh=await state.dirHandle.getFileHandle('index.json',{create:true});
      const iw=await idxFh.createWritable(); await iw.write(JSON.stringify({languages:allKeys},null,2)); await iw.close();
      if(origKey&&origKey!==key)delete state.langs[origKey];
      state.langs[key]=data; state.selKey=key; state.unsaved=false;
      const n=document.getElementById('unsavedNote'); if(n)n.style.display='none';
      renderLangList(); toast('✓ Saved to lang/'+key+'/lang.json');
      return;
    }catch(e){console.error('FS write failed:',e); toast('Write failed — downloading instead');}
  }
  // Fallback: download
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='lang.json'; a.click();
  toast(`Downloaded — put in lang/${key}/`);
  state.langs[key]=data; state.selKey=key; state.unsaved=false;
  const n=document.getElementById('unsavedNote'); if(n)n.style.display='none';
  renderLangList();
}

// ─── Folder connect ───────────────────────────────────────────────────────────
document.getElementById('folderBtn').addEventListener('click',async()=>{
  if(!window.showDirectoryPicker){toast('File System API not supported — use Chrome/Edge');return;}
  try{
    const h=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
    applyHandle(h);
    await idbPut('dirHandle',h);
    toast('Folder connected — saves go directly to files');
  }catch(e){if(e.name!=='AbortError')toast('Could not connect: '+e.message);}
});

// ─── New language ─────────────────────────────────────────────────────────────
document.getElementById('newLangBtn').addEventListener('click',()=>{
  if(state.unsaved&&!confirm('Discard unsaved changes?'))return;
  const key='lang-'+Date.now().toString(36);
  const fresh={key,label:'New Language',color:'#a78bfa',vowels:[]};
  state.langs[key]=fresh; state.selKey=key; state.langDraft=clone(fresh);
  state.unsaved=true; state.vowelIdx=null; state.vowelDraft=null;
  renderLangList(); renderMain();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init(){
  await tryRestoreHandle();
  await loadLanguages();
}
init();
</script>
