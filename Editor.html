<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IPA Language Editor</title>
<style>
  :root {
    --bg:#1a2636; --surface:#213040; --surface2:#253848;
    --border:#2e4560; --muted:#6a8298; --accent:#7eb8f7;
    --card:#1e2d40; --input:#192736;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,'Segoe UI',sans-serif;
    background:var(--bg); color:#d8e8f4;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  .top-bar {
    display:flex; align-items:center; gap:12px; padding:10px 16px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .back-btn {
    color:var(--muted); text-decoration:none; font-size:.8rem;
    transition:color .15s; white-space:nowrap;
  }
  .back-btn:hover { color:var(--accent); }
  .top-bar h1 { font-size:.95rem; color:var(--accent); letter-spacing:.04em; flex:1; }
  .folder-btn {
    display:flex; align-items:center; gap:6px; padding:5px 12px;
    border-radius:8px; font-size:.76rem; cursor:pointer;
    background:var(--card); border:1px solid var(--border);
    color:var(--muted); transition:border-color .15s, color .15s; white-space:nowrap;
  }
  .folder-btn:hover { border-color:var(--accent); color:var(--accent); }
  .folder-btn.connected { border-color:#34d399; color:#34d399; }

  /* ── Layout ──────────────────────────────────────────────── */
  .editor-layout { display:flex; flex:1; overflow:hidden; }

  /* ── Language sidebar ────────────────────────────────────── */
  .lang-sidebar {
    width:195px; flex-shrink:0; background:var(--card);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .lang-sidebar-head { padding:10px 10px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .new-lang-btn {
    width:100%; padding:6px 8px; border-radius:7px;
    background:var(--surface); border:1px dashed var(--border);
    color:var(--muted); font-size:.75rem; cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .new-lang-btn:hover { border-color:var(--accent); color:var(--accent); }
  .lang-list { overflow-y:auto; flex:1; padding:6px; }
  .lang-item {
    display:flex; align-items:center; gap:8px; padding:8px 9px;
    border-radius:8px; cursor:pointer; font-size:.81rem;
    transition:background .12s; user-select:none; margin-bottom:2px;
  }
  .lang-item:hover { background:var(--surface); }
  .lang-item.active { background:var(--surface2); }
  .lang-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .lang-item-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lang-item-key { font-size:.62rem; color:var(--muted); flex-shrink:0; }

  /* ── Main panel ──────────────────────────────────────────── */
  .main-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  .placeholder {
    flex:1; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:.85rem;
  }

  /* ── Forms ───────────────────────────────────────────────── */
  .lang-form { padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  input[type=text], input[type=url], input[type=number] {
    background:var(--input); border:1px solid var(--border); border-radius:6px;
    color:#d8e8f4; padding:6px 10px; font-size:.82rem; outline:none;
    transition:border-color .15s;
  }
  input:focus { border-color:var(--accent); }
  input[type=color] {
    width:44px; height:32px; border-radius:6px;
    border:1px solid var(--border); background:var(--input);
    cursor:pointer; padding:2px;
  }
  input[type=checkbox] { width:14px; height:14px; accent-color:var(--accent); cursor:pointer; }
  .lang-form-actions { margin-top:12px; display:flex; gap:8px; align-items:center; }
  .unsaved-note { font-size:.68rem; color:#fbbf24; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn {
    padding:6px 14px; border-radius:7px; font-size:.78rem;
    cursor:pointer; border:1px solid; font-weight:600;
    transition:background .15s, color .15s, opacity .15s;
  }
  .btn:disabled { opacity:.4; cursor:default; }
  .btn-primary { background:var(--accent); color:#0d1824; border-color:var(--accent); }
  .btn-primary:not(:disabled):hover { background:#9dcbfa; }
  .btn-secondary { background:transparent; color:var(--muted); border-color:var(--border); }
  .btn-secondary:hover { color:var(--accent); border-color:var(--accent); }
  .btn-danger { background:transparent; color:#f87171; border-color:#f8717150; }
  .btn-danger:hover { background:#f8717115; }
  .btn-sm { padding:4px 10px; font-size:.72rem; }

  /* ── Vowel section split layout ─────────────────────────── */
  .vowel-section { padding:12px 18px; flex:1; display:flex; flex-direction:column; min-height:0; }
  .vowel-split { display:flex; gap:14px; flex:1; min-height:0; }

  .lang-chart-col {
    flex:1; display:flex; flex-direction:column; min-width:0;
  }
  .lang-chart-wrap {
    background:#192535; border:1px solid var(--border);
    border-radius:10px; overflow:hidden; flex:1;
  }
  .lang-chart-svg { display:block; width:100%; aspect-ratio:5/3; cursor:default; overflow:visible; }

  .vowel-list-col {
    width:220px; flex-shrink:0; display:flex; flex-direction:column; gap:6px;
    overflow-y:auto;
  }
  .vowel-cards { display:flex; flex-direction:column; gap:6px; }
  .vowel-card {
    background:var(--card); border:1.5px solid var(--border);
    border-radius:8px; padding:6px 10px;
    display:flex; flex-direction:column; gap:2px;
    transition:border-color .12s; cursor:pointer;
  }
  .vowel-card:hover { border-color:#4a7098; }
  .vowel-card.active { border-color:var(--accent); }
  .vc-ipa { font-family:Georgia,serif; font-size:1.2rem; line-height:1; }
  .vc-desc { font-size:.57rem; color:var(--muted); line-height:1.3; }
  .vc-actions { display:flex; gap:4px; margin-top:4px; }
  .vc-btn {
    font-size:.62rem; padding:2px 7px; border-radius:4px;
    border:1px solid var(--border); background:none;
    color:var(--muted); cursor:pointer; transition:color .12s, border-color .12s;
  }
  .vc-btn:hover { color:#d8e8f4; border-color:#4a7098; }
  .vc-btn.del:hover { color:#f87171; border-color:#f87171; }

  /* ── Vowel editor slide-in panel ─────────────────────────── */
  .vowel-editor {
    position:fixed; top:0; right:-100%; width:820px; max-width:100%;
    height:100vh; background:var(--surface);
    border-left:1px solid var(--border);
    display:flex; flex-direction:column;
    transition:right .22s ease; z-index:100;
  }
  .vowel-editor.open { right:0; }
  .ve-header {
    display:flex; align-items:center; gap:8px; padding:11px 16px;
    border-bottom:1px solid var(--border); flex-shrink:0; background:var(--card);
  }
  .ve-title { font-size:.88rem; font-weight:700; color:var(--accent); flex:1; }
  .ve-body { overflow-y:auto; flex:1; padding:14px 16px; display:flex; flex-direction:column; gap:14px; }

  /* ── IPA picker ──────────────────────────────────────────── */
  .ipa-section { display:flex; gap:12px; align-items:flex-start; }
  .ipa-left { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .ipa-preview {
    font-family:Georgia,serif; font-size:3rem; line-height:1;
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 14px; text-align:center; min-width:80px;
    color:var(--accent);
  }
  .ipa-field-wrap { display:flex; flex-direction:column; gap:3px; }
  .ipa-field-wrap label { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); }
  .ipa-text {
    font-family:Georgia,serif; font-size:1.2rem;
    background:var(--input); border:1px solid var(--border);
    border-radius:6px; color:#d8e8f4; padding:5px 10px;
    width:80px; outline:none; text-align:center;
    transition:border-color .15s;
  }
  .ipa-text:focus { border-color:var(--accent); }

  .ipa-picker-box {
    flex:1; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 10px;
  }
  .ipa-picker-title { font-size:.59rem; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:6px; }
  .ipa-grid { display:flex; flex-direction:column; gap:2px; }
  .ipa-row { display:flex; align-items:center; gap:2px; }
  .ipa-row-lbl { font-size:.52rem; color:#3a5878; width:48px; flex-shrink:0; line-height:1; }
  .ipa-ch {
    font-family:Georgia,serif; font-size:.95rem;
    width:26px; height:26px; display:flex; align-items:center; justify-content:center;
    border-radius:5px; cursor:pointer; border:1px solid transparent;
    transition:background .1s, border-color .1s; color:#8ab8d0; flex-shrink:0;
  }
  .ipa-ch:hover { background:var(--surface2); border-color:var(--border); color:#d8e8f4; }
  .ipa-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; }
  .ipa-mods-row { display:flex; gap:3px; flex-wrap:wrap; margin-top:5px; border-top:1px solid var(--border); padding-top:5px; }
  .ipa-mod {
    font-family:Georgia,serif; font-size:.78rem; padding:2px 6px;
    border:1px solid var(--border); border-radius:4px; cursor:pointer;
    color:var(--muted); background:none; transition:color .1s, border-color .1s;
    display:flex; flex-direction:column; align-items:center; gap:1px;
  }
  .ipa-mod:hover { color:var(--accent); border-color:var(--accent); }
  .ipa-mod small { font-family:system-ui; font-size:.45rem; color:var(--muted); }

  /* ── Pickers (trapezoid + formant) ───────────────────────── */
  .pickers-row { display:flex; gap:12px; }
  .picker-block {
    flex:1; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:10px;
  }
  .picker-block-title { font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  .picker-svg-wrap { border-radius:6px; overflow:hidden; background:#192535; }
  .picker-svg { display:block; width:100%; cursor:crosshair; }
  .picker-inputs { display:flex; gap:8px; margin-top:8px; }
  .p-field { display:flex; flex-direction:column; gap:3px; flex:1; }
  .p-field label { font-size:.58rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
  .p-field input { padding:4px 8px; font-size:.8rem; }

  /* ── Meta fields ─────────────────────────────────────────── */
  .meta-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
  .meta-row .field { flex:1; min-width:160px; }
  .field input[type=url] { width:100%; }
  .field input[type=text].wide { width:100%; }
  .rounded-row { display:flex; align-items:center; gap:8px; font-size:.82rem; padding-top:2px; }

  /* ── Words list ──────────────────────────────────────────── */
  .words-list { display:flex; flex-direction:column; gap:5px; }
  .word-row { display:flex; gap:6px; align-items:center; }
  .word-row .word-text { width:180px; flex-shrink:0; font-family:Georgia,serif; }
  .word-row .word-audio { flex:1; font-size:.75rem; }
  .word-del {
    width:26px; height:26px; flex-shrink:0; border-radius:5px;
    border:1px solid var(--border); background:none; color:var(--muted);
    cursor:pointer; font-size:.9rem; display:flex; align-items:center; justify-content:center;
    transition:color .12s, border-color .12s;
  }
  .word-del:hover { color:#f87171; border-color:#f87171; }
  .add-word-btn {
    display:flex; align-items:center; gap:5px; align-self:flex-start;
    background:none; border:1px dashed var(--border); color:var(--muted);
    border-radius:6px; padding:4px 10px; font-size:.73rem; cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .add-word-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ── Toast ───────────────────────────────────────────────── */
  .toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:#1a3050; border:1px solid #2a5080; color:#d8e8f4;
    padding:8px 18px; border-radius:20px; font-size:.78rem;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:9999;
    white-space:nowrap;
  }
  .toast.show { opacity:1; }

  .divider-label {
    font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
  }
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Chart</a>
  <h1>Language Editor</h1>
  <button class="folder-btn" id="folderBtn" type="button">📁 Connect lang/ folder</button>
</div>

<div class="editor-layout">
  <aside class="lang-sidebar">
    <div class="lang-sidebar-head">
      <button class="new-lang-btn" id="newLangBtn" type="button">+ New Language</button>
    </div>
    <div class="lang-list" id="langList"></div>
  </aside>
  <main class="main-panel" id="mainPanel">
    <div class="placeholder" id="placeholder">← Select a language to edit</div>
  </main>
</div>

<!-- Vowel editor slide-in panel -->
<div class="vowel-editor" id="vowelEditor">
  <div class="ve-header">
    <span class="ve-title" id="veTitle">Edit Vowel</span>
    <button class="btn btn-secondary btn-sm" id="veCancelBtn" type="button">Cancel</button>
    <button class="btn btn-primary btn-sm" id="veApplyBtn" type="button">Apply</button>
  </div>
  <div class="ve-body" id="veBody"></div>
</div>

<div class="toast" id="toast"></div>
<div id="chartTip" style="position:fixed;display:none;background:#0d1524;border:1px solid #2e4560;border-radius:7px;padding:5px 10px;font-size:.74rem;color:#c8d8e8;pointer-events:none;z-index:9998;max-width:280px;white-space:nowrap"></div>

<script>
// ─── IPA character data ───────────────────────────────────────────────────────
const IPA_ROWS = [
  { label:'Close',     pairs:[['i','y'],['ɨ','ʉ'],['ɯ','u']] },
  { label:'Near-cl',   pairs:[['ɪ','ʏ'],[null,null],['ʊ',null]] },
  { label:'Cl-mid',    pairs:[['e','ø'],['ɘ','ɵ'],['ɤ','o']] },
  { label:'Mid',       pairs:[[null,null],['ə',null],[null,null]] },
  { label:'Op-mid',    pairs:[['ɛ','œ'],['ɜ','ɞ'],['ʌ','ɔ']] },
  { label:'Near-op',   pairs:[['æ',null],['ɐ',null],[null,null]] },
  { label:'Open',      pairs:[['a','ɶ'],[null,null],['ɑ','ɒ']] },
];
const IPA_MODS = [
  {ch:'ː',  lbl:'long'}, {ch:'ˑ', lbl:'½-long'}, {ch:'̃',  lbl:'nasal'},
  {ch:'ʲ',  lbl:'palat'},{ch:'ʷ', lbl:'lab'},    {ch:'ˠ',  lbl:'velar'},
  {ch:'ˤ',  lbl:'phar'}, {ch:'ʰ', lbl:'asp'},    {ch:'̥',  lbl:'voiceless'},
];

// ─── Trapezoid geometry (editor SVG 500×300) ─────────────────────────────────
const ET = { TL:{x:68,y:28}, TR:{x:472,y:28}, BL:{x:188,y:272}, BR:{x:472,y:272} };
function eTrapPos(h,b) {
  const fX=ET.TL.x+h*(ET.BL.x-ET.TL.x);
  return {x:fX+b*(ET.TR.x-fX), y:ET.TL.y+h*(ET.BL.y-ET.TL.y)};
}
function eTrapHB(px,py) {
  const h=Math.max(0,Math.min(1,(py-ET.TL.y)/(ET.BL.y-ET.TL.y)));
  const fX=ET.TL.x+h*(ET.BL.x-ET.TL.x);
  const b=Math.max(0,Math.min(1,(px-fX)/(ET.TR.x-fX)));
  return {h:+h.toFixed(4), b:+b.toFixed(4)};
}

// ─── Formant plot geometry (editor SVG 500×300) ───────────────────────────────
const EF={x0:40,x1:488,y0:18,y1:278};
const F2MIN=400,F2MAX=2800,F1MIN=150,F1MAX=920;
function eFormPos(f1,f2) {
  return {
    x:EF.x1-(f2-F2MIN)/(F2MAX-F2MIN)*(EF.x1-EF.x0),
    y:EF.y0+(f1-F1MIN)/(F1MAX-F1MIN)*(EF.y1-EF.y0),
  };
}
function eFormF1F2(px,py) {
  return {
    f2:Math.round(Math.max(F2MIN,Math.min(F2MAX, F2MAX-(px-EF.x0)/(EF.x1-EF.x0)*(F2MAX-F2MIN)))),
    f1:Math.round(Math.max(F1MIN,Math.min(F1MAX, F1MIN+(py-EF.y0)/(EF.y1-EF.y0)*(F1MAX-F1MIN)))),
  };
}

const TRAP_ROWS=[
  {h:0,label:'Close'},{h:1/6,label:'Near-cl'},{h:2/6,label:'Cl-mid'},
  {h:3/6,label:'Mid'},{h:4/6,label:'Op-mid'},{h:5/6,label:'Near-op'},{h:1,label:'Open'},
];

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  langs:       {},    // key → lang object (deep clones from server)
  selKey:      null,  // currently selected language key
  langDraft:   null,  // working copy of selected language
  vowelIdx:    null,  // index being edited (-1 = new)
  vowelDraft:  null,  // working copy of vowel being edited
  dirHandle:   null,  // FileSystemDirectoryHandle for lang/ folder
  unsaved:     false,
};

// ─── Utilities ────────────────────────────────────────────────────────────────
function clone(o) { return JSON.parse(JSON.stringify(o)); }

function toast(msg, dur=2200) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

function svgPt(svgEl, clientX, clientY) {
  const r=svgEl.getBoundingClientRect(), vb=svgEl.viewBox.baseVal;
  return {x:(clientX-r.left)/r.width*vb.width, y:(clientY-r.top)/r.height*vb.height};
}

const NS='http://www.w3.org/2000/svg';
function $s(tag,a={}) {
  const el=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(a))el.setAttribute(k,String(v));
  return el;
}
function $t(str,a={}) { const el=$s('text',a); el.textContent=str; return el; }

// ─── Load languages ───────────────────────────────────────────────────────────
async function loadLanguages() {
  state.langs={};
  try {
    const idx=await fetch(`lang/index.json?t=${Date.now()}`).then(r=>r.json());
    const names=(idx.languages||[]).filter(n=>!n.startsWith('_'));
    await Promise.all(names.map(name=>
      fetch(`lang/${name}/lang.json?t=${Date.now()}`)
        .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(d=>{if(d&&d.key)state.langs[d.key]=d;})
        .catch(e=>console.warn(`Skip ${name}:`,e.message))
    ));
  } catch(e) { console.error('Failed to load index',e); }
  renderLangList();
}

// ─── Language list ────────────────────────────────────────────────────────────
function renderLangList() {
  const el=document.getElementById('langList');
  el.innerHTML='';
  for(const[key,lang]of Object.entries(state.langs)){
    const item=document.createElement('div');
    item.className='lang-item'+(state.selKey===key?' active':'');
    item.innerHTML=`
      <span class="lang-dot" style="background:${lang.color}"></span>
      <span class="lang-item-name">${lang.label||key}</span>
      <span class="lang-item-key">${key}</span>`;
    item.addEventListener('click',()=>selectLang(key));
    el.appendChild(item);
  }
}

function selectLang(key) {
  if(state.unsaved && !confirm('Discard unsaved changes?')) return;
  state.selKey=key;
  state.langDraft=clone(state.langs[key]);
  state.unsaved=false;
  closeVowelEditor();
  renderLangList();
  renderMain();
}

// ─── Language form ────────────────────────────────────────────────────────────
function renderMain() {
  const panel=document.getElementById('mainPanel');
  const ph=document.getElementById('placeholder');
  if(!state.langDraft){ ph.style.display='flex'; return; }
  ph.style.display='none';

  // Clear previous (keep placeholder)
  [...panel.children].forEach(c=>{ if(c!==ph) c.remove(); });

  // Language form
  const form=document.createElement('div');
  form.className='lang-form';
  form.innerHTML=`
    <div class="form-row">
      <div class="field">
        <label>Key (folder name)</label>
        <input type="text" id="fKey" value="${state.langDraft.key||''}" placeholder="en" style="width:80px">
      </div>
      <div class="field">
        <label>Display label</label>
        <input type="text" id="fLabel" value="${state.langDraft.label||''}" placeholder="English" style="width:140px">
      </div>
      <div class="field">
        <label>Color</label>
        <input type="color" id="fColor" value="${state.langDraft.color||'#7eb8f7'}">
      </div>
    </div>
    <div class="lang-form-actions">
      <button class="btn btn-primary" id="saveLangBtn" type="button">💾 Save Language</button>
      <span class="unsaved-note" id="unsavedNote" style="display:none">● unsaved changes</span>
    </div>`;
  panel.appendChild(form);

  ['fKey','fLabel','fColor'].forEach(id=>{
    document.getElementById(id).addEventListener('input', e=>{
      const map={fKey:'key',fLabel:'label',fColor:'color'};
      state.langDraft[map[id]]=e.target.value;
      markUnsaved();
    });
  });
  document.getElementById('saveLangBtn').addEventListener('click', saveLang);

  // Vowel section — split: chart left, card list right
  const vs=document.createElement('div');
  vs.className='vowel-section';
  vs.innerHTML=`
    <div class="section-head">
      <span class="section-title">Vowels (${(state.langDraft.vowels||[]).length})</span>
      <button class="btn btn-secondary btn-sm" id="addVowelBtn" type="button">+ Add Vowel</button>
    </div>
    <div class="vowel-split">
      <div class="lang-chart-col">
        <div class="lang-chart-wrap">
          <svg class="lang-chart-svg" id="langChartSvg" viewBox="0 0 700 420"></svg>
        </div>
        <p style="font-size:.62rem;color:var(--muted);margin-top:5px;text-align:center">
          Click a vowel on the chart to edit it · Highlighted = currently editing
        </p>
      </div>
      <div class="vowel-list-col">
        <div class="vowel-cards" id="vowelCards"></div>
      </div>
    </div>`;
  panel.appendChild(vs);
  document.getElementById('addVowelBtn').addEventListener('click', ()=>openVowelEditor(-1));
  renderVowelCards();
  renderLangChart();
}

function markUnsaved() {
  state.unsaved=true;
  const n=document.getElementById('unsavedNote');
  if(n) n.style.display='inline';
}

function renderVowelCards() {
  const grid=document.getElementById('vowelCards');
  if(!grid) return;
  grid.innerHTML='';
  (state.langDraft.vowels||[]).forEach((v,i)=>{
    const card=document.createElement('div');
    card.className='vowel-card'+(state.vowelIdx===i?' active':'');
    card.style.borderColor=state.vowelIdx===i?(state.langDraft.color||'#7eb8f7'):'';
    card.innerHTML=`
      <div class="vc-ipa" style="color:${state.langDraft.color||'#7eb8f7'}">${v.ipa||'?'}</div>
      <div class="vc-desc">${(v.desc||'').substring(0,42)}</div>
      <div class="vc-actions">
        <button class="vc-btn" data-i="${i}" data-action="edit">Edit</button>
        <button class="vc-btn del" data-i="${i}" data-action="del">✕</button>
      </div>`;
    card.addEventListener('click',()=>openVowelEditor(i));
    card.querySelectorAll('.vc-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const idx=+btn.dataset.i;
        if(btn.dataset.action==='edit') openVowelEditor(idx);
        else if(btn.dataset.action==='del' && confirm(`Delete vowel "${v.ipa}"?`)){
          state.langDraft.vowels.splice(idx,1);
          if(state.vowelIdx===idx) closeVowelEditor();
          else if(state.vowelIdx>idx) state.vowelIdx--;
          markUnsaved();
          renderVowelCards();
          renderLangChart();
          updateSectionTitle();
        }
      });
    });
    grid.appendChild(card);
  });
  renderLangChart();
}

function updateSectionTitle() {
  const st=document.querySelector('.section-title');
  if(st) st.textContent=`Vowels (${(state.langDraft.vowels||[]).length})`;
}

// ─── Language overview chart ──────────────────────────────────────────────────
// Trapezoid for the language overview panel (viewBox 700×420)
const LT={TL:{x:90,y:42},TR:{x:648,y:42},BL:{x:234,y:378},BR:{x:648,y:378}};
function ltPos(h,b){
  const fX=LT.TL.x+h*(LT.BL.x-LT.TL.x);
  return{x:fX+b*(LT.TR.x-fX),y:LT.TL.y+h*(LT.BL.y-LT.TL.y)};
}

function renderLangChart() {
  const svg=document.getElementById('langChartSvg');
  if(!svg) return;
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const vowels=state.langDraft?.vowels||[];
  const c=state.langDraft?.color||'#7eb8f7';
  const T=LT;

  // Grid lines
  TRAP_ROWS.forEach(row=>{
    const L=ltPos(row.h,0),R=ltPos(row.h,1);
    svg.appendChild($s('line',{x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#1e3048','stroke-width':1}));
  });
  // Central dashed guide
  const cT=ltPos(0,.5),cB=ltPos(1,.5);
  svg.appendChild($s('line',{x1:cT.x,y1:cT.y,x2:cB.x,y2:cB.y,stroke:'#1e3048','stroke-width':1,'stroke-dasharray':'5 4'}));
  // Outline
  svg.appendChild($s('path',{
    d:`M${T.TL.x},${T.TL.y} L${T.TR.x},${T.TR.y} L${T.BR.x},${T.BR.y} L${T.BL.x},${T.BL.y}Z`,
    fill:'none',stroke:'#2e4a64','stroke-width':2,
  }));
  // Row labels
  TRAP_ROWS.forEach(row=>{
    const p=ltPos(row.h,0);
    svg.appendChild($t(row.label,{x:p.x-12,y:p.y,dy:'0.36em','text-anchor':'end','font-size':9,fill:'#4a6888','font-family':'system-ui'}));
  });
  // Column labels
  [['Front',0],['Central',.5],['Back',1]].forEach(([l,b])=>{
    const p=ltPos(0,b);
    svg.appendChild($t(l,{x:p.x,y:p.y-16,'text-anchor':'middle','font-size':9,fill:'#4a6888','font-family':'system-ui'}));
  });

  // Group vowels by snapped position (to detect pairs at same dot)
  const posGroups=new Map();
  vowels.forEach((v,i)=>{
    const h=+v.h||0, b=+v.b||0;
    const pk=`${Math.round(h*100)},${Math.round(b*100)}`;
    if(!posGroups.has(pk))posGroups.set(pk,[]);
    posGroups.get(pk).push({v,i});
  });

  // Layer 1: dots
  posGroups.forEach(group=>{
    const {v}=group[0], h=+v.h||0, b=+v.b||0;
    const {x,y}=ltPos(h,b);
    const isActive=group.some(g=>g.i===state.vowelIdx);
    const dotR=isActive?6:4;
    svg.appendChild($s('circle',{cx:x,cy:y,r:dotR+6,fill:'transparent',style:'cursor:pointer'}));
    if(group.length>1){
      svg.appendChild($s('circle',{cx:x,cy:y,r:dotR+3,fill:'none',stroke:c+'60','stroke-width':1.5,'stroke-dasharray':'3 2'}));
    }
    svg.appendChild($s('circle',{cx:x,cy:y,r:dotR,fill:isActive?c:c+'99'}));
  });

  // Layer 2: labels + hit areas
  const labelLayer=$s('g');
  svg.appendChild(labelLayer);

  vowels.forEach((v,i)=>{
    const h=+v.h||0, b=+v.b||0;
    const {x,y}=ltPos(h,b);
    const isActive=i===state.vowelIdx;
    const FS=isActive?17:14;
    const GAP=6, dotR=isActive?6:4;
    const lx=v.rounded?x+dotR+GAP:x-dotR-GAP;
    const anchor=v.rounded?'start':'end';

    const g=$s('g',{style:'cursor:pointer'});
    // Hit area
    const tw=(v.ipa||'').length*FS*0.6;
    const hx=(v.rounded?lx:lx-tw)-4;
    g.appendChild($s('rect',{x:hx,y:y-FS*0.5-4,width:tw+8,height:FS+8,rx:4,fill:'transparent'}));
    // Label
    const lbl=$t(v.ipa||'?',{
      x:lx,y,dy:'0.36em','text-anchor':anchor,'font-size':FS,
      fill:isActive?'#ffffff':c,
      opacity:isActive?1:0.82,
      'font-family':"Georgia,'Noto Serif',serif",
      'font-weight':isActive?'bold':'normal',
      style:`filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));user-select:none`,
    });
    if(isActive) lbl.style.filter='drop-shadow(0 0 4px '+c+') drop-shadow(0 1px 2px rgba(0,0,0,.5))';
    g.appendChild(lbl);

    g.addEventListener('click',()=>openVowelEditor(i));
    g.addEventListener('mouseenter',e=>{
      const tip=document.getElementById('chartTip');
      tip.textContent=`${v.ipa} — ${v.desc||''}`;
      tip.style.display='block';
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-28)+'px';
    });
    g.addEventListener('mousemove',e=>{
      const tip=document.getElementById('chartTip');
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-28)+'px';
    });
    g.addEventListener('mouseleave',()=>{ document.getElementById('chartTip').style.display='none'; });
    labelLayer.appendChild(g);
  });
}

// ─── Vowel editor panel ───────────────────────────────────────────────────────
function openVowelEditor(idx) {
  state.vowelIdx=idx;
  const existing=(idx>=0 && state.langDraft.vowels)?state.langDraft.vowels[idx]:null;
  state.vowelDraft=existing?clone(existing):{
    ipa:'', h:0.5, b:0.5, rounded:false, desc:'',
    f1:500, f2:1500, ipaAudio:'', wikiUrl:'', words:[]
  };
  document.getElementById('veTitle').textContent=idx<0?'New Vowel':`Edit: ${state.vowelDraft.ipa}`;
  renderVowelCards();   // highlights active card and refreshes chart
  buildVowelEditorBody();
  document.getElementById('vowelEditor').classList.add('open');
}

function closeVowelEditor() {
  state.vowelIdx=null;
  state.vowelDraft=null;
  document.getElementById('vowelEditor').classList.remove('open');
  renderVowelCards();   // also calls renderLangChart
}

function buildVowelEditorBody() {
  const body=document.getElementById('veBody');
  body.innerHTML='';
  const v=state.vowelDraft;
  const c=state.langDraft?.color||'#7eb8f7';

  // ── IPA symbol ──
  const ipaSection=document.createElement('div');
  ipaSection.className='ipa-section';

  const ipaLeft=document.createElement('div');
  ipaLeft.className='ipa-left';
  ipaLeft.innerHTML=`
    <div class="ipa-preview" id="ipaPreview" style="color:${c}">${v.ipa||'?'}</div>
    <div class="ipa-field-wrap">
      <label>IPA Symbol</label>
      <input class="ipa-text" type="text" id="ipaInput" value="${v.ipa||''}">
    </div>`;

  const ipaBox=document.createElement('div');
  ipaBox.className='ipa-picker-box';
  ipaBox.innerHTML=`<div class="ipa-picker-title">Click to insert · Click symbol field first to append</div>
    <div class="ipa-grid" id="ipaGrid"></div>
    <div class="ipa-mods-row" id="ipaMods"></div>`;

  ipaSection.appendChild(ipaLeft);
  ipaSection.appendChild(ipaBox);
  body.appendChild(ipaSection);

  // Input handler
  const ipaInput=ipaLeft.querySelector('#ipaInput');
  ipaInput.addEventListener('input',()=>{
    v.ipa=ipaInput.value;
    document.getElementById('ipaPreview').textContent=v.ipa||'?';
    document.getElementById('veTitle').textContent=`Edit: ${v.ipa||'?'}`;
    refreshTrapDot();
  });

  // IPA grid
  buildIpaPicker(ipaBox.querySelector('#ipaGrid'), ipaBox.querySelector('#ipaMods'), ipaInput, v, c);

  // ── Rounded + Description ──
  const metaRow=document.createElement('div');
  metaRow.className='meta-row';
  metaRow.innerHTML=`
    <div class="field">
      <label>Description</label>
      <input type="text" class="wide" id="fDesc" value="${v.desc||''}" placeholder="Close front unrounded">
    </div>
    <div class="field" style="flex:0">
      <label>Rounded</label>
      <div class="rounded-row" style="padding-top:6px">
        <input type="checkbox" id="fRounded" ${v.rounded?'checked':''}>
        <span style="font-size:.8rem">Lip rounded</span>
      </div>
    </div>`;
  body.appendChild(metaRow);
  metaRow.querySelector('#fDesc').addEventListener('input',e=>v.desc=e.target.value);
  metaRow.querySelector('#fRounded').addEventListener('change',e=>v.rounded=e.target.checked);

  // ── Trapezoid + Formant pickers ──
  const pickersRow=document.createElement('div');
  pickersRow.className='pickers-row';

  // Trapezoid
  const trapBlock=document.createElement('div');
  trapBlock.className='picker-block';
  trapBlock.innerHTML=`
    <div class="picker-block-title">Position on IPA Chart · Click to place</div>
    <div class="picker-svg-wrap">
      <svg class="picker-svg" id="trapSvg" viewBox="0 0 500 300"></svg>
    </div>
    <div class="picker-inputs">
      <div class="p-field"><label>h (0=Close · 1=Open)</label><input type="number" id="fH" min="0" max="1" step="0.001" value="${v.h??0.5}"></div>
      <div class="p-field"><label>b (0=Front · 1=Back)</label><input type="number" id="fB" min="0" max="1" step="0.001" value="${v.b??0.5}"></div>
    </div>`;

  // Formant
  const formBlock=document.createElement('div');
  formBlock.className='picker-block';
  formBlock.innerHTML=`
    <div class="picker-block-title">Formant Plot · Click to place</div>
    <div class="picker-svg-wrap">
      <svg class="picker-svg" id="formSvg" viewBox="0 0 500 300"></svg>
    </div>
    <div class="picker-inputs">
      <div class="p-field"><label>F1 (Hz) — height</label><input type="number" id="fF1" min="${F1MIN}" max="${F1MAX}" step="1" value="${v.f1||''}"></div>
      <div class="p-field"><label>F2 (Hz) — frontness</label><input type="number" id="fF2" min="${F2MIN}" max="${F2MAX}" step="1" value="${v.f2||''}"></div>
    </div>`;

  pickersRow.appendChild(trapBlock);
  pickersRow.appendChild(formBlock);
  body.appendChild(pickersRow);

  // Wire trapezoid
  const trapSvg=trapBlock.querySelector('#trapSvg');
  const fH=trapBlock.querySelector('#fH');
  const fB=trapBlock.querySelector('#fB');
  drawTrapezoid(trapSvg, v);
  const onTrapClick=(clientX,clientY)=>{
    const pt=svgPt(trapSvg,clientX,clientY);
    const {h,b}=eTrapHB(pt.x,pt.y);
    v.h=h; v.b=b; fH.value=h; fB.value=b;
    drawTrapezoid(trapSvg,v);
  };
  trapSvg.addEventListener('click',e=>onTrapClick(e.clientX,e.clientY));
  let trapDrag=false;
  trapSvg.addEventListener('mousedown',()=>trapDrag=true);
  trapSvg.addEventListener('mouseup',()=>trapDrag=false);
  trapSvg.addEventListener('mousemove',e=>{ if(trapDrag)onTrapClick(e.clientX,e.clientY); });
  fH.addEventListener('input',()=>{ v.h=+fH.value; drawTrapezoid(trapSvg,v); });
  fB.addEventListener('input',()=>{ v.b=+fB.value; drawTrapezoid(trapSvg,v); });

  // Wire formant
  const formSvg=formBlock.querySelector('#formSvg');
  const fF1=formBlock.querySelector('#fF1');
  const fF2=formBlock.querySelector('#fF2');
  drawFormant(formSvg, v);
  const onFormClick=(clientX,clientY)=>{
    const pt=svgPt(formSvg,clientX,clientY);
    const {f1,f2}=eFormF1F2(pt.x,pt.y);
    v.f1=f1; v.f2=f2; fF1.value=f1; fF2.value=f2;
    drawFormant(formSvg,v);
  };
  formSvg.addEventListener('click',e=>onFormClick(e.clientX,e.clientY));
  let formDrag=false;
  formSvg.addEventListener('mousedown',()=>formDrag=true);
  formSvg.addEventListener('mouseup',()=>formDrag=false);
  formSvg.addEventListener('mousemove',e=>{ if(formDrag)onFormClick(e.clientX,e.clientY); });
  fF1.addEventListener('input',()=>{ v.f1=+fF1.value||null; drawFormant(formSvg,v); });
  fF2.addEventListener('input',()=>{ v.f2=+fF2.value||null; drawFormant(formSvg,v); });

  // Store refreshTrapDot reference
  window.refreshTrapDot=()=>drawTrapezoid(trapSvg,v);

  // ── Audio + Wiki ──
  const urlRow=document.createElement('div');
  urlRow.className='meta-row';
  urlRow.innerHTML=`
    <div class="field"><label>IPA Audio URL</label><input type="url" id="fIpaAudio" value="${v.ipaAudio||''}" placeholder="https://..."></div>
    <div class="field"><label>Wikipedia URL</label><input type="url" id="fWiki"     value="${v.wikiUrl||''}"  placeholder="https://en.wikipedia.org/..."></div>`;
  body.appendChild(urlRow);
  urlRow.querySelector('#fIpaAudio').addEventListener('input',e=>v.ipaAudio=e.target.value);
  urlRow.querySelector('#fWiki').addEventListener('input',e=>v.wikiUrl=e.target.value);

  // ── Words ──
  const wordsSection=document.createElement('div');
  wordsSection.innerHTML=`<div class="divider-label" style="margin-bottom:6px">Example Words</div>`;
  const wordsList=document.createElement('div');
  wordsList.className='words-list';
  wordsList.id='wordsList';
  wordsSection.appendChild(wordsList);
  const addWordBtn=document.createElement('button');
  addWordBtn.className='add-word-btn'; addWordBtn.type='button';
  addWordBtn.textContent='+ Add word';
  addWordBtn.addEventListener('click',()=>{
    v.words=[...(v.words||[]),{text:'',audio:null}];
    renderWordRows(wordsList,v);
  });
  wordsSection.appendChild(addWordBtn);
  body.appendChild(wordsSection);
  renderWordRows(wordsList, v);
}

function renderWordRows(container, v) {
  container.innerHTML='';
  (v.words||[]).forEach((w,i)=>{
    const row=document.createElement('div');
    row.className='word-row';
    row.innerHTML=`
      <input type="text" class="word-text" placeholder="f&lt;b&gt;ee&lt;/b&gt;t" value="${(w.text||'').replace(/"/g,'&quot;')}">
      <input type="url"  class="word-audio" placeholder="Audio URL (or blank)" value="${w.audio||''}">
      <button class="word-del" title="Remove">✕</button>`;
    row.querySelector('.word-text').addEventListener('input', e=>w.text=e.target.value);
    row.querySelector('.word-audio').addEventListener('input',e=>w.audio=e.target.value||null);
    row.querySelector('.word-del').addEventListener('click',()=>{
      v.words.splice(i,1);
      renderWordRows(container,v);
    });
    container.appendChild(row);
  });
}

// ─── IPA picker grid ──────────────────────────────────────────────────────────
function buildIpaPicker(grid, modsRow, inputEl, v, color) {
  // Column headers
  const hdr=document.createElement('div');
  hdr.className='ipa-row';
  hdr.innerHTML=`<span class="ipa-row-lbl"></span>
    <span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Front</span>
    <span class="ipa-sep"></span>
    <span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Central</span>
    <span class="ipa-sep"></span>
    <span style="font-size:.5rem;color:#3a5878;flex:1;text-align:center">Back</span>`;
  grid.appendChild(hdr);

  IPA_ROWS.forEach(row=>{
    const rowEl=document.createElement('div');
    rowEl.className='ipa-row';
    const lbl=document.createElement('span');
    lbl.className='ipa-row-lbl'; lbl.textContent=row.label;
    rowEl.appendChild(lbl);

    row.pairs.forEach((pair,pi)=>{
      if(pi>0){ const sep=document.createElement('span'); sep.className='ipa-sep'; rowEl.appendChild(sep); }
      const cell=document.createElement('span');
      cell.style.display='flex'; cell.style.flex='1'; cell.style.justifyContent='space-around';
      pair.forEach(ch=>{
        if(!ch){ const sp=document.createElement('span'); sp.className='ipa-ch'; sp.style.cursor='default'; cell.appendChild(sp); return; }
        const btn=document.createElement('span');
        btn.className='ipa-ch'; btn.textContent=ch; btn.title=ch;
        btn.addEventListener('click',()=>{
          inputEl.value+=ch; v.ipa=inputEl.value;
          document.getElementById('ipaPreview').textContent=v.ipa||'?';
          document.getElementById('veTitle').textContent=`Edit: ${v.ipa}`;
          refreshTrapDot?.();
        });
        cell.appendChild(btn);
      });
      rowEl.appendChild(cell);
    });
    grid.appendChild(rowEl);
  });

  // Modifiers
  IPA_MODS.forEach(mod=>{
    const btn=document.createElement('button');
    btn.type='button'; btn.className='ipa-mod';
    btn.innerHTML=`${mod.ch}<small>${mod.lbl}</small>`;
    btn.addEventListener('click',()=>{
      const pos=inputEl.selectionStart??inputEl.value.length;
      inputEl.value=inputEl.value.slice(0,pos)+mod.ch+inputEl.value.slice(pos);
      v.ipa=inputEl.value;
      document.getElementById('ipaPreview').textContent=v.ipa||'?';
      refreshTrapDot?.();
    });
    modsRow.appendChild(btn);
  });
}

// ─── Trapezoid SVG ────────────────────────────────────────────────────────────
function drawTrapezoid(svg, v) {
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const T=ET;
  // Grid lines
  TRAP_ROWS.forEach(row=>{
    const L=eTrapPos(row.h,0),R=eTrapPos(row.h,1);
    svg.appendChild($s('line',{x1:L.x,y1:L.y,x2:R.x,y2:R.y,stroke:'#1e3048','stroke-width':1}));
  });
  // Outline
  svg.appendChild($s('path',{
    d:`M${T.TL.x},${T.TL.y} L${T.TR.x},${T.TR.y} L${T.BR.x},${T.BR.y} L${T.BL.x},${T.BL.y}Z`,
    fill:'none',stroke:'#2e4a64','stroke-width':1.5,
  }));
  // Row labels
  TRAP_ROWS.forEach(row=>{
    const p=eTrapPos(row.h,0);
    svg.appendChild($t(row.label,{x:p.x-6,y:p.y,'text-anchor':'end',dy:'0.35em','font-size':7,fill:'#3a5878','font-family':'system-ui'}));
  });
  // Column labels
  [['Front',0],['Cen',.5],['Back',1]].forEach(([l,b])=>{
    const p=eTrapPos(0,b);
    svg.appendChild($t(l,{x:p.x,y:p.y-10,'text-anchor':'middle','font-size':7,fill:'#3a5878','font-family':'system-ui'}));
  });
  // Vowel dot
  const h=parseFloat(v.h??0.5), b=parseFloat(v.b??0.5);
  if(!isNaN(h)&&!isNaN(b)){
    const {x,y}=eTrapPos(h,b);
    svg.appendChild($s('circle',{cx:x,cy:y,r:6,fill:'none',stroke:'#7eb8f740','stroke-width':8}));
    svg.appendChild($s('circle',{cx:x,cy:y,r:4,fill:'#7eb8f7'}));
    if(v.ipa){
      svg.appendChild($t(v.ipa,{x:x+(v.rounded?8:-8),y,dy:'0.35em',
        'text-anchor':v.rounded?'start':'end','font-size':11,fill:'#7eb8f7',
        'font-family':'Georgia,serif','font-weight':'bold'}));
    }
  }
}

// ─── Formant SVG ─────────────────────────────────────────────────────────────
function drawFormant(svg, v) {
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  // Background
  svg.appendChild($s('rect',{x:EF.x0,y:EF.y0,width:EF.x1-EF.x0,height:EF.y1-EF.y0,fill:'#192535',rx:4}));
  // F2 grid
  [500,700,1000,1400,1800,2400,2800].forEach(f2=>{
    const {x}=eFormPos(F1MIN,f2);
    svg.appendChild($s('line',{x1:x,y1:EF.y0,x2:x,y2:EF.y1,stroke:'#1e3048','stroke-width':1}));
    svg.appendChild($t(f2,{x,y:EF.y1+10,'text-anchor':'middle','font-size':6.5,fill:'#3a5878','font-family':'system-ui'}));
  });
  // F1 grid
  [200,400,600,800].forEach(f1=>{
    const {y}=eFormPos(f1,F2MIN);
    svg.appendChild($s('line',{x1:EF.x0,y1:y,x2:EF.x1,y2:y,stroke:'#1e3048','stroke-width':1}));
    svg.appendChild($t(f1,{x:EF.x0-4,y,'text-anchor':'end',dy:'0.35em','font-size':6.5,fill:'#3a5878','font-family':'system-ui'}));
  });
  // Border
  svg.appendChild($s('rect',{x:EF.x0,y:EF.y0,width:EF.x1-EF.x0,height:EF.y1-EF.y0,fill:'none',stroke:'#2e4a64','stroke-width':1.5,rx:4}));
  // Axis labels
  svg.appendChild($t('← F2 (Hz)',{x:(EF.x0+EF.x1)/2,y:EF.y1+22,'text-anchor':'middle','font-size':7,fill:'#4a6888','font-family':'system-ui'}));
  const f1lbl=$t('F1↓',{x:14,y:(EF.y0+EF.y1)/2,'text-anchor':'middle','font-size':7,fill:'#4a6888','font-family':'system-ui'});
  f1lbl.setAttribute('transform',`rotate(-90,14,${(EF.y0+EF.y1)/2})`);
  svg.appendChild(f1lbl);
  // Vowel dot
  const f1=parseFloat(v.f1), f2=parseFloat(v.f2);
  if(!isNaN(f1)&&!isNaN(f2)&&f1>=F1MIN&&f1<=F1MAX&&f2>=F2MIN&&f2<=F2MAX){
    const {x,y}=eFormPos(f1,f2);
    svg.appendChild($s('circle',{cx:x,cy:y,r:6,fill:'none',stroke:'#7eb8f740','stroke-width':8}));
    svg.appendChild($s('circle',{cx:x,cy:y,r:4,fill:'#7eb8f7'}));
    if(v.ipa){
      svg.appendChild($t(v.ipa,{x:x+8,y,dy:'0.35em','text-anchor':'start','font-size':11,fill:'#7eb8f7','font-family':'Georgia,serif','font-weight':'bold'}));
    }
  }
}

// ─── Apply + cancel ───────────────────────────────────────────────────────────
document.getElementById('veApplyBtn').addEventListener('click',()=>{
  if(!state.vowelDraft) return;
  if(!state.vowelDraft.ipa?.trim()){ toast('IPA symbol is required'); return; }
  if(!state.langDraft.vowels) state.langDraft.vowels=[];
  if(state.vowelIdx<0) state.langDraft.vowels.push(state.vowelDraft);
  else state.langDraft.vowels[state.vowelIdx]=state.vowelDraft;
  markUnsaved();
  closeVowelEditor();   // internally calls renderVowelCards → renderLangChart
  updateSectionTitle();
  toast(`Vowel "${state.vowelDraft.ipa}" applied`);
});
document.getElementById('veCancelBtn').addEventListener('click', closeVowelEditor);

// ─── Save language ────────────────────────────────────────────────────────────
async function saveLang() {
  if(!state.langDraft) return;
  const data=clone(state.langDraft);
  const key=data.key;
  if(!key){ toast('Language key is required'); return; }

  const json=JSON.stringify(data, null, 2);

  // Try File System Access API first
  if(state.dirHandle) {
    try {
      // Create/get lang subfolder
      const subDir=await state.dirHandle.getDirectoryHandle(key,{create:true});
      const fh=await subDir.getFileHandle('lang.json',{create:true});
      const w=await fh.createWritable();
      await w.write(json); await w.close();

      // Update index.json
      const allKeys=Object.keys(state.langs);
      if(!allKeys.includes(key)) allKeys.push(key);
      const origKey=state.selKey;
      if(origKey && origKey!==key){
        // key was renamed — remove old from index
        const pos=allKeys.indexOf(origKey);
        if(pos>=0) allKeys.splice(pos,1);
      }
      const idxFh=await state.dirHandle.getFileHandle('index.json',{create:true});
      const iw=await idxFh.createWritable();
      await iw.write(JSON.stringify({languages:allKeys},null,2));
      await iw.close();

      // Update state
      if(origKey && origKey!==key) delete state.langs[origKey];
      state.langs[key]=data;
      state.selKey=key;
      state.unsaved=false;
      document.getElementById('unsavedNote').style.display='none';
      renderLangList();
      toast('✓ Saved to lang/' + key + '/lang.json');
      return;
    } catch(e) {
      console.error('FS write failed:',e);
      toast('Write failed — downloading instead');
    }
  }

  // Fallback: download
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download='lang.json';
  a.click();
  toast(`Downloaded lang.json — put it in lang/${key}/`);
  state.langs[key]=data;
  state.selKey=key;
  state.unsaved=false;
  document.getElementById('unsavedNote').style.display='none';
  renderLangList();
}

// ─── Folder connect ───────────────────────────────────────────────────────────
document.getElementById('folderBtn').addEventListener('click', async()=>{
  if(!window.showDirectoryPicker){
    toast('File System API not supported — use Chrome or Edge'); return;
  }
  try {
    state.dirHandle=await window.showDirectoryPicker({mode:'readwrite',startIn:'documents'});
    const btn=document.getElementById('folderBtn');
    btn.textContent='✓ '+state.dirHandle.name+' connected';
    btn.classList.add('connected');
    toast('Folder connected — saves go directly to files');
  } catch(e){
    if(e.name!=='AbortError') toast('Could not connect folder: '+e.message);
  }
});

// ─── New language ─────────────────────────────────────────────────────────────
document.getElementById('newLangBtn').addEventListener('click',()=>{
  if(state.unsaved && !confirm('Discard unsaved changes?')) return;
  const key='new-lang-'+Date.now().toString(36);
  const fresh={key,label:'New Language',color:'#a78bfa',vowels:[]};
  state.langs[key]=fresh;
  state.selKey=key;
  state.langDraft=clone(fresh);
  state.unsaved=true;
  closeVowelEditor();
  renderLangList();
  renderMain();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadLanguages();
</script>
